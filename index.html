                        {renderDangerBadges()}
                        <div className={`flex items-center ${minimalMode ? 'gap-2' : 'gap-4'}`}>
                            <div className={`flex-shrink-0 ${minimalMode ? 'w-12 h-12' : 'w-[72px] h-[72px]'} relative overflow-hidden rounded-lg`}>
                                {song.jacket ? (
                                    <img 
                                        src={song.jacket} 
                                        alt="jacket" 
                                        className="border-[3px] w-full h-full object-cover rounded-lg" 
                                        style={{ borderColor: borderColor }}
                                        crossOrigin="anonymous"
                                        onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.jp/24/cccccc/ffffff/150x150.png?text=NO+JACKET'; }} 
                                    />
                                ) : (
                                    <div 
                                        className="border-[3px] w-full h-full bg-gray-100 flex items-center justify-center rounded-lg"
                                        style={{ borderColor: borderColor }}
                                    >
                                        <i className={`ph-bold ph-music-note text-gray-400 ${minimalMode ? 'text-lg' : 'text-xl'}`}></i>
                                    </div>
                                )}
                            </div>
                            <div className="flex-grow min-w-0">
                                <h3 className={`${minimalMode ? 'text-sm' : 'text-lg'} font-black leading-tight mb-0.5 break-words`}>{song.title}</h3>
                                <div className={`flex flex-nowrap items-center ${minimalMode ? 'gap-x-3' : 'gap-x-4'} gap-y-0.5 whitespace-nowrap`}>
                                    <div className="flex items-baseline gap-1 font-black text-black leading-none">
                                        <span className={`${minimalMode ? 'text-[8px]' : 'text-[10px]'} uppercase tracking-tight text-black font-black`}>Lv</span>
                                        <span className={`${minimalMode ? 'text-base' : 'text-xl'} tracking-tight leading-none`}>{displayLevel}</span>
                                    </div>
                                    <div className="flex items-baseline gap-1 font-black text-black leading-none">
                                        <span className={`${minimalMode ? 'text-[8px]' : 'text-[10px]'} uppercase tracking-tight text-black font-black`}>BPM</span>
                                        <span className={`${minimalMode ? 'text-base' : 'text-xl'} tracking-tight leading-none whitespace-nowrap`}>{song.bpm || "???"}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex flex-col items-center gap-1.5">
                                {!minimalMode && (
                                    <>
                                        {isLoggedIn && (
                                            <div className="flex flex-row gap-1" onClick={e => e.stopPropagation()}>
                                                <button 
                                                    onClick={handleFavoriteClick} 
                                                    className={`fav-btn ${isFavorite ? 'active' : ''}`}
                                                >
                                                    <i className={`${isFavorite ? 'ph-fill' : 'ph-bold'} ph-star text-base`}></i>
                                                </button>
                                                <button 
                                                    onClick={handleMirrorClick} 
                                                    className={`mirror-btn ${isMirror ? 'active' : ''}`}
                                                >
                                                    <i className={`ph-bold ph-arrows-left-right text-base`}></i>
                                                </button>
                                            </div>
                                        )}
                                        <div className={`transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}><i className="ph-bold ph-caret-circle-down text-2xl text-black"></i></div>
                                    </>
                                )}
                            </div>
                        </div>
                        {!minimalMode && (
                            <div className={`memo-area ${isOpen ? 'open' : ''}`}>
                                {showTips && song.danger2 && (
                                    (() => {
                                        const DANGER2_LABELS = {
                                            "1": "縦連", "2": "両手トリル", "3": "片手トリルBT",
                                            "4": "片手トリルFX", "5": "縦トリル", "6": "片手3鍵",
                                            "7": "ハントリ", "8": "つまみ", "9": "壁",
                                            "10": "二重鍵盤", "11": "回転", "12": "６鍵階段",
                                            "13": "ロング", "14": "リズム難", "15": "女神特有"
                                        };
                                        const tags = String(song.danger2).split(",").map(s => s.trim()).filter(s => DANGER2_LABELS[s]);
                                        if (tags.length === 0) return null;
                                        return (
                                            <div className="flex flex-wrap gap-1 mb-3">
                                                {tags.map(code => (
                                                    <span key={code} className="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-black border-2 border-black bg-[#e9edc9] text-black" style={{boxShadow: '1px 1px 0px #000'}}>
                                                        {DANGER2_LABELS[code]}
                                                    </span>
                                                ))}
                                            </div>
                                        );
                                    })()
                                )}
                                <div className="flex items-center mb-3 text-black">
                                    <span className="section-label">第1区間</span>
                                </div>
                                <div className="grid grid-cols-3 gap-2 mb-6">
                                    <div className="stat-box">
                                        <p className="stat-label">開始位置</p>
                                        <p className="stat-value">{song.start_pos || "-"}</p>
                                    </div>
                                    <div className="stat-box">
                                        <p className="stat-label">終了位置</p>
                                        <p className="stat-value">{song.end_pos || "-"}</p>
                                    </div>
                                    <div className="stat-box">
                                        <p className="stat-label">チェイン数</p>
                                        <p className="stat-value">{song.combo || "-"}</p>
                                    </div>
                                </div>

                                <div className="flex items-center mb-3 text-black">
                                    <span className="section-label">第2区間</span>
                                </div>
                                <div className="grid grid-cols-3 gap-2 mb-6">
                                    <div className="stat-box">
                                        <p className="stat-label">開始位置</p>
                                        <p className="stat-value">{song.start_pos2 || "-"}</p>
                                    </div>
                                    <div className="stat-box">
                                        <p className="stat-label">終了位置</p>
                                        <p className="stat-value">{song.end_pos2 || "-"}</p>
                                    </div>
                                    <div className="stat-box">
                                        <p className="stat-label">チェイン数</p>
                                        <p className="stat-value">{song.combo2 || "-"}</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    {song.site_link ? (
                                        <button className="link-button chart" onClick={(e) => handleChartClick(e, song.site_link)}>
                                            <i className="ph-bold ph-file-text text-lg"></i>画像で確認
                                        </button>
                                    ) : (
                                        <div className="link-button opacity-30 grayscale"><i className="ph-bold ph-file-text text-lg"></i>画像なし</div>
                                    )}
                                    
                                    {song.movie_link ? (
                                        <button className="link-button video" onClick={(e) => handleVideoClick(e, song.movie_link)}>
                                            <i className="ph-bold ph-youtube-logo text-lg"></i>動画で確認
                                        </button>
                                    ) : (
                                        <div className="link-button opacity-30 grayscale"><i className="ph-bold ph-youtube-logo text-lg"></i>動画なし</div>
                                    )}
                                </div>

                                {showTips && song.memo && (
                                    <>
                                        <div className="flex items-center gap-1.5 mb-2 font-black text-[13px] uppercase tracking-wider text-black">
                                            <i className="ph-fill ph-chat-centered-dots text-[#40916c] text-lg"></i>
                                            <span>Tips</span>
                                        </div>
                                        <div className="bg-white border-2 border-black p-4 rounded-xl shadow-inner min-h-[60px] mb-4">
                                            <p className="text-sm font-bold text-black whitespace-pre-wrap leading-relaxed">
                                                {song.memo}
                                            </p>
                                        </div>
                                    </>
                                )}

                                {isLoggedIn && (
                                    <div className="mt-4 pt-4 border-t-2 border-gray-100" onClick={e => e.stopPropagation()}>
                                        <div className="flex items-center gap-1.5 mb-2 font-black text-[13px] uppercase tracking-wider text-black">
                                            <i className="ph-bold ph-pencil-simple text-blue-500 text-lg"></i>
                                            <span>自分用メモ</span>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <textarea 
                                                className="memo-textarea" 
                                                value={localMemo}
                                                onChange={(e) => setLocalMemo(e.target.value.slice(0, 30))}
                                                onBlur={handleMemoSave}
                                                maxLength={30}
                                            />
                                            <p className="text-right text-[10px] font-bold text-gray-400">{localMemo.length} / 30</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    <LinkConfirmModal 
                        isOpen={confirmModal.isOpen}
                        onConfirm={confirmVideoNavigation}
                        onCancel={() => setConfirmModal({ ...confirmModal, isOpen: false })}
                        type={confirmModal.type}
                    />

                    <ChartPreviewModal 
                        isOpen={chartModal.isOpen}
                        url={chartModal.url}
                        title={song.title}
                        onCancel={() => setChartModal({ ...chartModal, isOpen: false })}
                    />
                </>
            );
        };

        const SetlistLimitModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <div className="mb-4">
                            <div className="w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4 border-4 border-black bg-blue-100">
                                <i className="ph-bold ph-info text-3xl text-blue-600"></i>
                            </div>
                            <h2 className="text-xl font-black mb-2">作成上限です</h2>
                            <p className="text-sm font-bold text-gray-600 leading-relaxed px-4">
                                セトリは最大{MAX_SETLISTS}件まで作成可能です。<br/>新しいセトリを作成するには、既存のセトリを削除してください。
                            </p>
                        </div>
                        <div className="mt-8">
                            <button 
                                onClick={onClose}
                                className="w-full bg-gray-100 text-black font-black py-3 rounded-xl border-4 border-black shadow-[4px_4px_0px_#000] active:translate-x-1 translate-y-1 active:shadow-none transition-all"
                            >
                                閉じる
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const SetlistManager = ({ songs, songMap, setlists, mirrors, onSave, onDelete, onExport, getSongId, formatLevel, getBorderColor }) => {
            const [view, setView] = useState("list");
            const [editingSetlist, setEditingSetlist] = useState(null);
            const [selectingSlot, setSelectingSlot] = useState(null);
            
            const [isSongModalOpen, setIsSongModalOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [openSetlists, setOpenSetlists] = useState({});
            
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [deletingId, setDeletingId] = useState(null);
            const [isLimitModalOpen, setIsLimitModalOpen] = useState(false);
            const [isSelectExportOpen, setIsSelectExportOpen] = useState(false);

            const handleCreate = () => {
                if (setlists.length >= MAX_SETLISTS) {
                    setIsLimitModalOpen(true);
                    return;
                }
                setEditingSetlist({ id: Date.now().toString(), name: "", songs: Array(SETLIST_TRACK_COUNT).fill(null), memo: "" });
                setView("edit");
            };

            const handleEdit = (sl) => {
                setEditingSetlist({ ...sl, songs: [...sl.songs], memo: sl.memo || "" });
                setView("edit");
            };

            const openSongModal = (slotIndex) => {
                setSelectingSlot(slotIndex);
                setSearchTerm("");
                setIsSongModalOpen(true);
            };

            const isTitleAlreadySelected = (songIdToCheck) => {
                if (!editingSetlist) return false;
                const songToCheck = songMap[songIdToCheck];
                if (!songToCheck) return false;
                
                return editingSetlist.songs.some((selectedId, index) => {
                    if (index === selectingSlot) return false;
                    if (!selectedId) return false;
                    const selectedSong = songMap[selectedId];
                    return selectedSong && selectedSong.title === songToCheck.title;
                });
            };

            const selectSong = (songId) => {
                if (isTitleAlreadySelected(songId)) return;
                const newSongs = [...editingSetlist.songs];
                newSongs[selectingSlot] = songId;
                setEditingSetlist({ ...editingSetlist, songs: newSongs });
                setIsSongModalOpen(false);
            };

            const handleSave = () => {
                onSave(editingSetlist);
                if (editingSetlist && editingSetlist.id) {
                    setOpenSetlists(prev => ({ ...prev, [editingSetlist.id]: false }));
                }
                setView("list");
            };

            const requestDelete = (id) => {
                setDeletingId(id);
                setIsDeleteModalOpen(true);
            };

            const confirmDelete = () => {
                if (deletingId) {
                    onDelete(deletingId);
                    setDeletingId(null);
                    setIsDeleteModalOpen(false);
                }
            };

            const canSave = editingSetlist && editingSetlist.name.trim() !== "" && editingSetlist.songs.every(id => id !== null);

            const getButtonClass = (bgColor, textColor = "text-black") => `
                font-black py-2 rounded-xl border-4 border-black 
                shadow-[4px_4px_0px_#000] active:translate-x-0.5 active:translate-y-0.5 
                active:shadow-none transition-all flex justify-center items-center gap-1
                w-32 ${bgColor} ${textColor}
            `;

            if (view === "list") {
                return (
                    <div className="flex flex-col gap-4">
                        <div className="flex items-center justify-between mb-2 mt-2">
                            <div className="flex items-center gap-2">
                                <i className="ph-fill ph-list-numbers text-3xl text-[#52b788]"></i>
                                <h2 className="text-2xl font-black italic text-white uppercase tracking-tighter">セトリ管理</h2>
                            </div>
                            <div className="flex gap-2">
                                {setlists.length > 0 && (
                                    <button 
                                        onClick={() => setIsSelectExportOpen(true)} 
                                        className="bg-[#d8f3dc] text-black font-black py-1.5 px-3 rounded-lg border-4 border-black shadow-[3px_3px_0px_#000] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all text-xs flex items-center gap-1"
                                    >
                                        <i className="ph-bold ph-image"></i> 画像出力
                                    </button>
                                )}
                                <button onClick={handleCreate} className="bg-white text-black font-black py-1.5 px-3 rounded-lg border-4 border-black shadow-[3px_3px_0px_#000] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all text-xs flex items-center gap-1">
                                    <i className="ph-bold ph-plus"></i> 新規
                                </button>
                            </div>
                        </div>
                        
                        {setlists.length === 0 ? (
                            <div className="bg-white/10 p-5 rounded-2xl border border-white/10 backdrop-blur-md text-white text-center mt-2">
                                <i className="ph-bold ph-music-notes text-4xl text-white/50 mb-2 block"></i>
                                <p className="text-sm font-bold">作成されたセトリがありません</p>
                            </div>
                        ) : (
                            <div className="flex flex-col gap-4 mt-2">
                                {setlists.map((sl, idx) => (
                                    <div key={sl.id} className="bg-white border-4 border-black rounded-2xl p-4 shadow-[6px_6px_0px_#000] transition-all">
                                        <div 
                                            className="flex items-center justify-between cursor-pointer" 
                                            onClick={() => setOpenSetlists(prev => ({ ...prev, [sl.id]: !prev[sl.id] }))}
                                        >
                                            <h3 className="text-base font-black text-black">#{idx + 1}　{sl.name}</h3>
                                            <div className={`transition-transform duration-300 ${openSetlists[sl.id] ? 'rotate-180' : ''}`}>
                                                <i className="ph-bold ph-caret-circle-down text-2xl text-black"></i>
                                            </div>
                                        </div>
                                        
                                        <div className={`overflow-hidden transition-all duration-300 ${openSetlists[sl.id] ? 'max-h-[2000px] mt-4 opacity-100 pb-2' : 'max-h-0 opacity-0'}`}>
                                            <div className="flex flex-col gap-3 mb-4 px-2 pt-2">
                                                {sl.songs.map((songId, sIdx) => {
                                                    const song = songMap[songId];
                                                    if (!song) return null;
                                                    const isMirrorActive = mirrors.includes(songId);
                                                    return (
                                                        <div key={sIdx} className="relative">
                                                            <div className="absolute -left-2 -top-2 w-6 h-6 bg-black text-white rounded-full flex items-center justify-center font-black text-xs z-10 border-2 border-white shadow-sm">
                                                                {sIdx + 1}
                                                            </div>
                                                            <div className="flex items-center gap-3 bg-gray-50 border-2 border-black rounded-xl p-2">
                                                                <img 
                                                                    src={song.jacket} 
                                                                    className="w-12 h-12 border-2 rounded object-cover" 
                                                                    style={{ borderColor: getBorderColor(song.difficult) }}
                                                                    crossOrigin="anonymous"
                                                                    onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.jp/24/cccccc/ffffff/150x150.png?text=NO+JACKET'; }} 
                                                                />
                                                                <div className="flex-grow min-w-0">
                                                                    <div className="text-sm font-black text-black break-words leading-tight">{song.title}</div>
                                                                    <div className="text-[10px] font-black uppercase flex items-center gap-2">
                                                                        <span className="text-black">Lv {formatLevel(song.level)}</span>
                                                                        <span className="text-black">{song.combo}CHAIN</span>
                                                                    </div>
                                                                </div>
                                                                {isMirrorActive && (
                                                                    <div className="mirror-icon-badge flex-shrink-0">
                                                                        <i className="ph-bold ph-arrows-left-right text-[10px]"></i>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>

                                            {sl.memo && (
                                                <div className="mt-4 pt-4 border-t-2 border-gray-100">
                                                    <div className="flex items-center gap-1.5 mb-2 font-black text-[10px] uppercase tracking-wider text-black">
                                                        <i className="ph-bold ph-pencil-simple text-blue-500 text-lg"></i>
                                                        <span>自分用メモ</span>
                                                    </div>
                                                    <div className="bg-gray-50 border-2 border-black p-3 rounded-xl min-h-[40px]">
                                                        <p className="text-sm font-bold text-black whitespace-pre-wrap leading-relaxed">
                                                            {sl.memo}
                                                        </p>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="flex gap-4 mt-6 justify-center">
                                                <button onClick={(e) => { e.stopPropagation(); handleEdit(sl); }} className={getButtonClass("bg-yellow-400")}>
                                                    <i className="ph-bold ph-pencil-simple"></i> 編集する
                                                </button>
                                                <button onClick={(e) => { e.stopPropagation(); requestDelete(sl.id); }} className={getButtonClass("bg-red-500", "text-white")}>
                                                    <i className="ph-bold ph-trash"></i> 削除する
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        <DeleteConfirmModal 
                            isOpen={isDeleteModalOpen}
                            onConfirm={confirmDelete}
                            onCancel={() => { setIsDeleteModalOpen(false); setDeletingId(null); }}
                        />

                        <SetlistLimitModal 
                            isOpen={isLimitModalOpen}
                            onClose={() => setIsLimitModalOpen(false)}
                        />

                        <SetlistSelectExportModal 
                            isOpen={isSelectExportOpen}
                            onClose={() => setIsSelectExportOpen(false)}
                            setlists={setlists}
                            onSelect={(sl) => {
                                setIsSelectExportOpen(false);
                                onExport(sl);
                            }}
                        />
                    </div>
                );
            }

            return (
                <div className="bg-white border-4 border-black rounded-3xl p-5 shadow-[8px_8px_0px_#000]">
                    <h3 className="text-xl font-black mb-4 text-black border-b-4 border-[#52b788] pb-2 inline-block">セトリ作成</h3>
                    
                    <div className="mb-6">
                        <label className="block text-xs font-black uppercase text-gray-500 mb-1">セトリ名</label>
                        <input 
                            type="text" 
                            value={editingSetlist.name} 
                            onChange={e => setEditingSetlist({...editingSetlist, name: e.target.value})}
                            className="w-full bg-gray-50 border-4 border-black rounded-xl py-3 px-4 text-sm font-bold focus:outline-none focus:border-[#52b788] focus:bg-white transition-all text-black"
                        />
                    </div>

                    <div className="flex flex-col gap-3 mb-6 px-1 pt-1">
                        <label className="block text-xs font-black uppercase text-gray-500 mb-[-4px]">TRACKS</label>
                        {editingSetlist.songs.map((songId, idx) => {
                            const song = songId ? songMap[songId] : null;
                            return (
                                <div key={idx} className="relative">
                                    <div className="absolute -left-2 -top-2 w-6 h-6 bg-black text-white rounded-full flex items-center justify-center font-black text-xs z-10 border-2 border-white shadow-sm">
                                        {idx + 1}
                                    </div>
                                    {song ? (
                                        <div onClick={() => openSongModal(idx)} className="border-2 border-black rounded-xl p-2 flex items-center bg-white cursor-pointer hover:bg-gray-50 active:translate-y-0.5 transition-transform gap-3">
                                            <img 
                                                src={song.jacket} 
                                                className="w-12 h-12 border-2 rounded object-cover" 
                                                style={{ borderColor: getBorderColor(song.difficult) }}
                                                crossOrigin="anonymous"
                                                onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.jp/24/cccccc/ffffff/150x150.png?text=NO+JACKET'; }} 
                                            />
                                            <div className="flex-grow min-w-0">
                                                <div className="text-sm font-black text-black break-words leading-tight">{song.title}</div>
                                                <div className="text-[10px] font-black uppercase flex items-center gap-2 mt-1">
                                                    <span className="text-black">Lv {formatLevel(song.level)}</span>
                                                    <span className="text-black">{song.combo}CHAIN</span>
                                                </div>
                                            </div>
                                            <i className="ph-bold ph-arrows-left-right text-gray-400 text-xl mr-2"></i>
                                        </div>
                                    ) : (
                                        <div onClick={() => openSongModal(idx)} className="border-2 border-dashed border-gray-300 rounded-xl p-4 flex items-center justify-center cursor-pointer bg-gray-50 hover:bg-gray-100 hover:border-gray-400 active:translate-y-0.5 transition-all">
                                            <i className="ph-bold ph-plus-circle text-2xl text-gray-400 mr-2"></i>
                                            <span className="text-gray-500 font-bold text-sm">曲を選択する</span>
                                        </div>
                                    )}
                                </div>
                            )
                        })}
                    </div>

                    <div className="mb-6">
                        <label className="block text-xs font-black uppercase text-gray-500 mb-1">自分用メモ</label>
                        <textarea 
                            value={editingSetlist.memo || ""} 
                            onChange={e => setEditingSetlist({...editingSetlist, memo: e.target.value.slice(0, 60)})}
                            className="memo-textarea"
                            maxLength={60}
                        />
                        <p className="text-right text-[10px] font-bold text-gray-400">{(editingSetlist.memo || "").length} / 60</p>
                    </div>

                    <div className="flex gap-4 justify-center mt-2">
                        <button 
                            onClick={handleSave} 
                            disabled={!canSave}
                            className={`w-32 font-black py-2 rounded-xl border-4 border-black shadow-[4px_4px_0px_#000] transition-all ${canSave ? 'bg-[#52b788] text-white active:translate-x-0.5 active:translate-y-0.5 active:shadow-none' : 'bg-gray-100 text-gray-400 cursor-not-allowed border-gray-300'}`}
                        >
                            保存する
                        </button>
                        <button onClick={() => setView("list")} className="w-32 bg-gray-200 text-black font-black py-2 rounded-xl border-4 border-black shadow-[4px_4px_0px_#000] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all">
                            キャンセル
                        </button>
                    </div>

                    {isSongModalOpen && (
                        <div className="modal-overlay" onClick={() => setIsSongModalOpen(false)}>
                            <div className="modal-content" style={{ padding: '16px', maxWidth: '380px', width: '100%', height: '80vh', display: 'flex', flexDirection: 'column' }} onClick={e => e.stopPropagation()}>
                                <h2 className="text-lg font-black mb-3 text-black">曲を選択</h2>
                                <div className="relative mb-3 flex-shrink-0">
                                    <input 
                                        type="text" 
                                        placeholder="曲名・読みで検索..."
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)}
                                        className="w-full bg-gray-50 border-2 border-black rounded-lg py-2 px-3 pl-8 text-sm font-bold focus:outline-none focus:border-[#52b788] text-black"
                                    />
                                    <i className="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                </div>
                                
                                <div className="flex-grow overflow-y-auto flex flex-col gap-2 pr-1 pb-4 custom-scrollbar">
                                    {searchTerm.trim() === "" ? (
                                        <div className="flex flex-col items-center justify-center py-12 opacity-40">
                                            <i className="ph-bold ph-magnifying-glass text-5xl mb-3 text-black"></i>
                                            <p className="text-sm font-black text-black">曲名を入力して検索してください</p>
                                        </div>
                                    ) : (
                                        songs.filter(s => 
                                            String(s.title || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
                                            String(s.reading || "").toLowerCase().includes(searchTerm.toLowerCase())
                                        ).slice(0, 100).map((s, i) => {
                                            const id = getSongId(s);
                                            const isSelected = isTitleAlreadySelected(id);
                                            return (
                                                <div key={i} onClick={() => !isSelected && selectSong(id)} className={`flex items-center gap-3 border-2 rounded-xl p-2 transition-all ${isSelected ? 'border-gray-200 bg-gray-50 opacity-50 cursor-not-allowed' : 'border-black bg-white cursor-pointer active:translate-y-0.5'}`}>
                                                    <div className="flex-shrink-0 w-12 h-12 relative overflow-hidden rounded-md">
                                                        <img 
                                                            src={s.jacket} 
                                                            alt="jacket" 
                                                            className="border-2 w-full h-full object-cover rounded-md" 
                                                            style={{ borderColor: getBorderColor(s.difficult) }}
                                                            crossOrigin="anonymous"
                                                            onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.jp/24/cccccc/ffffff/150x150.png?text=NO+JACKET'; }} 
                                                        />
                                                    </div>
                                                    <div className="flex-grow min-w-0 text-left">
                                                        <div className="text-sm font-black text-black break-words leading-tight">{s.title}</div>
                                                        <div className="text-[10px] font-black uppercase flex items-center gap-2 mt-1">
                                                            <span className="text-black">Lv {formatLevel(s.level)}</span>
                                                            <span className="text-black">{s.combo}CHAIN</span>
                                                        </div>
                                                    </div>
                                                    {isSelected && <span className="text-[10px] font-black text-red-500 bg-red-100 px-2 py-1 rounded whitespace-nowrap">選択済</span>}
                                                </div>
                                            )
                                        })
                                    )}
                                </div>
                                
                                <div className="flex justify-center flex-shrink-0 mt-3">
                                    <button onClick={() => setIsSongModalOpen(false)} className="w-40 bg-gray-200 text-black font-black py-3 rounded-xl border-4 border-black active:translate-y-0.5 shadow-[3px_3px_0px_#000] active:shadow-none">
                                        閉じる
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        const App = () => {
            const [songs, setSongs] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedLevels, setSelectedLevels] = useState([]); 
            const [sortOrder, setSortOrder] = useState("desc");
            const [rankSection, setRankSection] = useState("section1"); 
            const [isFilterOpen, setIsFilterOpen] = useState(false);
            const [currentPage, setCurrentPage] = useState("main"); 
            const [termsTab, setTermsTab] = useState("terms"); 
            const [isNavOpen, setIsNavOpen] = useState(false);
            const [pageIndex, setPageIndex] = useState(1);
            const [isLogoutModalOpen, setIsLogoutModalOpen] = useState(false);
            const [viewMode, setViewMode] = useState("list"); 
            const [isViewModeModalOpen, setIsViewModeModalOpen] = useState(false);
            const [selectedGridSong, setSelectedGridSong] = useState(null);
            
            // 出力用データ管理
            const [exportData, setExportData] = useState({ 
                title: "ランダム選曲 結果", 
                songs: [], 
                bg: "https://yuuya1202.github.io/Image_Background/IMG_Random_Background.png" 
            });
            const [previewUrl, setPreviewUrl] = useState(null);
            
            const [contactLinkModal, setContactLinkModal] = useState({ isOpen: false, url: '', type: '' });

            const [randomSongs, setRandomSongs] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [hasGeneratedRandom, setHasGeneratedRandom] = useState(false);
            const [randomPoolFilter, setRandomPoolFilter] = useState("all");
            const [isSavingImage, setIsSavingImage] = useState(false);

            const [user, setUser] = useState(null);
            const [isAuthLoading, setIsAuthLoading] = useState(true);
            const [authError, setAuthError] = useState(null);
            const [saveError, setSaveError] = useState(null);
            const [favorites, setFavorites] = useState([]); 
            const [mirrors, setMirrors] = useState([]); 
            const [personalMemos, setPersonalMemos] = useState({});
            const [setlists, setSetlists] = useState([]);
            const [showOnlyFavorites, setShowOnlyFavorites] = useState(false);
            const [showOnlyMirrors, setShowOnlyMirrors] = useState(false);
            
            const [firebase, setFirebase] = useState(null);

            const exportRef = useRef(null);

            const getSongId = (song) => `${song.title}_${song.difficult}`;

            const songMap = useMemo(() => {
                const map = {};
                songs.forEach(s => {
                    map[getSongId(s)] = s;
                });
                return map;
            }, [songs]);

            // ビューモードによって1ページあたりの件数を切り替え
            const itemsPerPage = viewMode === 'grid' ? GRID_ITEMS_PER_PAGE : LIST_ITEMS_PER_PAGE;

            const viewToken = useMemo(() => {
                return [currentPage, pageIndex, searchTerm, selectedLevels.join(','), showOnlyFavorites, showOnlyMirrors, viewMode].join('|');
            }, [currentPage, pageIndex, searchTerm, selectedLevels, showOnlyFavorites, showOnlyMirrors, viewMode]);

            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'auto' });
            }, [currentPage, pageIndex]);

            // --- Firebase Initialization & Auth ---
            useEffect(() => {
                const initFirebase = async () => {
                    const { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, getFirestore } = window.FirebaseSDK;
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);
                    
                    setFirebase({ auth, db });

                    onAuthStateChanged(auth, (currentUser) => {
                        if (!currentUser) {
                            signInAnonymously(auth);
                            return;
                        }
                        setUser(currentUser);
                        setIsAuthLoading(false);
                        if (currentUser.isAnonymous) {
                            setFavorites([]);
                            setMirrors([]);
                            setPersonalMemos({});
                            setSetlists([]);
                            setShowOnlyFavorites(false);
                            setShowOnlyMirrors(false);
                            setRandomPoolFilter("all");
                        }
                    });
                };

                const interval = setInterval(() => {
                    if (window.FirebaseSDK) {
                        initFirebase();
                        clearInterval(interval);
                    }
                }, 100);
            }, []);

            // --- Master Data Fetch ---
            useEffect(() => {
                if (!firebase || !user) return;

                const fetchMasterData = async () => {
                    const CACHE_KEY = `sdvx_songs_${MASTER_DATA_UPDATED_AT}`;
                    try {
                        // キャッシュ確認：更新日が同じなら再取得しない
                        const cached = localStorage.getItem(CACHE_KEY);
                        if (cached) {
                            setSongs(JSON.parse(cached));
                            setIsLoading(false);
                            return;
                        }

                        // 古いキャッシュを削除
                        Object.keys(localStorage)
                            .filter(k => k.startsWith('sdvx_songs_'))
                            .forEach(k => localStorage.removeItem(k));

                        // Firestoreから取得してキャッシュに保存
                        const { doc, getDoc } = window.FirebaseSDK;
                        const docRef = doc(firebase.db, 'artifacts', APP_ID, 'public', 'data', MASTER_COLLECTION, MASTER_DOCUMENT);
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            if (data.songs) {
                                const parsedSongs = JSON.parse(data.songs);
                                setSongs(parsedSongs);
                                localStorage.setItem(CACHE_KEY, JSON.stringify(parsedSongs));
                            }
                        }
                    } catch (err) {
                        console.error("Master Data Fetch Error:", err);
                    } finally {
                        setIsLoading(false);
                    }
                };

                fetchMasterData();
            }, [firebase, user]);

            // --- User Profile & Setlists Fetch（onSnapshot→getDocに変更）---
            useEffect(() => {
                if (!user || !firebase || user.isAnonymous) return;

                const fetchUserData = async () => {
                    const { doc, getDoc } = window.FirebaseSDK;
                    try {
                        const profileSnap = await getDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'data'));
                        if (profileSnap.exists()) {
                            const data = profileSnap.data();
                            setFavorites(data.favorites || []);
                            setMirrors(data.mirrors || []);
                            setPersonalMemos(data.memos || {});
                        }
                    } catch (err) {
                        console.error("Firestore Profile Fetch Error:", err);
                    }

                    try {
                        const setlistSnap = await getDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'setlists', 'data'));
                        if (setlistSnap.exists()) {
                            setSetlists(setlistSnap.data().items || []);
                        }
                    } catch (err) {
                        console.error("Firestore Setlist Fetch Error:", err);
                    }
                };

                fetchUserData();
            }, [user, firebase]);

            useEffect(() => {
                setSelectedLevels([]);
                setIsFilterOpen(false);
                setPageIndex(1);
                setShowOnlyFavorites(false);
                setShowOnlyMirrors(false);
                if (currentPage !== "terms") setTermsTab("terms");
            }, [currentPage]);

            useEffect(() => {
                setPageIndex(1);
            }, [rankSection, searchTerm, selectedLevels, sortOrder, showOnlyFavorites, showOnlyMirrors, viewMode]);

            const login = async () => {
                if (!firebase || isAuthLoading) return;
                setIsAuthLoading(true);
                setAuthError(null);
                const { GoogleAuthProvider, signInWithPopup } = window.FirebaseSDK;
                const provider = new GoogleAuthProvider();
                
                provider.setCustomParameters({
                    prompt: 'select_account'
                });

                try {
                    await signInWithPopup(firebase.auth, provider);
                } catch (error) {
                    console.error("Google Login Error:", error);
                    setAuthError("ログインに失敗しました.");
                    setIsAuthLoading(false);
                }
            };

            const logout = async () => {
                if (!firebase) return;
                const { signOut, signInAnonymously } = window.FirebaseSDK;
                try {
                    await signOut(firebase.auth);
                    await signInAnonymously(firebase.auth);
                    setShowOnlyFavorites(false);
                    setShowOnlyMirrors(false);
                    setCurrentPage("main");
                    setIsLogoutModalOpen(false);
                } catch (error) {
                    console.error("Logout Error:", error);
                }
            };

            const updateFirestoreProfile = async (newFavs, newMemos, newMirrors) => {
                if (!user || !firebase || user.isAnonymous) return;
                const { doc, setDoc } = window.FirebaseSDK;
                try {
                    await setDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'data'), {
                        favorites: newFavs,
                        memos: newMemos,
                        mirrors: newMirrors
                    }, { merge: true });
                } catch (err) {
                    console.error("Firestore Profile Write Error:", err);
                    setSaveError("保存に失敗しました。時間をおいて再度お試しください。");
                }
            };

            const toggleFavorite = async (songId) => {
                const newFavs = favorites.includes(songId) 
                    ? favorites.filter(id => id !== songId) 
                    : [...favorites, songId];
                setFavorites(newFavs);
                await updateFirestoreProfile(newFavs, personalMemos, mirrors);
            };

            const toggleMirror = async (songId) => {
                const newMirrors = mirrors.includes(songId) 
                    ? mirrors.filter(id => id !== songId) 
                    : [...mirrors, songId];
                setMirrors(newMirrors);
                await updateFirestoreProfile(favorites, personalMemos, newMirrors);
            };

            const savePersonalMemo = async (songId, memo) => {
                const newMemos = { ...personalMemos, [songId]: memo };
                setPersonalMemos(newMemos);
                await updateFirestoreProfile(favorites, newMemos, mirrors);
            };

            const saveSetlist = async (newSetlist) => {
                if (!user || !firebase || user.isAnonymous) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const newItems = setlists.find(s => s.id === newSetlist.id)
                    ? setlists.map(s => s.id === newSetlist.id ? newSetlist : s)
                    : [...setlists, newSetlist];
                setSetlists(newItems);
                try {
                    await setDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'setlists', 'data'), {
                        items: newItems
                    });
                } catch (err) {
                    console.error("Firestore Setlist Write Error:", err);
                    setSaveError("保存に失敗しました。時間をおいて再度お試しください。");
                }
            };

            const deleteSetlist = async (id) => {
                if (!user || !firebase || user.isAnonymous) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const newItems = setlists.filter(s => s.id !== id);
                setSetlists(newItems);
                try {
                    await setDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'setlists', 'data'), {
                        items: newItems
                    });
                } catch (err) {
                    console.error("Firestore Setlist Delete Error:", err);
                    setSaveError("保存に失敗しました。時間をおいて再度お試しください。");
                }
            };

            const toggleLevel = (lv) => {
                setSelectedLevels(prev => 
                    prev.includes(lv) ? prev.filter(l => l !== lv) : [...prev, lv]
                );
            };

            const toggleLevelRange = (range) => {
                const allSelected = range.every(lv => selectedLevels.includes(lv));
                if (allSelected) {
                    setSelectedLevels(prev => prev.filter(lv => !range.includes(lv)));
                } else {
                    setSelectedLevels(prev => [...new Set([...prev, ...range])]);
                }
            };

            const isLevelFilterActive = useMemo(() => {
                return selectedLevels.length > 0;
            }, [selectedLevels]);

            const generateRandomSongs = () => {
                setIsGenerating(true);
                setHasGeneratedRandom(true);
                const filtered = songs.filter(s => {
                    const songId = getSongId(s);
                    const matchesFav = randomPoolFilter === "all" || (user && favorites.includes(songId));
                    if (!matchesFav) return false;

                    const lvStr = String(s.level || "");
                    const matchesLv = selectedLevels.length === 0 || selectedLevels.some(targetLv => {
                        if (["17.0", "18.0", "19.0", "20.0"].includes(targetLv)) {
                            const base = targetLv.split('.')[0];
                            return lvStr === base || lvStr === targetLv;
                        }
                        return lvStr === targetLv;
                    });
                    
                    return matchesLv;
                });

                if (filtered.length < SETLIST_TRACK_COUNT) {
                    setRandomSongs([]);
                } else {
                    const shuffled = [...filtered];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    const selected = shuffled.slice(0, SETLIST_TRACK_COUNT);
                    setRandomSongs(selected);
                    // ランダム用のデータ設定
                    setExportData({
                        title: "ランダム選曲 結果",
                        songs: selected,
                        bg: "https://yuuya1202.github.io/Image_Background/IMG_Random_Background.png"
                    });
                }
                
                setTimeout(() => setIsGenerating(false), 500);
            };

            const performImageExport = async () => {
                setIsSavingImage(true);
                
                try {
                    // 少し待機して状態の反映を確実にする
                    await new Promise(r => setTimeout(r, 100));
                    
                    const element = document.getElementById('export-container');
                    const canvas = await html2canvas(element, {
                        useCORS: true,
                        allowTaint: false,
                        scale: 2,
                        backgroundColor: "#132a13"
                    });
                    
                    canvas.toBlob((blob) => {
                        if (blob) {
                            const url = URL.createObjectURL(blob);
                            setPreviewUrl(url);
                        }
                        setIsSavingImage(false);
                    }, 'image/png');
                } catch (error) {
                    console.error("Image Export Error:", error);
                    setIsSavingImage(false);
                }
            };

            const handleSetlistExport = (sl) => {
                const slSongs = sl.songs.map(id => songMap[id]).filter(s => s);
                setExportData({
                    title: sl.name,
                    songs: slSongs,
                    bg: "https://yuuya1202.github.io/Image_Background/IMG_SetlistBackground.png"
                });
                // データセット後にエクスポートを実行
                performImageExport();
            };

            const handleClosePreview = () => {
                if (previewUrl) {
                    URL.revokeObjectURL(previewUrl);
                }
                setPreviewUrl(null);
            };

            const processedSongs = useMemo(() => {
                return songs.map(s => {
                    let displayCombo = 0;
                    if (rankSection === "section1") {
                        displayCombo = parseInt(s.combo) || 0;
                    } else if (rankSection === "section2") {
                        displayCombo = parseInt(s.combo2) || 0;
                    }
                    return { ...s, _displayCombo: displayCombo };
                });
            }, [songs, rankSection]);

            const allFilteredSongs = useMemo(() => {
                let baseList = processedSongs;

                if (currentPage === "danger") {
                    baseList = processedSongs.filter(s => ["1", "2", "3"].includes(String(s.danger1)));
                }

                const result = baseList.filter(s => {
                    const lvStr = String(s.level || "");
                    const matchesLv = selectedLevels.length === 0 || selectedLevels.some(targetLv => {
                        if (["17.0", "18.0", "19.0", "20.0"].includes(targetLv)) {
                            const base = targetLv.split('.')[0];
                            return lvStr === base || lvStr === targetLv;
                        }
                        return lvStr === targetLv;
                    });
                    
                    const songId = getSongId(s);
                    const isFavFilterApplied = (currentPage === "main" || currentPage === "danger") && showOnlyFavorites;
                    const matchesFav = !isFavFilterApplied || favorites.includes(songId);

                    const isMirrorFilterApplied = (currentPage === "main" || currentPage === "danger") && showOnlyMirrors;
                    const matchesMirror = !isMirrorFilterApplied || mirrors.includes(songId);

                    if (currentPage === "main") {
                        const matchesSearch = 
                            String(s.title || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
                            String(s.reading || "").toLowerCase().includes(searchTerm.toLowerCase());
                        return matchesLv && matchesSearch && matchesFav && matchesMirror;
                    }
                    
                    return matchesLv && matchesFav && matchesMirror;
                });

                if (currentPage === "ranking") {
                    const listWithCombo = result.filter(s => s._displayCombo > 0);
                    return listWithCombo.sort((a, b) => {
                        const comboA = a._displayCombo;
                        const comboB = b._displayCombo;
                        return sortOrder === "desc" ? comboB - comboA : comboA - comboB;
                    });
                }

                return result;
            }, [searchTerm, selectedLevels, processedSongs, currentPage, sortOrder, rankSection, showOnlyFavorites, showOnlyMirrors, favorites, mirrors]);

            const paginatedSongs = useMemo(() => {
                const start = (pageIndex - 1) * itemsPerPage;
                return allFilteredSongs.slice(start, start + itemsPerPage);
            }, [allFilteredSongs, pageIndex, itemsPerPage]);

            const totalPages = Math.ceil(allFilteredSongs.length / itemsPerPage);

            const handlePageChange = (newIndex) => {
                if (newIndex >= 1 && newIndex <= totalPages) {
                    setPageIndex(newIndex);
                }
            };

            const FilterButton = ({ lv, label }) => (
                <button onClick={() => toggleLevel(lv)} className={`filter-btn px-1 py-1.5 rounded-lg text-[10px] font-black uppercase w-full ${selectedLevels.includes(lv) ? 'active' : ''}`}>{label || lv}</button>
            );

            const LevelSectionHeader = ({ title, list }) => (
                <div className="flex items-center justify-between border-b-2 border-gray-100 pb-1 mb-2">
                    <div className="text-[10px] font-black text-black uppercase leading-none">Level {title}</div>
                    <button onClick={() => toggleLevelRange(list)} className="batch-btn">全選択/解除</button>
                </div>
            );

            return (
                <div className="min-h-screen px-4 py-8 max-w-md mx-auto">
                    {/* Invisible Container for Image Export (16:9) */}
                    <div id="export-container" ref={exportRef}>
                        <img 
                            className="export-bg" 
                            src={exportData.bg} 
                            crossOrigin="anonymous"
                            alt="background"
                        />
                        <div className="export-content-wrapper">
                            <div className="export-header">{exportData.title}</div>
                            
                            <div className="export-jackets-row">
                                {exportData.songs.map((song, i) => (
                                    <div key={`exp-jack-${i}`} className="export-jacket-box" style={{ borderColor: getBorderColor(song.difficult) }}>
                                        <img 
                                            className="export-jacket-img" 
                                            src={song.jacket} 
                                            crossOrigin="anonymous"
                                            onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.jp/24/cccccc/ffffff/150x150.png?text=NO+JACKET'; }}
                                        />
                                    </div>
                                ))}
                                {/* 空スロットの穴埋め */}
                                {[...Array(Math.max(0, SETLIST_TRACK_COUNT - exportData.songs.length))].map((_, i) => (
                                    <div key={`exp-jack-empty-${i}`} className="export-jacket-box opacity-20 border-dashed border-white"></div>
                                ))}
                            </div>

                            <div className="export-info-list">
                                {exportData.songs.map((song, i) => (
                                    <div key={`exp-info-${i}`} className="export-info-row" style={{ borderLeft: `14px solid #000` }}>
                                        <div className="export-info-main">
                                            <div className="export-info-num">#{i + 1}</div>
                                            <div className="export-info-title">{song.title}</div>
                                        </div>
                                        <div className="export-info-meta">
                                            <span style={{ color: '#000' }}>Lv {formatLevel(song.level)}</span>
                                            <span style={{ color: getBorderColor(song.difficult) }}>{song.difficult}</span>
                                            <span style={{ color: '#000' }}>BPM {song.bpm}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {authError && (
                        <div className="error-toast" onClick={() => setAuthError(null)}>
                            <div className="flex flex-col items-center gap-2">
                                <i className="ph-bold ph-warning-circle text-2xl"></i>
                                <p>{authError}</p>
                                <span className="text-[10px] opacity-70 mt-1">[タップで閉じる]</span>
                            </div>
                        </div>
                    )}

                    {saveError && (
                        <div className="error-toast" onClick={() => setSaveError(null)}>
                            <div className="flex flex-col items-center gap-2">
                                <i className="ph-bold ph-cloud-slash text-2xl"></i>
                                <p>{saveError}</p>
                                <span className="text-[10px] opacity-70 mt-1">[タップで閉じる]</span>
                            </div>
                        </div>
                    )}

                    <div className="fixed top-4 left-4 z-50">
                        <div className="nav-dropdown">
                            <button onClick={() => setIsNavOpen(!isNavOpen)} className="nav-btn">
                                <i className="ph-bold ph-list text-xl"></i>
