                                                        <p>Googleログイン等の認証情報の管理はユーザー自身の責任で行ってください。運営側でユーザーのパスワードを保持することはありません。</p>

                                                        <h4 className="font-black border-l-4 border-[#52b788] pl-2 mt-4 text-sm uppercase">禁止事項</h4>
                                                        <p>サーバーに過度な負荷をかける行為（自動プログラムによる取得など）や、公序良俗に反する内容をメモやセトリ名に登録する行為を禁止します。</p>

                                                        <h4 className="font-black border-l-4 border-[#52b788] pl-2 mt-4 text-sm uppercase">情報の正確性について</h4>
                                                        <p>提供する情報の正確性には細心の注意を払っていますが、手動入力による誤りが含まれる可能性があります。情報の利用はユーザー自身の判断で行ってください。</p>
                                                    </div>
                                                )}
                                                
                                                {termsTab === "privacy" && (
                                                    <div className="animate-in fade-in duration-300">
                                                        <h3 className="text-base font-black border-b-2 border-gray-100 pb-2 mb-4">プライバシーポリシー</h3>

                                                        <h4 className="font-black border-l-4 border-[#52b788] pl-2 text-sm uppercase">情報の取得について</h4>
                                                        <p>本サービスでは、Googleログインの際に、ユーザーの識別、およびデータの紐付けを目的として、Googleアカウントに登録されているユーザー名、メールアドレス、プロフィール画像、およびサービス固有の識別子（UID）を取得します。</p>

                                                        <h4 className="font-black border-l-4 border-[#52b788] pl-2 mt-4 text-sm uppercase">情報の利用目的</h4>
                                                        <p>取得した情報は、以下の目的でのみ利用します。<br/>1.ユーザーの認証、および本人確認のため<br/>2.ユーザーが作成したデータ（メモ、セトリ、お気に入り等）をサーバーに保存し、異なるデバイス間で同期するため</p>

                                                        <h4 className="font-black border-l-4 border-[#52b788] pl-2 mt-4 text-sm uppercase">データの保存と管理</h4>
                                                        <p>本サービスでは、Googleが提供する Firebase（Firestore）を利用してデータを保存・管理しています。ユーザーの パスワードを本サービス側で直接取得・保持することはありません。</p>

                                                        <h4 className="font-black border-l-4 border-[#52b788] pl-2 mt-4 text-sm uppercase">第三者への情報提供</h4>
                                                        <p>取得した個人情報を、法令に基づく場合を除き、ユーザーの同意なく第三者に提供することはありません。</p>

                                                        <h4 className="font-black border-l-4 border-[#52b788] pl-2 mt-4 text-sm uppercase">クッキー（Cookie）等の利用</h4>
                                                        <p>本サービスでは、ログイン状態の保持や利便性の向上のため、Cookieまたはそれに準ずる技術を利用する場合があります。</p>
                                                    </div>
                                                )}

                                                {termsTab === "credits" && (
                                                    <div className="animate-in fade-in duration-300">
                                                        <h3 className="text-base font-black border-b-2 border-gray-100 pb-2 mb-4">クレジット</h3>

                                                        <h4 className="font-black border-l-4 border-[#52b788] pl-2 text-sm uppercase">運営メンバー</h4>
                                                        <ul className="list-disc list-inside space-y-1 text-sm">
                                                            <li>代表：悠（@YuSDVX）</li>
                                                            <li>開発・企画立案：おさとう（@0sattto）</li>
                                                            <li>開発・運営：Yuya_M（@Yuuya1202）</li>
                                                            <li>動画編集：加藤（@katosv_）</li>
                                                            <li>データ協力：かめ（@kame_ver2）</li>
                                                            <li>データ協力：えーこぱふ（@eikopaf）</li>
                                                            <li>データ協力：あめじすと（@4methyst____）</li>
                                                            <li>データ協力：たび（@traveler8）</li>
                                                            <li>データ協力：ぜむ（@them_suzaku）</li>
                                                            <li>データ協力：imura（@freaky_s_ran）</li>
                                                            <li>データ協力：ひらつ（@963sv）</li>
                                                            <li>データ協力：ばる（@Baltin129_）</li>
                                                            <li>データ協力：あせろら（@aserora_yoo）</li>
                                                            <li>データ協力：こよみ（@nt_kym2）</li>
                                                            <li>データ協力：PAN.GOD（@-）</li>
                                                            <li>データ協力：核（@-）</li>
                                                        </ul>

                                                        <h4 className="font-black border-l-4 border-[#52b788] pl-2 mt-6 text-sm uppercase">使用ライブラリ</h4>
                                                        <ul className="list-disc list-inside space-y-1 text-sm">
                                                            <li>React (MIT License)</li>
                                                            <li>Tailwind CSS (MIT License)</li>
                                                            <li>Phosphor Icons (MIT License)</li>
                                                            <li>Firebase SDK (Apache License 2.0)</li>
                                                            <li>Babel (MIT License)</li>
                                                            <li>html2canvas (MIT License)</li>
                                                        </ul>

                                                        <h4 className="font-black border-l-4 border-[#52b788] pl-2 mt-6 text-sm uppercase">使用フォント</h4>
                                                        <ul className="list-disc list-inside space-y-1 text-sm">
                                                            <li>M PLUS Rounded 1c (SIL Open Font License)</li>
                                                        </ul>
                                                    </div>
                                                )}
                                                
                                                <p className="mt-8 text-[10px] text-gray-400 text-center italic">※記載内容は予告なく更新される場合があります。</p>
                                            </div>
                                        </div>
                                        <div className="mt-8 flex justify-center">
                                            <button onClick={() => setCurrentPage("main")} className="page-btn">
                                                メインページに戻る
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {currentPage === "ranking" && (
                                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                        {paginatedSongs.map((song, idx) => {
                                            const globalIdx = (pageIndex - 1) * itemsPerPage + idx;
                                            let currentRank = globalIdx + 1;
                                            if (globalIdx > 0) {
                                                let backtrackIdx = globalIdx;
                                                while (backtrackIdx > 0 && allFilteredSongs[backtrackIdx]._displayCombo === allFilteredSongs[backtrackIdx - 1]._displayCombo) backtrackIdx--;
                                                currentRank = backtrackIdx + 1;
                                            }
                                            const isTopThree = currentRank <= 3;
                                            return (
                                                <div key={idx} className="ranking-row">
                                                    <div className={`rank-number ${isTopThree ? `rank-${currentRank}` : ''}`}>#{currentRank}</div>
                                                    <div className="flex-grow min-w-0 px-2">
                                                        <p className="text-sm font-black leading-tight break-words">{song.title}</p>
                                                        <p className="text-[10px] font-bold text-black uppercase tracking-tighter mt-0.5">
                                                            Lv {formatLevel(song.level)} <span style={{ color: getBorderColor(song.difficult) }}>{song.difficult}</span>
                                                        </p>
                                                    </div>
                                                    <div className="text-right flex-shrink-0">
                                                        <span className="text-xl font-black text-black">{song._displayCombo}</span>
                                                        <span className="text-[10px] font-black ml-1 uppercase text-[#132a13]">CHAIN</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}

                                {currentPage === "random" && (
                                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 mt-1">
                                        {randomSongs.length > 0 ? (
                                            randomSongs.map((song, idx) => (
                                                <div key={`random-group-${idx}`} className="mb-1">
                                                    <div className="flex items-center gap-2 mb-0.5 ml-1">
                                                        <div className="bg-black text-white text-[8px] font-black px-1.5 py-0.5 rounded transform -rotate-1">
                                                            TRACK {idx + 1}
                                                        </div>
                                                    </div>
                                                    <SongCard 
                                                        key={`random-${getSongId(song)}-${idx}`} 
                                                        song={song} 
                                                        isLoggedIn={false}
                                                        isFavorite={false}
                                                        onToggleFavorite={() => {}}
                                                        isMirror={false}
                                                        onToggleMirror={() => {}}
                                                        personalMemo={null}
                                                        onSavePersonalMemo={() => {}}
                                                        tightMode={true}
                                                        minimalMode={true}
                                                    />
                                                </div>
                                            ))
                                        ) : (
                                            hasGeneratedRandom && !isGenerating && (
                                                <div className="text-center py-20 bg-white/10 border-4 border-white/20 border-dashed rounded-3xl">
                                                    <i className="ph-bold ph-dice-five text-4xl text-white/30 mb-4 block"></i>
                                                    <p className="font-black text-white/50 text-sm">条件に合う曲が不足しています</p>
                                                </div>
                                            )
                                        )}
                                    </div>
                                )}
                                
                                {currentPage !== "ranking" && currentPage !== "setlist" && currentPage !== "random" && currentPage !== "terms" && currentPage !== "contact" && (
                                    <div className={viewMode === 'grid' && currentPage === 'main' ? 'grid grid-cols-4 gap-2 animate-in fade-in duration-300' : 'animate-in fade-in duration-300'}>
                                        {paginatedSongs.map((song, idx) => {
                                            const songId = getSongId(song);
                                            return (
                                                <SongCard 
                                                    key={`${viewToken}-${songId}`} 
                                                    song={song} 
                                                    viewMode={currentPage === 'main' ? viewMode : 'list'}
                                                    showDangerBadge={currentPage === "danger"} 
                                                    showTips={currentPage === "danger"} 
                                                    isLoggedIn={currentPage !== "danger" && (user && !user.isAnonymous)}
                                                    isFavorite={favorites.includes(songId)}
                                                    onToggleFavorite={() => toggleFavorite(songId)}
                                                    isMirror={mirrors.includes(songId)}
                                                    onToggleMirror={() => toggleMirror(songId)}
                                                    personalMemo={personalMemos[songId]}
                                                    onSavePersonalMemo={(memo) => savePersonalMemo(songId, memo)}
                                                    onOpenGridDetail={() => setSelectedGridSong(song)}
                                                />
                                            );
                                        })}
                                    </div>
                                )}

                                {currentPage !== "setlist" && currentPage !== "random" && currentPage !== "terms" && currentPage !== "contact" && paginatedSongs.length === 0 && (
                                    <div className="text-center py-20 bg-white border-4 border-black border-dashed rounded-3xl">
                                        <i className="ph-bold ph-ghost text-4xl text-gray-300 mb-4 block"></i>
                                        <p className="font-black text-gray-400 text-sm">楽曲が見つかりません</p>
                                    </div>
                                )}

                                {currentPage !== "setlist" && currentPage !== "random" && currentPage !== "terms" && currentPage !== "contact" && totalPages > 1 && (
                                    <div className="pagination-container">
                                        <button onClick={() => handlePageChange(pageIndex - 1)} disabled={pageIndex <= 1} className="page-btn">
                                            <i className="ph-bold ph-caret-left"></i> 前へ
                                        </button>
                                        <div className="flex flex-col items-center gap-1">
                                            <select
                                                value={pageIndex}
                                                onChange={(e) => handlePageChange(Number(e.target.value))}
                                                className="page-info"
                                                style={{ cursor: 'pointer', appearance: 'none', WebkitAppearance: 'none', textAlign: 'center', paddingLeft: '14px', paddingRight: '14px' }}
                                            >
                                                {Array.from({ length: totalPages }, (_, i) => i + 1).map(p => (
                                                    <option key={p} value={p}>{p} / {totalPages}</option>
                                                ))}
                                            </select>
                                            <div className="text-[10px] font-bold text-white/70">
                                                {(pageIndex - 1) * itemsPerPage + 1}〜{Math.min(pageIndex * itemsPerPage, allFilteredSongs.length)}件 / 全{allFilteredSongs.length}件
                                            </div>
                                        </div>
                                        <button onClick={() => handlePageChange(pageIndex + 1)} disabled={pageIndex >= totalPages} className="page-btn">
                                            次へ <i className="ph-bold ph-caret-right"></i>
                                        </button>
                                    </div>
                                )}
                            </>
                        )}
                    </main>

                    <footer className="text-center py-6 mt-4">
                        <p className="text-white/40 text-[11px] font-bold">
                            データ最終更新日: {MASTER_DATA_UPDATED_AT}
                        </p>
                    </footer>

                    {/* --- グリッドモード用楽曲詳細 --- */}
                    {selectedGridSong && (
                        <SongDetailModal 
                            isOpen={!!selectedGridSong}
                            song={selectedGridSong}
                            isLoggedIn={user && !user.isAnonymous}
                            isFavorite={favorites.includes(getSongId(selectedGridSong))}
                            onToggleFavorite={() => toggleFavorite(getSongId(selectedGridSong))}
                            isMirror={mirrors.includes(getSongId(selectedGridSong))}
                            onToggleMirror={() => toggleMirror(getSongId(selectedGridSong))}
                            personalMemo={personalMemos[getSongId(selectedGridSong)]}
                            onSavePersonalMemo={(memo) => savePersonalMemo(getSongId(selectedGridSong), memo)}
                            onCancel={() => setSelectedGridSong(null)}
                        />
                    )}

                    <LogoutConfirmModal 
                        isOpen={isLogoutModalOpen}
                        onConfirm={logout}
                        onCancel={() => setIsLogoutModalOpen(false)}
                    />

                    <ImagePreviewModal 
                        isOpen={!!previewUrl}
                        imageUrl={previewUrl}
                        onCancel={handleClosePreview}
                    />

                    <LinkConfirmModal 
                        isOpen={contactLinkModal.isOpen}
                        onConfirm={() => { window.open(contactLinkModal.url, '_blank', 'noopener,noreferrer'); setContactLinkModal({ ...contactLinkModal, isOpen: false }); }}
                        onCancel={() => setContactLinkModal({ ...contactLinkModal, isOpen: false })}
                        type={contactLinkModal.type}
                    />

                    <ViewModeSelectModal 
                        isOpen={isViewModeModalOpen}
                        viewMode={viewMode}
                        onSelect={setViewMode}
                        onCancel={() => setIsViewModeModalOpen(false)}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
