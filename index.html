                                            )}
                                        </div>
                                    );
                                })()}

                                {currentPage !== "ranking" && currentPage !== "setlist" && currentPage !== "random" && currentPage !== "terms" && currentPage !== "contact" && currentPage !== "simulation" && currentPage !== "bpl" && currentPage !== "futaba" && (
                                    <div className={viewMode === 'grid' && currentPage === 'main' ? 'grid grid-cols-4 gap-2 animate-in fade-in duration-300' : 'animate-in fade-in duration-300'}>
                                        {paginatedSongs.map((song, idx) => {
                                            const songId = getSongId(song);
                                            return (
                                                <SongCard 
                                                    key={`${viewToken}-${songId}`} 
                                                    song={song} 
                                                    viewMode={currentPage === 'main' ? viewMode : 'list'}
                                                    showDangerBadge={currentPage === "danger"} 
                                                    showTips={currentPage === "danger" || currentPage === "main"} 
                                                    showMemo={currentPage === "danger"}
                                                    isLoggedIn={currentPage !== "danger" && (user && !user.isAnonymous)}
                                                    isFavorite={favorites.includes(songId)}
                                                    onToggleFavorite={() => toggleFavorite(songId)}
                                                    mirrorData={mirrors[songId]}
                                                    onToggleMirror={(section) => toggleMirror(songId, section)}
                                                    personalMemo={personalMemos[songId]}
                                                    onSavePersonalMemo={(memo) => savePersonalMemo(songId, memo)}
                                                    onOpenGridDetail={() => setSelectedGridSong(song)}
                                                    lang={lang}
                                                />
                                            );
                                        })}
                                    </div>
                                )}

                                {currentPage !== "setlist" && currentPage !== "random" && currentPage !== "terms" && currentPage !== "contact" && currentPage !== "simulation" && currentPage !== "bpl" && currentPage !== "futaba" && paginatedSongs.length === 0 && (
                                    <div className="text-center py-20 bg-white border-4 border-black border-dashed rounded-3xl">
                                        <i className="ph-bold ph-ghost text-4xl text-gray-300 mb-4 block"></i>
                                        <p className="font-black text-gray-400 text-sm">{t(lang,'common_not_found')}</p>
                                    </div>
                                )}

                                {currentPage !== "setlist" && currentPage !== "random" && currentPage !== "terms" && currentPage !== "contact" && currentPage !== "simulation" && currentPage !== "bpl" && currentPage !== "futaba" && totalPages > 1 && (
                                    <div className="pagination-container">
                                        <button onClick={() => handlePageChange(pageIndex - 1)} disabled={pageIndex <= 1} className="page-btn">
                                            <i className="ph-bold ph-caret-left"></i> {t(lang,'common_prev')}
                                        </button>
                                        <div className="flex flex-col items-center gap-1">
                                            <select
                                                value={pageIndex}
                                                onChange={(e) => handlePageChange(Number(e.target.value))}
                                                className="page-info"
                                                style={{ cursor: 'pointer', appearance: 'none', WebkitAppearance: 'none', textAlign: 'center', paddingLeft: '14px', paddingRight: '14px' }}
                                            >
                                                {Array.from({ length: totalPages }, (_, i) => i + 1).map(p => (
                                                    <option key={p} value={p}>{p} / {totalPages}</option>
                                                ))}
                                            </select>
                                            <div className="text-[10px] font-bold text-white/70">
                                                {t(lang,'common_page_info',{start:(pageIndex-1)*itemsPerPage+1,end:Math.min(pageIndex*itemsPerPage,allFilteredSongs.length),total:allFilteredSongs.length})}
                                            </div>
                                        </div>
                                        <button onClick={() => handlePageChange(pageIndex + 1)} disabled={pageIndex >= totalPages} className="page-btn">
                                            {t(lang,'common_next')} <i className="ph-bold ph-caret-right"></i>
                                        </button>
                                    </div>
                                )}
                            </>
                        )}
                    </main>



                    {/* --- グリッドモード用楽曲詳細 --- */}
                    {selectedGridSong && (
                        <SongDetailModal 
                            isOpen={!!selectedGridSong}
                            song={selectedGridSong}
                            isLoggedIn={user && !user.isAnonymous}
                            isFavorite={favorites.includes(getSongId(selectedGridSong))}
                            onToggleFavorite={() => toggleFavorite(getSongId(selectedGridSong))}
                            mirrorData={mirrors[getSongId(selectedGridSong)]}
                            onToggleMirror={(section) => toggleMirror(getSongId(selectedGridSong), section)}
                            personalMemo={personalMemos[getSongId(selectedGridSong)]}
                            onSavePersonalMemo={(memo) => savePersonalMemo(getSongId(selectedGridSong), memo)}
                            onCancel={() => setSelectedGridSong(null)}
                            showMemo={false}
                        />
                    )}

                    <LangSelectModal isOpen={isLangModalOpen} currentLang={lang} onSelect={saveLang} onClose={() => setIsLangModalOpen(false)} lang={lang} />

                    <FutabaPasswordModal
                        isOpen={isFutabaModalOpen}
                        onClose={() => { setIsFutabaModalOpen(false); setSearchTerm(""); }}
                        passwordInput={futabaPasswordInput}
                        setPasswordInput={setFutabaPasswordInput}
                        onSubmit={handleFutabaSubmit}
                        hasError={futabaPasswordError}
                        unlockSuccess={futabaUnlockSuccess}
                    />

                    <LogoutConfirmModal 
                        lang={lang}
                        isOpen={isLogoutModalOpen}
                        onConfirm={logout}
                        onCancel={() => setIsLogoutModalOpen(false)}
                    />

                    <InAppBrowserModal
                        lang={lang}
                        isOpen={isInAppBrowserModalOpen}
                        onClose={() => setIsInAppBrowserModalOpen(false)}
                    />

                    <ImagePreviewModal 
                        lang={lang}
                        isOpen={!!previewUrl}
                        imageUrl={previewUrl}
                        onCancel={handleClosePreview}
                    />

                    <LinkConfirmModal 
                        isOpen={contactLinkModal.isOpen}
                        onConfirm={() => { window.open(contactLinkModal.url, '_blank', 'noopener,noreferrer'); setContactLinkModal({ ...contactLinkModal, isOpen: false }); }}
                        onCancel={() => setContactLinkModal({ ...contactLinkModal, isOpen: false })}
                        type={contactLinkModal.type}
                        lang={lang}
                    />

                    <FilterModal
                        lang={lang}
                        isOpen={isFilterModalOpen}
                        onClose={() => setIsFilterModalOpen(false)}
                        currentPage={currentPage}
                        user={user}
                        selectedLevels={selectedLevels}
                        toggleLevel={toggleLevel}
                        selectedDifficulties={selectedDifficulties}
                        toggleDifficulty={toggleDifficulty}
                        selectedVersions={selectedVersions}
                        toggleVersion={toggleVersion}
                        selectedBplSections={selectedBplSections}
                        toggleBplSection={toggleBplSection}
                        showOnlyFavorites={showOnlyFavorites}
                        setShowOnlyFavorites={setShowOnlyFavorites}
                        showOnlyMirrors={showOnlyMirrors}
                        setShowOnlyMirrors={setShowOnlyMirrors}
                        isFilterActive={isFilterActive}
                        LV17_LIST={LV17_LIST}
                        LV18_LIST={LV18_LIST}
                        LV19_LIST={LV19_LIST}
                        LV20_LIST={LV20_LIST}
                        FilterButton={FilterButton}
                        LevelSectionHeader={LevelSectionHeader}
                        bpmMin={bpmMin}
                        setBpmMin={setBpmMin}
                        bpmMax={bpmMax}
                        setBpmMax={setBpmMax}
                        selectedFutabaSections={selectedFutabaSections}
                        toggleFutabaSection={toggleFutabaSection}
                        isHiddenUnlocked={isHiddenUnlocked}
                        FUTABA_FUTURE_FLAG={FUTABA_FUTURE_FLAG}
                    />

                </div>
            );
        };

        // ===== シミュレーションページ =====
        const SimulationPage = ({ setlists, songMap, user, lang = 'ja' }) => {
            const [phase, setPhase] = useState("top");

            const [side, setSide] = useState("先攻");
            const [selectedSetlistId, setSelectedSetlistId] = useState("");
            const [introOutroSongId, setIntroOutroSongId] = useState("");

            const [turn, setTurn] = useState(1);
            const [myStars, setMyStars] = useState(0);
            const [opponentStars, setOpponentStars] = useState(0);
            const [usedMySongIds, setUsedMySongIds] = useState([]);
            const [history, setHistory] = useState([]);

            const [currentSongId, setCurrentSongId] = useState("");
            const [myGear, setMyGear] = useState(0);
            const [oppGear, setOppGear] = useState(0);
            const [result, setResult] = useState("");
            const [validationMsg, setValidationMsg] = useState("");


            const selectedSetlist = setlists.find(s => s.id === selectedSetlistId);
            const setlistSongs = selectedSetlist
                ? selectedSetlist.songs.map(id => songMap[id]).filter(Boolean)
                : [];

            const isIntroOutroTurn = (t) =>
                (t === 1 && side === "後攻") || (t === 12 && side === "先攻");
            const isMySongTurn = (t) => side === "先攻" ? [2,4,6,8,10,12].includes(t) : [1,3,5,7,9,11].includes(t);
            const isMySelectTurn = (t) => side === "先攻" ? [2,4,6,8,10].includes(t) : [3,5,7,9,11].includes(t);

            const getTurnLabel = (tn) => {
                if (tn === 1 && side === "先攻") return t(lang,"sim_turn_intro_opp");
                if (tn === 1 && side === "後攻") return t(lang,"sim_turn_intro_my");
                if (tn === 12 && side === "先攻") return t(lang,"sim_turn_outro_my");
                if (tn === 12 && side === "後攻") return t(lang,"sim_turn_outro_opp");
                return isMySongTurn(tn) ? t(lang,"sim_turn_my_song") : t(lang,"sim_turn_opp_song");
            };

            const calcStars = (myG, oppG, res) => {
                let myAdd = 0, oppAdd = 0;
                const bm = {1:2, 2:5, 3:8};
                if (myG === 0 && oppG === 0) {
                    if (res === "win") myAdd = 1; else if (res === "lose") oppAdd = 1; else { myAdd = 1; oppAdd = 1; }
                } else if (myG > 0 && oppG === 0) {
                    if (res === "win") myAdd = bm[myG]; else if (res === "lose") oppAdd = 1; else myAdd = bm[myG];
                } else if (myG === 0 && oppG > 0) {
                    if (res === "win") myAdd = 1; else if (res === "lose") oppAdd = bm[oppG]; else oppAdd = bm[oppG];
                } else {
                    if (res === "win") myAdd = bm[myG]; else if (res === "lose") oppAdd = bm[oppG]; else { myAdd = bm[myG]; oppAdd = bm[oppG]; }
                }
                return { myAdd, oppAdd };
            };

            const handleStart = () => {
                if (!selectedSetlistId || !introOutroSongId) return;
                setPhase("battle"); setTurn(1); setMyStars(0); setOpponentStars(0);
                setUsedMySongIds([]); setHistory([]); setCurrentSongId("");
                setMyGear(0); setOppGear(0); setResult(""); setValidationMsg("");
            };

            const handleTurnSubmit = () => {
                const mySelect = isMySelectTurn(turn);
                const missing = [];
                if (mySelect && !currentSongId) missing.push(t(lang,"sim_validation_song"));
                if (!result) missing.push(t(lang,'sim_result_label'));
                if (missing.length > 0) { setValidationMsg(t(lang,"sim_validation_missing",{items: missing.join("・")})); return; }
                setValidationMsg("");

                const myIntroOutro = isIntroOutroTurn(turn);
                const { myAdd, oppAdd } = calcStars(myGear, oppGear, result);
                const newMyStars = myStars + myAdd;
                const newOppStars = opponentStars + oppAdd;
                setMyStars(newMyStars);
                setOpponentStars(newOppStars);

                let songTitle, songForHistory;
                if (myIntroOutro) {
                    songForHistory = songMap[introOutroSongId];
                    songTitle = songForHistory ? songForHistory.title : "（設定曲）";
                } else if (mySelect) {
                    songForHistory = songMap[currentSongId];
                    songTitle = songForHistory ? songForHistory.title : "（未選択）";
                } else {
                    songForHistory = null; songTitle = t(lang,"sim_opp_song_history");
                }

                const newEntry = {
                    turn, isMine: isMySongTurn(turn),
                    songTitle, songId: mySelect ? currentSongId : null,
                    songJacket: songForHistory ? songForHistory.jacket : null,
                    songLevel: songForHistory ? songForHistory.level : null,
                    songDifficult: songForHistory ? songForHistory.difficult : null,
                    myGear, oppGear, result, myAdd, oppAdd,
                    myTotal: newMyStars, oppTotal: newOppStars,
                    prevMyStars: myStars, prevOppStars: opponentStars,
                };

                if (mySelect && currentSongId) setUsedMySongIds(prev => [...prev, currentSongId]);
                setHistory(prev => [...prev, newEntry]);

                if (turn >= 12) {
                    setPhase("result");
                } else {
                    setTurn(t => t + 1);
                    setCurrentSongId(""); setMyGear(0); setOppGear(0); setResult("");
                }
            };

            // 1ターン戻る
            const handleGoBack = () => {
                if (history.length === 0) { setPhase("setup"); return; }
                const prev = history[history.length - 1];
                setMyStars(prev.prevMyStars);
                setOpponentStars(prev.prevOppStars);
                if (prev.songId) setUsedMySongIds(ids => { const newIds = [...ids]; const i = newIds.lastIndexOf(prev.songId); if (i !== -1) newIds.splice(i, 1); return newIds; });
                setHistory(h => h.slice(0, -1));
                setTurn(prev.turn);
                setCurrentSongId(prev.songId || "");
                setMyGear(prev.myGear); setOppGear(prev.oppGear); setResult(prev.result);
                setValidationMsg("");
            };

            // リザルトから12ターン目に戻る
            const handleBackToLastTurn = () => {
                if (history.length === 0) return;
                const last = history[history.length - 1];
                setMyStars(last.prevMyStars);
                setOpponentStars(last.prevOppStars);
                if (last.songId) setUsedMySongIds(ids => { const newIds = [...ids]; const i = newIds.lastIndexOf(last.songId); if (i !== -1) newIds.splice(i, 1); return newIds; });
                setHistory(h => h.slice(0, -1));
                setTurn(last.turn);
                setCurrentSongId(last.songId || "");
                setMyGear(last.myGear); setOppGear(last.oppGear); setResult(last.result);
                setValidationMsg(""); setPhase("battle");
            };

            const handleReset = () => {
                setPhase("top"); setSelectedSetlistId(""); setIntroOutroSongId(""); setSide("先攻");
                setTurn(1); setMyStars(0); setOpponentStars(0); setUsedMySongIds([]); setHistory([]);
                setCurrentSongId(""); setMyGear(0); setOppGear(0); setResult(""); setValidationMsg("");
            };

            const availableSongs = setlistSongs.filter(s => !usedMySongIds.includes(`${s.title}_${s.difficult}`));

            const resultBtnClass = (val) =>
                `flex-1 py-3 rounded-xl font-black text-sm border-2 border-black transition-all ${result === val ? 'bg-[#6366f1] text-white shadow-[2px_2px_0px_#3730a3]' : 'bg-white text-black'}`;
            const gearBtnClass = (val, cur) =>
                `flex-1 py-2 rounded-lg font-black text-xs border-2 border-black transition-all ${cur === val ? 'bg-[#6366f1] text-white shadow-[2px_2px_0px_#000]' : 'bg-white text-black'}`;

            // リザルト行コンポーネント（グレー系×青×赤、ポイント依存ハイライト）
            const getDiffColor = (diff) => {
                if (String(diff).toUpperCase() === 'MXM') return '#ffffff';
                return getBorderColor(diff);
            };
            const ResultRow = ({ h }) => {
                const isIO = h.turn === 1 || h.turn === 12;
                const resultColor = h.result === 'win' ? '#38bdf8' : h.result === 'lose' ? '#f87171' : '#aaaaaa';
                const youGotPoints = h.myAdd > 0;
                const oppGotPoints = h.oppAdd > 0;
                // ④レイアウト：元に戻す（1段横並び）
                return (
                    <div style={{display:'flex',alignItems:'center',background:'#585858',border:'1px solid #686868',borderRadius:'6px',marginBottom:'3px',minHeight:'46px',overflow:'hidden',fontFamily:'inherit'}}>
                        {/* 番号 */}
                        <div style={{width:'26px',flexShrink:0,textAlign:'center',color: isIO ? '#fbbf24' : '#dddddd',fontSize:'11px',fontWeight:900,fontStyle:'italic',padding:'0 3px'}}>{h.turn}</div>
                        {/* ジャケット＋曲情報 */}
                        <div style={{display:'flex',alignItems:'center',flex:1,minWidth:0,gap:'6px',padding:'4px 4px 4px 0'}}>
                            {h.songJacket ? (
                                <img src={h.songJacket} style={{width:'36px',height:'36px',borderRadius:'4px',objectFit:'cover',flexShrink:0,border:`2px solid ${getDiffColor(h.songDifficult)}`}} crossOrigin="anonymous" onError={e=>{e.target.style.display='none';}} />
                            ) : (
                                <div style={{width:'36px',height:'36px',borderRadius:'4px',background:'#777',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid #888'}}>
                                    <i className="ph-bold ph-user" style={{color:'#aaa',fontSize:'14px'}}></i>
                                </div>
                            )}
                            <div style={{minWidth:0,flex:1}}>
                                <div style={{color:'#ffffff',fontSize:'11px',fontWeight:900,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',lineHeight:1.2,marginBottom:'3px'}}>{h.songTitle}</div>
                                <div style={{display:'flex',gap:'4px',alignItems:'center'}}>
                                    {h.songDifficult ? (
                                        <>
                                            <DiffBadge diff={h.songDifficult} />
                                            {h.songLevel && <span style={{fontSize:"8px",color:"#cccccc",fontWeight:700}}>{formatLevel(h.songLevel)}</span>}
                                        </>
                                    ) : (
                                        <span style={{fontSize:"8px",color:"#999"}}>-</span>
                                    )}
                                </div>
                            </div>
                        </div>
                        {/* YOU側（ポイント獲得時に明るい青ハイライト） */}
                        <div style={{width:'86px',flexShrink:0,background: youGotPoints ? '#618fcf' : '#505050',borderLeft:'1px solid #686868',padding:'3px 6px',display:'flex',flexDirection:'column',alignItems:'flex-start',justifyContent:'center',gap:'1px'}}>
                            <div style={{display:'flex',alignItems:'center',gap:'3px',flexWrap:'wrap'}}>
                                {h.myGear > 0 && <span style={{background:'#2563eb',color:'#fff',fontSize:'7px',fontWeight:900,padding:'1px 3px',borderRadius:'3px'}}>EG{h.myGear}</span>}
                                {/* +0★は非表示 */}
                                {h.myAdd > 0 && <span style={{color:'#fbbf24',fontSize:'11px',fontWeight:900,lineHeight:1}}>+{h.myAdd}★</span>}
                            </div>
                            <div style={{color:'#dddddd',fontSize:'8px',fontWeight:700}}>計 {h.myTotal}★</div>
                        </div>
                        {/* 結果バッジ */}
                        <div style={{width:'26px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',borderLeft:'1px solid #686868',borderRight:'1px solid #686868',background:'#484848'}}>
                            <span style={{fontSize:'10px',fontWeight:900,color:resultColor}}>{h.result === 'win' ? 'W' : h.result === 'lose' ? 'L' : 'D'}</span>
                        </div>
                        {/* OPP側（ポイント獲得時に明るい赤ハイライト） */}
                        <div style={{width:'86px',flexShrink:0,background: oppGotPoints ? '#db6767' : '#505050',padding:'3px 6px',display:'flex',flexDirection:'column',alignItems:'flex-end',justifyContent:'center',gap:'1px'}}>
                            <div style={{display:'flex',alignItems:'center',gap:'3px',flexWrap:'wrap',justifyContent:'flex-end'}}>
                                {/* +0★は非表示 */}
                                {h.oppAdd > 0 && <span style={{color:'#fbbf24',fontSize:'11px',fontWeight:900,lineHeight:1}}>+{h.oppAdd}★</span>}
                                {h.oppGear > 0 && <span style={{background:'#dc2626',color:'#fff',fontSize:'7px',fontWeight:900,padding:'1px 3px',borderRadius:'3px'}}>EG{h.oppGear}</span>}
                            </div>
                            <div style={{color:'#dddddd',fontSize:'8px',fontWeight:700,textAlign:'right'}}>計 {h.oppTotal}★</div>
                        </div>
                    </div>
                );
            };

            // デフォルト曲の自動選択
            useEffect(() => {
                if (phase !== "battle") return;
                if (!isMySelectTurn(turn)) return;
                if (currentSongId) return;
                const firstAvailable = setlistSongs.find(s => !usedMySongIds.includes(`${s.title}_${s.difficult}`));
                if (firstAvailable) {
                    setCurrentSongId(`${firstAvailable.title}_${firstAvailable.difficult}`);
                }
            }, [turn, phase]);

            // ===== TOP =====
            if (phase === "top") return (
                <div className="animate-in fade-in slide-in-from-top-4 duration-500 text-left px-1 mb-4">
                    <div className="flex items-center gap-2 mb-4">
                        <i className="ph-fill ph-sword text-3xl text-[#a78bfa]"></i>
                        <h2 className="text-2xl font-black italic text-white uppercase tracking-tighter">{t(lang,'sim_title')}</h2>
                    </div>
                    {/* 補足テキスト（要注意リスト・ランダム選曲と同スタイル） */}
                    <div className="bg-white/10 p-5 rounded-2xl border border-white/10 backdrop-blur-md mb-3 text-white">
                        <div className="text-[12px] font-black leading-relaxed space-y-1">
                            <p>{t(lang,'sim_desc1')}</p>
                            <p>{t(lang,'sim_desc2')}</p>
                            <p></p>
                            <p style={{marginTop:'4px'}}>{t(lang,'sim_desc3')}</p>
                        </div>
                    </div>
                    {setlists.length === 0 ? (
                        <div className="text-center py-8 bg-white border-4 border-dashed border-gray-200 rounded-2xl">
                            <i className="ph-bold ph-list-numbers text-4xl text-gray-300 mb-3 block"></i>
                            <p className="font-black text-gray-400 text-sm mb-1">{t(lang,'sim_no_setlist')}</p>
                            <p className="text-xs text-gray-400 font-bold">{t(lang,'sim_no_setlist_sub')}</p>
                        </div>
                    ) : (
                        <button onClick={() => setPhase("setup")} className="w-full bg-[#6366f1] text-white font-black py-4 rounded-2xl border-4 border-black shadow-[6px_6px_0px_#000] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all text-base flex items-center justify-center gap-2">
                            <i className="ph-bold ph-play-circle text-xl"></i>{t(lang,'sim_start_btn')}
                        </button>
                    )}
                </div>
            );

            // ===== SETUP =====
            if (phase === "setup") {
                const introOutroLabel = side === "先攻" ? t(lang,"sim_intro_label_first") : t(lang,"sim_intro_label_second");
                const introOutroDesc = side === "先攻"
                    ? t(lang,"sim_intro_desc_first")
                    : t(lang,"sim_intro_desc_second");
                const canStart = selectedSetlistId && introOutroSongId;
                return (
                    <div className="animate-in fade-in slide-in-from-top-4 duration-500 text-left px-1 mb-4">
                        <div className="flex items-center gap-2 mb-4">
                            <i className="ph-fill ph-gear text-3xl text-[#a78bfa]"></i>
                            <h2 className="text-2xl font-black italic text-white uppercase tracking-tighter">{t(lang,'sim_title')}</h2>
                        </div>
                        <div className="bg-white border-4 border-black rounded-3xl p-5 shadow-[8px_8px_0px_#000] space-y-6">
                            <div>
                                <p className="section-label mb-3">{t(lang,"sim_setup_step1")}</p>
                                <div className="toggle-btn-group">
                                    <button onClick={() => { setSide("先攻"); setIntroOutroSongId(""); }} className={`toggle-btn-small ${side === "先攻" ? 'active' : ''}`}><i className="ph-bold ph-arrow-right"></i> {t(lang,'sim_first')}</button>
                                    <button onClick={() => { setSide("後攻"); setIntroOutroSongId(""); }} className={`toggle-btn-small ${side === "後攻" ? 'active' : ''}`}><i className="ph-bold ph-arrow-left"></i> {t(lang,'sim_second')}</button>
                                </div>
                            </div>
                            <div>
                                <p className="section-label mb-3">{t(lang,"sim_setup_step2")}</p>
                                <div className="flex flex-col gap-2">
                                    {setlists.filter(sl => !sl.isDraft).map(sl => (
                                        <button key={sl.id} onClick={() => { setSelectedSetlistId(sl.id); setIntroOutroSongId(""); }}
                                            className={`w-full text-left px-4 py-3 rounded-xl border-2 font-black text-sm transition-all ${selectedSetlistId === sl.id ? 'border-[#6366f1] bg-[#eef2ff] shadow-[3px_3px_0px_#6366f1]' : 'border-black bg-white shadow-[2px_2px_0px_#000]'}`}>
                                            <div className="flex items-center gap-2">
                                                <i className={`ph-bold ph-list-numbers ${selectedSetlistId === sl.id ? 'text-[#6366f1]' : 'text-black'}`}></i>{sl.name}
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            {selectedSetlistId && (
                                <div>
                                    <p className="section-label mb-1">3. {introOutroLabel}</p>
                                    <p className="text-[11px] text-gray-500 font-bold mb-3 leading-relaxed">{introOutroDesc}</p>
                                    <div className="grid grid-cols-5 gap-2">
                                        {setlistSongs.map(song => {
                                            const id = `${song.title}_${song.difficult}`;
                                            const sel = introOutroSongId === id;
                                            return (
                                                <button key={id} onClick={() => setIntroOutroSongId(id)} style={{aspectRatio:'1/1'}} className="relative">
                                                    <div style={{width:'100%',height:'100%',borderRadius:'8px',overflow:'hidden',border: sel ? '3px solid #6366f1' : '2px solid #000',boxShadow: sel ? '2px 2px 0px #6366f1' : '2px 2px 0px #000',position:'relative'}}>
                                                        {song.jacket ? <img src={song.jacket} style={{width:'100%',height:'100%',objectFit:'cover'}} crossOrigin="anonymous" onError={e=>{e.target.style.display='none';}} />
                                                            : <div style={{width:'100%',height:'100%',background:'#e5e7eb',display:'flex',alignItems:'center',justifyContent:'center'}}><i className="ph-bold ph-music-note" style={{color:'#9ca3af'}}></i></div>}
                                                        {sel && <div style={{position:'absolute',inset:0,background:'rgba(99,102,241,0.3)',display:'flex',alignItems:'center',justifyContent:'center'}}><i className="ph-fill ph-check-circle" style={{color:'#fff',fontSize:'20px'}}></i></div>}
                                                    </div>
                                                    <div style={{fontSize:'7px',fontWeight:900,textAlign:'center',marginTop:'2px',color:'#222',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{song.title.length > 8 ? song.title.slice(0,8)+'…' : song.title}</div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                            <div className="flex gap-3 pt-2">
                                <button onClick={() => setPhase("top")} className="flex-none px-4 py-3 bg-gray-100 border-2 border-black rounded-xl font-black text-sm shadow-[3px_3px_0px_#000] active:translate-y-0.5 active:shadow-none transition-all"><i className="ph-bold ph-arrow-left"></i></button>
                                <button onClick={handleStart} disabled={!canStart} className={`flex-1 py-3 rounded-xl font-black text-sm border-2 border-black transition-all flex items-center justify-center gap-2 ${canStart ? 'bg-[#6366f1] text-white shadow-[4px_4px_0px_#000] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                    <i className="ph-bold ph-play-circle"></i> {t(lang,'sim_go_start')}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ===== BATTLE =====
            if (phase === "battle") {
                const myTurn = isMySongTurn(turn);
                const mySelect = isMySelectTurn(turn);
                const myIntroOutro = isIntroOutroTurn(turn);
                const isLastTurn = turn === 12;
                const introOutroSong = songMap[introOutroSongId];
                const selectedSong = mySelect && currentSongId ? songMap[currentSongId] : null;

                return (
                    <div className="animate-in fade-in slide-in-from-top-4 duration-500 text-left px-1 mb-4">
                        {/* スコアボード */}
                        <div className="mb-3">
                            <div className="flex items-center gap-2 mb-2">
                                <i className="ph-fill ph-sword text-xl text-[#a78bfa]"></i>
                                <span className="text-base font-black italic text-white uppercase">{t(lang,'sim_battle_label')}</span>
                                <span className="ml-auto text-xs font-black text-white/60">{t(lang,'sim_turn_label').replace('{n}',String(turn))}</span>
                            </div>
                            <div className="bg-white border-4 border-black rounded-2xl p-3 shadow-[6px_6px_0px_#000] flex items-center gap-3">
                                <div className="flex-1 text-center">
                                    <div className="text-[9px] font-black text-gray-400 uppercase mb-0.5">YOU ({side})</div>
                                    <div className="text-3xl font-black text-black leading-none">{myStars}<span className="text-base ml-0.5">★</span></div>
                                </div>
                                <div className="text-xl font-black text-gray-300">VS</div>
                                <div className="flex-1 text-center">
                                    <div className="text-[9px] font-black text-gray-400 uppercase mb-0.5">OPP</div>
                                    <div className="text-3xl font-black text-black leading-none">{opponentStars}<span className="text-base ml-0.5">★</span></div>
                                </div>
                            </div>
                            <div className="mt-1.5 h-1.5 bg-white/20 rounded-full overflow-hidden">
                                <div className="h-full bg-[#a78bfa] rounded-full transition-all duration-500" style={{width:`${(turn/12)*100}%`}}></div>
                            </div>
                        </div>

                        {/* 入力カード */}
                        <div className="bg-white border-4 border-black rounded-3xl p-4 shadow-[8px_8px_0px_#000] space-y-4">
                            {/* ターンラベル + 戻るボタン */}
                            <div className="flex items-center justify-between gap-2">
                                <div className="flex items-center gap-2">
                                    <div className={`w-7 h-7 rounded-full flex items-center justify-center font-black text-xs border-2 border-black ${myTurn ? 'bg-[#6366f1] text-white' : 'bg-gray-200 text-black'}`}>{turn}</div>
                                    <div>
                                        <div className="font-black text-sm text-black">{getTurnLabel(turn)}</div>
                                        {(turn === 1 || turn === 12) && <div className="text-[10px] text-[#6366f1] font-black">{turn === 1 ? t(lang,'sim_turn_intro') : t(lang,'sim_turn_outro')}</div>}
                                    </div>
                                </div>
                                <button onClick={handleGoBack} className="flex items-center gap-1 text-[11px] font-black text-gray-500 bg-gray-100 border-2 border-gray-300 rounded-lg px-2 py-1 active:translate-y-0.5 transition-all flex-shrink-0">
                                    <i className="ph-bold ph-arrow-counter-clockwise text-xs"></i>
                                    {history.length === 0 ? t(lang,'sim_back_to_setup') : t(lang,'sim_go_back_1')}
                                </button>
                            </div>

                            {/* バリデーションメッセージ */}
                            {validationMsg && (
                                <div className="flex items-center gap-2 bg-red-50 border-2 border-red-400 rounded-xl px-3 py-2" style={{animation:'fadeIn 0.2s ease'}}>
                                    <i className="ph-bold ph-warning-circle text-red-500 text-sm flex-shrink-0"></i>
                                    <span className="text-xs font-black text-red-600">{validationMsg}</span>
                                </div>
                            )}

                            {/* 自選ターン：ジャケット選曲 */}
                            {mySelect && (
                                <div>
                                    <p className="section-label mb-2">{t(lang,"sim_song_select")}</p>
                                    <div className="grid grid-cols-5 gap-2">
                                        {setlistSongs.map(song => {
                                            const id = `${song.title}_${song.difficult}`;
                                            const used = usedMySongIds.includes(id);
                                            const picked = currentSongId === id;
                                            return (
                                                <button key={id} onClick={() => !used && setCurrentSongId(picked ? "" : id)} disabled={used} style={{aspectRatio:'1/1'}} className="relative">
                                                    <div style={{width:'100%',height:'100%',borderRadius:'8px',overflow:'hidden',border: picked ? '3px solid #6366f1' : used ? '2px solid #ccc' : '2px solid #000',boxShadow: picked ? '2px 2px 0px #6366f1' : used ? 'none' : '2px 2px 0px #000',opacity: used ? 0.35 : 1,cursor: used ? 'not-allowed' : 'pointer',position:'relative',transition:'all 0.1s'}}>
                                                        {song.jacket ? <img src={song.jacket} style={{width:'100%',height:'100%',objectFit:'cover',filter: used ? 'grayscale(100%)' : 'none'}} crossOrigin="anonymous" onError={e=>{e.target.style.display='none';}} />
                                                            : <div style={{width:'100%',height:'100%',background: used ? '#ddd' : '#e5e7eb',display:'flex',alignItems:'center',justifyContent:'center'}}><i className="ph-bold ph-music-note" style={{color: used ? '#aaa' : '#9ca3af'}}></i></div>}
                                                        {picked && <div style={{position:'absolute',inset:0,background:'rgba(99,102,241,0.25)',display:'flex',alignItems:'center',justifyContent:'center'}}><i className="ph-fill ph-check-circle" style={{color:'#fff',fontSize:'18px'}}></i></div>}
                                                        {used && <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.3)',display:'flex',alignItems:'center',justifyContent:'center'}}><i className="ph-bold ph-lock" style={{color:'#fff',fontSize:'14px'}}></i></div>}
                                                    </div>
                                                    <div style={{fontSize:'7px',fontWeight:900,textAlign:'center',marginTop:'2px',color: used ? '#aaa' : '#222',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{song.title.length > 8 ? song.title.slice(0,8)+'…' : song.title}</div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                    {selectedSong && (
                                        <div className="mt-2 flex items-center gap-2 bg-[#eef2ff] border-2 border-[#6366f1] rounded-xl p-2">
                                            {selectedSong.jacket && <img src={selectedSong.jacket} style={{width:'32px',height:'32px',borderRadius:'6px',objectFit:'cover',border:`2px solid ${getBorderColor(selectedSong.difficult)}`}} crossOrigin="anonymous" onError={e=>{e.target.style.display='none';}} />}
                                            <div className="min-w-0">
                                                <div className="font-black text-xs truncate">{selectedSong.title}</div>
                                                <div className="flex items-center gap-1 mt-0.5"><DiffBadge diff={selectedSong.difficult} /><span className="text-[10px] text-[#6366f1] font-black">Lv {formatLevel(selectedSong.level)}</span></div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* イントロ/アウトロ固定表示 */}
                            {myIntroOutro && introOutroSong && (
                                <div>
                                    <p className="section-label mb-2">{turn === 1 ? t(lang,'sim_song_intro') : t(lang,'sim_song_outro')}</p>
                                    <div className="flex items-center gap-2 bg-[#eef2ff] border-2 border-[#6366f1] rounded-xl p-2">
                                        {introOutroSong.jacket && <img src={introOutroSong.jacket} style={{width:'32px',height:'32px',borderRadius:'6px',objectFit:'cover',border:`2px solid ${getBorderColor(introOutroSong.difficult)}`}} crossOrigin="anonymous" onError={e=>{e.target.style.display='none';}} />}
                                        <div className="min-w-0">
                                            <div className="font-black text-xs truncate">{introOutroSong.title}</div>
                                            <div className="flex items-center gap-1 mt-0.5"><DiffBadge diff={introOutroSong.difficult} /><span className="text-[10px] text-[#6366f1] font-black">Lv {formatLevel(introOutroSong.level)}</span></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 相手ターン */}
                            {!myTurn && (
                                <div>
                                    <p className="section-label mb-2">{t(lang,"sim_song_opp")}</p>
                                    <div className="bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl px-4 py-3 text-sm font-black text-gray-400 flex items-center gap-2">
                                        <i className="ph-bold ph-user"></i> {t(lang,'sim_opp_song_placeholder')}
                                    </div>
                                </div>
                            )}

                            {/* EXCEED GEAR */}
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <p className="text-[11px] font-black text-black uppercase mb-1.5 flex items-center gap-1">
                                        <span className="w-4 h-4 rounded-full bg-[#6366f1] text-white text-[8px] font-black flex items-center justify-center">{t(lang,'sim_my_eg').charAt(0)}</span>{t(lang,'sim_my_eg')}
                                    </p>
                                    <div className="flex gap-1">{[0,1,2,3].map(v => <button key={v} onClick={() => setMyGear(v)} className={gearBtnClass(v, myGear)}>{v === 0 ? t(lang,'sim_eg_none') : `Lv${v}`}</button>)}</div>
                                </div>
                                <div>
                                    <p className="text-[11px] font-black text-black uppercase mb-1.5 flex items-center gap-1">
                                        <span className="w-4 h-4 rounded-full bg-gray-400 text-white text-[8px] font-black flex items-center justify-center">{t(lang,'sim_opp_eg').charAt(0)}</span>{t(lang,'sim_opp_eg')}
                                    </p>
                                    <div className="flex gap-1">{[0,1,2,3].map(v => <button key={v} onClick={() => setOppGear(v)} className={gearBtnClass(v, oppGear)}>{v === 0 ? t(lang,'sim_eg_none') : `Lv${v}`}</button>)}</div>
                                </div>
                            </div>

                            {/* 勝敗（選択時は紫で統一） */}
                            <div>
                                <p className="section-label mb-2">{t(lang,'sim_result_label')}</p>
                                <div className="flex gap-2">
                                    {['win','draw','lose'].map(val => (
                                        <button key={val} onClick={() => setResult(val)} className={resultBtnClass(val)}>
                                            {val === 'win' ? t(lang,'sim_win') : val === 'draw' ? t(lang,'sim_draw') : t(lang,'sim_lose')}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* ★プレビュー */}
                            {result && (
                                <div className="bg-gray-50 border-2 border-gray-200 rounded-xl px-4 py-2.5 flex items-center justify-between text-sm font-black" style={{animation:'fadeIn 0.2s ease'}}>
                                    <span className="text-gray-500 text-xs">{t(lang,'sim_stars_preview')}</span>
                                    <div className="flex gap-4">
                                        {(() => { const { myAdd, oppAdd } = calcStars(myGear, oppGear, result); return (<><span className="text-[#6366f1]">YOU +{myAdd}★</span><span className="text-gray-400">OPP +{oppAdd}★</span></>); })()}
                                    </div>
                                </div>
                            )}

                            {/* 確定ボタン */}
                            <button onClick={handleTurnSubmit} className="w-full py-4 rounded-2xl font-black text-base border-2 border-black transition-all flex items-center justify-center gap-2 bg-[#40916c] text-white shadow-[4px_4px_0px_#1b4332] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none">
                                {isLastTurn ? (<><i className="ph-bold ph-flag-checkered"></i> {t(lang,'sim_end_match')}</>) : (<><i className="ph-bold ph-arrow-right"></i> {t(lang,'sim_next_turn')}</>)}
                            </button>
                        </div>

                        {/* 入力履歴（薄めグレー） */}
                        {history.length > 0 && (
                            <div className="mt-3" style={{background:'#484848',border:'3px solid #606060',borderRadius:'16px',padding:'12px',fontFamily:'inherit'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                                    <span style={{fontSize:'10px',fontWeight:900,color:'#dddddd',textTransform:'uppercase',letterSpacing:'0.1em'}}>{t(lang,'sim_history_label')}</span>
                                    <div style={{display:'flex',gap:'6px',fontSize:'9px',fontWeight:900}}>
                                        <span style={{color:'#38bdf8'}}>YOU</span>
                                        <span style={{color:'#888888'}}>vs</span>
                                        <span style={{color:'#f87171'}}>OPP</span>
                                    </div>
                                </div>
                                {history.map((h, i) => <ResultRow key={i} h={h} />)}
                            </div>
                        )}
                    </div>
                );
            }



            // ===== RESULT =====
            if (phase === "result") {
                const win = myStars > opponentStars;
                const lose = myStars < opponentStars;

                return (
                    <div className="animate-in fade-in slide-in-from-top-4 duration-500 text-left px-1 mb-4">
                        {/* WIN/LOSE ヘッダー（常時表示） */}
                        <div style={{background:'#484848',border:'4px solid #606060',borderRadius:'20px',overflow:'hidden',marginBottom:'10px',boxShadow:'8px 8px 0px #000'}}>
                            <div style={{background:'linear-gradient(90deg,#585858,#707070)',textAlign:'center',padding:'10px 0',borderBottom:'2px solid #686868'}}>
                                <span style={{fontSize:'13px',fontWeight:900,letterSpacing:'0.35em',color:'#fbbf24',textTransform:'uppercase',textShadow:'0 0 10px rgba(251,191,36,0.4)'}}>{t(lang,'sim_end_match')}</span>
                            </div>
                            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 14px',background:'#525252'}}>
                                <div style={{flex:1}}>
                                    <div style={{fontSize:'26px',fontWeight:900,fontStyle:'italic',color: win ? '#38bdf8' : lose ? '#f87171' : '#aaaaaa',textShadow: win ? '0 0 14px rgba(56,189,248,0.7)' : lose ? '0 0 14px rgba(248,113,113,0.7)' : 'none'}}>
                                        {win ? 'WIN' : lose ? 'LOSE' : 'DRAW'}
                                    </div>
                                    <div style={{fontSize:'9px',fontWeight:900,color:'#bbbbbb',marginTop:'3px'}}>YOU ({side})</div>
                                </div>
                                <div style={{textAlign:'center'}}>
                                    <div style={{display:'flex',alignItems:'baseline',gap:'3px'}}>
                                        <span style={{fontSize:'38px',fontWeight:900,color:'#ffffff',fontStyle:'italic'}}>{myStars}</span>
                                        <span style={{fontSize:'22px',fontWeight:900,color:'#fbbf24'}}>★</span>
                                        <span style={{fontSize:'14px',fontWeight:900,color:'#999999',margin:'0 4px'}}>vs</span>
                                        <span style={{fontSize:'22px',fontWeight:900,color:'#fbbf24'}}>★</span>
                                        <span style={{fontSize:'38px',fontWeight:900,color:'#ffffff',fontStyle:'italic'}}>{opponentStars}</span>
                                    </div>
                                </div>
                                <div style={{flex:1,textAlign:'right'}}>
                                    <div style={{fontSize:'26px',fontWeight:900,fontStyle:'italic',color: lose ? '#38bdf8' : win ? '#f87171' : '#aaaaaa',textShadow: lose ? '0 0 14px rgba(56,189,248,0.7)' : win ? '0 0 14px rgba(248,113,113,0.7)' : 'none'}}>
                                        {lose ? 'WIN' : win ? 'LOSE' : 'DRAW'}
                                    </div>
                                    <div style={{fontSize:'9px',fontWeight:900,color:'#bbbbbb',marginTop:'3px',textAlign:'right'}}>OPP</div>
                                </div>
                            </div>
                        </div>

                        {/* 試合結果 */}
                        <div style={{background:'#484848',border:'2px solid #606060',borderRadius:'16px',overflow:'hidden',marginBottom:'10px'}}>
                            <div style={{padding:'8px 10px 12px 10px',background:'#484848'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0 8px 0',borderBottom:'1px solid #606060',marginBottom:'6px'}}>
                                    <span style={{fontSize:'9px',fontWeight:900,color:'#bbbbbb',textTransform:'uppercase',letterSpacing:'0.1em'}}># / SONG</span>
                                    <div style={{display:'flex',gap:'4px',fontSize:'9px',fontWeight:900}}>
                                        <span style={{color:'#38bdf8',width:'86px',textAlign:'center'}}>YOU</span>
                                        <span style={{color:'#888888',width:'26px',textAlign:'center'}}>-</span>
                                        <span style={{color:'#f87171',width:'86px',textAlign:'center'}}>OPP</span>
                                    </div>
                                </div>
                                {history.map((h, i) => <ResultRow key={i} h={h} />)}
                            </div>
                        </div>

                        {/* ボタン群 */}
                        <div className="flex gap-2">
                            <button onClick={handleBackToLastTurn} className="flex-none px-3 py-3 bg-white border-2 border-black rounded-xl font-black text-xs shadow-[3px_3px_0px_#000] active:translate-y-0.5 active:shadow-none transition-all flex items-center gap-1 text-black">
                                <i className="ph-bold ph-arrow-counter-clockwise"></i> 戻る
                            </button>
                            <button onClick={() => {
                                setTurn(1); setMyStars(0); setOpponentStars(0);
                                setUsedMySongIds([]); setHistory([]);
                                setCurrentSongId(""); setMyGear(0); setOppGear(0); setResult(""); setValidationMsg("");
                                setPhase("battle");
                            }} className="flex-1 py-3 bg-[#6366f1] text-white font-black rounded-xl border-2 border-black shadow-[4px_4px_0px_#000] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all text-sm flex items-center justify-center gap-1">
                                <i className="ph-bold ph-arrows-counter-clockwise"></i> {t(lang,'sim_retry')}
                            </button>
                            <button onClick={handleReset} className="flex-none px-4 py-3 bg-gray-100 border-2 border-black rounded-xl font-black text-sm shadow-[3px_3px_0px_#000] active:translate-y-0.5 active:shadow-none transition-all">
                                <i className="ph-bold ph-house"></i>
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
