
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDVX MEGAMIX_Memo</title>
    <link rel="icon" type="image/png" href="https://yuuya1202.github.io/Image_Background/IMG_Favicon.png">
    
    <!-- 背景画像のプリロード -->
    <link rel="preload" href="https://yuuya1202.github.io/Image_Background/IMG_Background.jpg" as="image">
    <link rel="preload" href="https://yuuya1202.github.io/Image_Background/IMG_SetlistBackground.png" as="image">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- html2canvas (Element to Image) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = { initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInAnonymously, getFirestore, doc, setDoc, getDoc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

        body {
            background-color: #132a13;
            color: #222;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            min-height: 100vh;
            margin: 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(19, 42, 19, 0.75), rgba(19, 42, 19, 0.75)),
                url('https://yuuya1202.github.io/Image_Background/IMG_Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }
        
        .pop-card {
            background: white;
            border: 3px solid #000;
            box-shadow: 6px 6px 0px #000;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .pop-card:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px #000;
        }
        .pop-card.active {
            border-color: #52b788;
            box-shadow: 6px 6px 0px #52b788;
        }

        /* --- グリッドアイテム用スタイル --- */
        .grid-item {
            background: white;
            border: 2px solid #000;
            aspect-ratio: 1/1;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 3px 3px 0px #000;
            transition: all 0.1s;
        }
        .grid-item:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000;
        }
        .grid-title-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 7px;
            font-weight: 700;
            padding: 2px 4px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }

        /* Static card for random selection */
        .static-card {
            background: white;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            position: relative;
        }

        .danger-badge-container {
            position: absolute;
            top: -12px;
            left: 10px;
            display: flex;
            gap: 4px;
            z-index: 10;
        }
        .danger-badge {
            padding: 2px 10px;
            border: 2px solid #000;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 2px 2px 0px #000;
        }
        .danger-badge-1 { background: #ffb703; color: #000; }
        .danger-badge-2 { background: #e63946; color: #fff; }

        .memo-area {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.3s ease-out;
            background: #fdfdfd;
            border-radius: 12px;
            position: relative;
        }
        .memo-area.open {
            max-height: 2000px; 
            opacity: 1;
            margin-top: 12px;
            padding: 12px 12px 10px 12px;
            border: 2px solid #000;
        }

        .filter-area {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .filter-area.show {
            max-height: 1500px;
            opacity: 1;
            margin-top: 1rem;
            padding: 1rem;
            border: 3px solid #000;
            border-radius: 1rem;
            background-color: #ffffff;
        }

        .filter-trigger {
            border: 3px solid #000;
            background: white;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s;
        }
        .filter-trigger.is-active {
            background: #40916c;
            color: white;
        }
        .filter-trigger.open {
            background: #40916c;
            color: white;
        }

        .filter-btn {
            border: 2px solid #000;
            box-shadow: 2px 2px 0px #000;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 38px;
            background: white;
        }
        .filter-btn.active {
            background: #52b788;
            color: white;
        }

        .toggle-btn-group {
            display: flex;
            background: #2d6a4f;
            padding: 4px;
            border-radius: 14px;
            border: 2px solid #000;
            gap: 4px;
        }
        .toggle-btn-small {
            flex: 1;
            padding: 8px 4px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 900;
            color: white;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .toggle-btn-small.active {
            background: white;
            color: #1b4332;
            box-shadow: 2px 2px 0px #000;
        }

        .batch-btn {
            border: 1px solid #000;
            padding: 1px 8px;
            border-radius: 6px;
            font-size: 9px;
            background: #f8f8f8;
            transition: all 0.1s;
            font-weight: 900;
            text-transform: uppercase;
        }

        .section-label {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #1b4332;
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-decoration-color: #52b788;
            text-underline-offset: 4px;
        }

        .stat-box {
            background: white;
            border: 2px solid #000;
            padding: 6px 2px;
            border-radius: 8px;
            text-align: center;
            color: #000;
        }
        .stat-label {
            font-size: 10px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 3px;
            color: #000;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 900;
            line-height: 1.1;
            color: #000;
        }

        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 12px 6px;
            background: white;
            border: 2px solid #000;
            border-radius: 10px;
            font-weight: 900;
            font-size: 13.5px;
            color: #000;
            transition: all 0.1s;
            box-shadow: 3px 3px 0px #000;
            line-height: 1;
        }
        .link-button:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }
        .link-button.chart { background: #e9edc9; }
        .link-button.video { background: #fec5bb; }

        .ranking-row {
            background: white;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px #000;
            display: flex;
            align-items: flex-start;
            padding: 10px 12px;
            border-radius: 16px;
            margin-bottom: 10px;
        }
        .rank-number {
            width: 64px; 
            font-size: 20px;
            font-weight: 900;
            font-style: italic;
            color: #132a13;
            flex-shrink: 0;
            padding-top: 2px;
        }
        .rank-1 { color: #ffd700; text-shadow: 2px 2px 0px #000; }
        .rank-2 { color: #c0c0c0; text-shadow: 2px 2px 0px #000; }
        .rank-3 { color: #cd7f32; text-shadow: 2px 2px 0px #000; }

        .nav-dropdown {
            position: relative;
            display: inline-block;
        }
        
        .nav-btn {
            background: white;
            border: 2px solid #000;
            padding: 8px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 3px 3px 0px #000;
            transition: all 0.2s;
            height: 42px;
            min-width: 60px;
        }
        .nav-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }

        .dropdown-panel {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            min-width: 220px;
            width: max-content;
            background: white;
            border: 2px solid #000;
            border-radius: 12px;
            box-shadow: 4px 4px 0px #000;
            overflow: hidden;
            z-index: 60;
            animation: dropdownFade 0.2s ease-out;
        }
        @keyframes dropdownFade {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dropdown-item {
            width: 100%;
            text-align: left;
            padding: 14px 20px;
            font-size: 13px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.1s;
            white-space: nowrap;
        }
        .dropdown-item.active {
            background: #d8f3dc;
            color: #1b4332;
        }

        .pagination-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            padding-bottom: 40px;
        }
        .page-btn {
            background: white;
            border: 2px solid #000;
            box-shadow: 3px 3px 0px #000;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.1s;
        }
        .page-btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .page-info {
            background: #2d6a4f;
            color: white;
            padding: 6px 14px;
            border-radius: 10px;
            border: 2px solid #000;
            font-weight: 900;
            font-size: 12px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            backdrop-filter: blur(4px);
            touch-action: none;
        }
        .modal-content {
            background: white;
            border: 4px solid #000;
            box-shadow: 8px 8px 0px #000;
            border-radius: 24px;
            width: 100%;
            max-width: 320px;
            padding: 24px;
            text-align: center;
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* --- 譜面プレビュー用モーダル --- */
        .preview-modal-content {
            background: white;
            border: 4px solid #000;
            box-shadow: 8px 8px 0px #000;
            border-radius: 20px;
            width: 100%;
            height: 90vh;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            overflow: visible;
            touch-action: pan-x pan-y pinch-zoom;
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .preview-header {
            padding: 12px 16px;
            border-bottom: 3px solid #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
        }
        .preview-iframe-container {
            flex-grow: 1;
            position: relative;
            background: #eee;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y pinch-zoom;
        }
        .preview-iframe {
            width: 100%;
            height: 100%;
            border: none;
            touch-action: pan-x pan-y pinch-zoom;
        }

        .hit-counter {
            background: #6b7280; 
            color: white;
            font-size: 11px;
            font-weight: 900;
            padding: 3px 12px;
            border-radius: 99px;
            display: inline-flex;
            align-items: center;
            border: 2px solid #000;
            box-shadow: 2px 2px 0px #000;
        }

        .auth-btn {
            background: white;
            border: 2px solid #000;
            padding: 8px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 3px 3px 0px #000;
            transition: all 0.2s;
            height: 42px;
            font-weight: 900;
            font-size: 13px;
        }
        .auth-btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }
        .auth-btn.logged-in {
            background: #fdfdfd;
            border-color: #666;
            color: #666;
            box-shadow: 3px 3px 0px #666;
        }
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .fav-btn {
            background: white;
            border: 1.5px solid #000;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #000;
        }
        .fav-btn.active {
            border-color: #fbbf24;
            background: #fffbeb;
            color: #fbbf24;

        }

        .mirror-btn {
            background: white;
            border: 1.5px solid #000;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #000;
        }
        .mirror-btn.active {
            border-color: #6366f1;
            background: #eef2ff;
            color: #6366f1;

        }
        
        .memo-textarea {
            width: 100%;
            border: 2px solid #000;
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
            font-weight: bold;
            resize: vertical;
            min-height: 60px;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.05);
            background: #f9fafb;
        }
        .memo-textarea:focus {
            outline: none;
            border-color: #52b788;
            background: #fff;
        }
        .memo-textarea:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
            border-color: #9ca3af;
        }

        .fav-filter-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 3px solid #000;
            background: white;
            font-weight: 900;
            font-size: 14px;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .fav-filter-toggle.active {
            background: #fffbeb;
            border-color: #fbbf24;
            color: #b45309;
            box-shadow: 4px 4px 0px #fbbf24;
        }

        .error-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e63946;
            color: white;
            padding: 14px 24px;
            border: 3px solid black;
            border-radius: 16px;
            box-shadow: 6px 6px 0px black;
            z-index: 1000;
            font-weight: 900;
            font-size: 13px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: toastPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes toastPop {
            from { transform: translate(-50%, 20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mirror-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #eef2ff;
            color: #4f46e5;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.025em;
            line-height: 1;
            white-space: nowrap;
        }

        .mirror-icon-badge {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #eef2ff;
            border: 1px solid #6366f1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6366f1;
            flex-shrink: 0;
        }

        .contact-method-card {
            background: #f8fafc;
            border: 2px solid #000;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.2s;
        }
        .contact-method-card:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 4px 4px 0px #000;
        }

        /* --- 表示形式切替ボタン --- */
        .view-mode-badge {
            background: white;
            color: black;
            border: 2px solid #000;
            border-radius: 10px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 900;
            box-shadow: 3px 3px 0px #000;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            cursor: pointer;
            width: fit-content;
        }
        .view-mode-badge:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }

        /* --- Image Export Layout Styles --- */
        #export-container {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 1280px;
            height: 720px;
            background-color: #132a13;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 40px 30px 40px; 
            z-index: -100;
        }
        .export-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .export-content-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .export-header {
            width: 100%;
            margin-bottom: 28px;
            line-height: 1;
        }
        .export-header-label {
            font-size: 14px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        .export-header-title {
            font-size: 38px;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            line-height: 1.1;
        }
        .export-jackets-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 25px;
            width: 100%;
            padding: 0 60px; 
        }
        .export-jacket-box {
            flex: 1;
            aspect-ratio: 1/1;
            background: white;
            border: 5px solid #000;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
        }
        .export-jacket-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .export-info-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            flex-grow: 1;
            padding: 0 20px; 
        }
        .export-info-row {
            background: #ffffff;
            border: 3px solid #000;
            border-radius: 12px;
            padding: 0px 24px 0px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.15);
            height: 62px;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }
        .export-info-main {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            min-width: 0;
            height: 100%;
        }
        .export-info-num {
            font-size: 22px;
            font-weight: 900;
            color: #000;
            font-style: italic;
            width: 40px;
        }
        .export-info-title {
            font-size: 26px;
            font-weight: 900;
            color: #000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
            display: flex;
            align-items: center;
            height: 100%;
        }
        .export-info-meta {
            display: flex;
            gap: 24px;
            font-size: 18px;
            font-weight: 900;
            color: #000;
            flex-shrink: 0;
            align-items: center;
        }
        
        /* カスタムスクロールバー（PC用） */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;

        const SetlistManager = ({ songs, songMap, setlists, mirrors, onSave, onDelete, onExport, getSongId, formatLevel, getBorderColor, favorites, isLoggedIn, toggleFavorite, toggleMirror, personalMemos, onSavePersonalMemo, lang = 'ja' }) => {
            const [view, setView] = useState("list");

            const [selectedDetailSong, setSelectedDetailSong] = useState(null);
            
            const [isSongModalOpen, setIsSongModalOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [songModalFilter, setSongModalFilter] = useState("closed"); // "open" | "closed"
            const [songModalFavOnly, setSongModalFavOnly] = useState(false);
            const [songModalMirrorOnly, setSongModalMirrorOnly] = useState(false);
            const [songModalDiffs, setSongModalDiffs] = useState([]);
            const [songModalVersions, setSongModalVersions] = useState([]);
            const [songModalLevels, setSongModalLevels] = useState([]);
            const [songModalBpls, setSongModalBpls] = useState([]);
            const songModalFilterActive = songModalFavOnly || songModalMirrorOnly || songModalDiffs.length > 0 || songModalVersions.length > 0 || songModalLevels.length > 0 || songModalBpls.length > 0;

            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [deletingId, setDeletingId] = useState(null);
            const [isLimitModalOpen, setIsLimitModalOpen] = useState(false);
            const [isSelectExportOpen, setIsSelectExportOpen] = useState(false);
            const [isDraftSaveModalOpen, setIsDraftSaveModalOpen] = useState(false);
            const [pendingLeaveAction, setPendingLeaveAction] = useState(null);

            const handleCreate = () => {
                if (setlists.length >= MAX_SETLISTS) {
                    setIsLimitModalOpen(true);
                    return;
                }
                setEditingSetlist({ id: Date.now().toString(), name: "", songs: Array(SETLIST_TRACK_COUNT).fill(null), memo: "", isDraft: true });
                setView("edit");
            };

            const handleEdit = (sl) => {
                setEditingSetlist({ ...sl, songs: [...sl.songs], memo: sl.memo || "" });
                setView("edit");
            };

            // 編集画面を離れる前に途中保存を提案するヘルパー
            const tryLeaveEdit = (doLeave) => {
                const incomplete = editingSetlist && editingSetlist.songs.some(id => id === null);
                const hasTitle = editingSetlist && editingSetlist.name.trim() !== "";
                // 未完成かつタイトルあり → 途中保存ダイアログ
                if (incomplete && hasTitle) {
                    setPendingLeaveAction(() => doLeave);
                    setIsDraftSaveModalOpen(true);
                } else {
                    doLeave();
                }
            };

            const openSongModal = (slotIndex) => {
                setSelectingSlot(slotIndex);
                setSearchTerm("");
                setSongModalFilter("closed");
                setSongModalFavOnly(false);
                setSongModalMirrorOnly(false);
                setSongModalDiffs([]);
                setSongModalVersions([]);
                setSongModalLevels([]);
                setSongModalBpls([]);
                setIsSongModalOpen(true);
            };

            const isTitleAlreadySelected = (songIdToCheck) => {
                if (!editingSetlist) return false;
                const songToCheck = songMap[songIdToCheck];
                if (!songToCheck) return false;
                
                return editingSetlist.songs.some((selectedId, index) => {
                    if (index === selectingSlot) return false;
                    if (!selectedId) return false;
                    const selectedSong = songMap[selectedId];
                    return selectedSong && selectedSong.title === songToCheck.title;
                });
            };

            const selectSong = (songId) => {
                if (isTitleAlreadySelected(songId)) return;
                const newSongs = [...editingSetlist.songs];
                newSongs[selectingSlot] = songId;
                setEditingSetlist({ ...editingSetlist, songs: newSongs });
                setIsSongModalOpen(false);
            };

            const handleSave = () => {
                const incomplete = editingSetlist && editingSetlist.songs.some(id => id === null);
                if (incomplete) {
                    // 未完成 → 下書きダイアログを出す（離脱アクションなし）
                    setPendingLeaveAction(null);
                    setIsDraftSaveModalOpen(true);
                } else {
                    // 完成 → 正式保存
                    const toSave = { ...editingSetlist, isDraft: false };
                    onSave(toSave);
                    if (editingSetlist && editingSetlist.id) {
                        setOpenSetlists(prev => ({ ...prev, [editingSetlist.id]: false }));
                    }
                    setView("list");
                }
            };

            const moveSong = (idx, direction) => {
                const newSongs = [...editingSetlist.songs];
                const targetIdx = idx + direction;
                if (targetIdx < 0 || targetIdx >= newSongs.length) return;
                [newSongs[idx], newSongs[targetIdx]] = [newSongs[targetIdx], newSongs[idx]];
                setEditingSetlist({ ...editingSetlist, songs: newSongs });
            };

            const requestDelete = (id) => {
                setDeletingId(id);
                setIsDeleteModalOpen(true);
            };

            const confirmDelete = () => {
                if (deletingId) {
                    onDelete(deletingId);
                    setDeletingId(null);
                    setIsDeleteModalOpen(false);

            const canSave = editingSetlist && editingSetlist.name.trim() !== "" && editingSetlist.songs.every(id => id !== null);

            const getButtonClass = (bgColor, textColor = "text-black") => `
                font-black py-2 rounded-xl border-4 border-black 
                shadow-[4px_4px_0px_#000] active:translate-x-0.5 active:translate-y-0.5

                        {setlists.length === 0 ? (

                                            className="flex items-center justify-between cursor-pointer"

                                                    <i className="ph-bold ph-pencil-simple"></i> {t(lang,'setlist_continue_edit')}

            // ===== FUTABA杯隠しページ =====

            const saveLang = async (newLang) => {

                try {
                    const snap = await getDoc(ref);

            const saveHiddenUnlock = async () => {

                if (!user || user.isAnonymous || !firebase) return;

                try {
                    const snap = await getDoc(ref);

            const handleMainSearchChange = (e) => {
                const val = e.target.value;
                setSearchTerm(val);
                if (FUTABA_FUTURE_FLAG && !isHiddenUnlocked && val === FUTABA_KEYWORD) {
                    setFutabaPasswordInput("");
                    setFutabaPasswordError(false);
                    setFutabaUnlockSuccess(false);
                    setIsFutabaModalOpen(true);
                }
            };

            const handleFutabaSubmit = () => {
                if (futabaPasswordInput === FUTABA_PASSWORD) {
                    setFutabaUnlockSuccess(true);
                    setFutabaPasswordError(false);
                    saveHiddenUnlock();
                    setSearchTerm("");
                } else {
                    setFutabaPasswordError(true);
                    setFutabaPasswordInput("");
                }
            };

            const getSongId = (song) => `${song.title}_${song.difficult}`;

            const songMap = useMemo(() => {
                const map = {};
                songs.forEach(s => {
                    map[getSongId(s)] = s;
                });
                return map;
            }, [songs]);

            // ビューモードによって1ページあたりの件数を切り替え
            const itemsPerPage = viewMode === 'grid' ? GRID_ITEMS_PER_PAGE : LIST_ITEMS_PER_PAGE;

            const viewToken = useMemo(() => {
                return [currentPage, pageIndex, searchTerm, selectedLevels.join(','), showOnlyFavorites, showOnlyMirrors, viewMode].join('|');
            }, [currentPage, pageIndex, searchTerm, selectedLevels, showOnlyFavorites, showOnlyMirrors, viewMode]);

            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'auto' });
            }, [currentPage, pageIndex]);

            // --- Firebase Initialization & Auth ---
            useEffect(() => {
                const initFirebase = async () => {
                    const { initializeApp, getAuth, onAuthStateChanged, getFirestore } = window.FirebaseSDK;
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);
                    
                    setFirebase({ auth, db });

                    onAuthStateChanged(auth, (currentUser) => {
                        setUser(currentUser || null);
                        setIsAuthLoading(false);
                        if (!currentUser) {
                            setFavorites([]);
                            setMirrors({});
                            setPersonalMemos({});
                            setSetlists([]);
                            setShowOnlyFavorites(false);
                            setShowOnlyMirrors(false);
                            setRandomPoolFilter("all");
                        }
                    });
                };

                const interval = setInterval(() => {
                    if (window.FirebaseSDK) {
                        initFirebase();
                        clearInterval(interval);
                    }
                }, 100);
            }, []);

            // --- Master Data Fetch（認証不要）---
            useEffect(() => {
                if (!firebase) return;

                const fetchMasterData = async () => {
                    const CACHE_KEY = `sdvx_songs_${MASTER_DATA_UPDATED_AT}`;
                    try {
                        // キャッシュ確認：更新日が同じなら再取得しない
                        const cached = localStorage.getItem(CACHE_KEY);
                        if (cached) {
                            setSongs(JSON.parse(cached));
                            setIsLoading(false);
                            return;
                        }

                        // 古いキャッシュを削除
                        Object.keys(localStorage)
                            .filter(k => k.startsWith('sdvx_songs_'))
                            .forEach(k => localStorage.removeItem(k));

                        // Firestoreから取得してキャッシュに保存
                        const { doc, getDoc } = window.FirebaseSDK;
                        const docRef = doc(firebase.db, 'artifacts', APP_ID, 'public', 'data', MASTER_COLLECTION, MASTER_DOCUMENT);
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            if (data.songs) {
                                const parsedSongs = JSON.parse(data.songs);
                                setSongs(parsedSongs);
                                localStorage.setItem(CACHE_KEY, JSON.stringify(parsedSongs));
                            }
                        }
                    } catch (err) {
                        console.error("Master Data Fetch Error:", err);
                    } finally {
                        setIsLoading(false);
                    }
                };

                fetchMasterData();
            }, [firebase]);

            // --- User Profile & Setlists Fetch（onSnapshot→getDocに変更）---
            useEffect(() => {
                if (!user || !firebase || user.isAnonymous) return;

                const fetchUserData = async () => {
                    const { doc, getDoc } = window.FirebaseSDK;
                    try {
                        const profileSnap = await getDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'data'));
                        if (profileSnap.exists()) {
                            const data = profileSnap.data();
                            setFavorites(data.favorites || []);
                            setMirrors(data.mirrors || {});
                            setPersonalMemos(data.memos || {});
                            if (data.isHiddenUnlocked) setIsHiddenUnlocked(true);
                        }
                    } catch (err) {
                        console.error("Firestore Profile Fetch Error:", err);
                    }

                    try {
                        const setlistSnap = await getDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'setlists', 'data'));
                        if (setlistSnap.exists()) {
                            setSetlists(setlistSnap.data().items || []);
                        }
                    } catch (err) {
                        console.error("Firestore Setlist Fetch Error:", err);
                    }
                };

                fetchUserData();
            }, [user, firebase]);

            useEffect(() => {
                setSelectedLevels([]);
                setSelectedDifficulties([]);
                setSelectedVersions([]);
                setSelectedBplSections([]);
                setBpmMin("");
                setBpmMax("");
                setIsFilterOpen(false);
                setIsFilterModalOpen(false);
                setPageIndex(1);
                setShowOnlyFavorites(false);
                setShowOnlyMirrors(false);
                if (currentPage !== "terms") setTermsTab("terms");
            }, [currentPage]);

            useEffect(() => {
                setPageIndex(1);
            }, [rankSection, searchTerm, selectedLevels, selectedDifficulties, selectedVersions, sortOrder, showOnlyFavorites, showOnlyMirrors, viewMode]);

            const login = async () => {
                if (!firebase || isAuthLoading) return;
                // アプリ内ブラウザ検知
                if (isInAppBrowser()) {
                    setIsInAppBrowserModalOpen(true);
                    return;
                }
                setIsAuthLoading(true);
                setAuthError(null);
                const { GoogleAuthProvider, signInWithPopup } = window.FirebaseSDK;
                const provider = new GoogleAuthProvider();
                
                provider.setCustomParameters({
                    prompt: 'select_account'
                });

                try {
                    await signInWithPopup(firebase.auth, provider);
                } catch (error) {
                    console.error("Google Login Error:", error);
                    setAuthError("ログインに失敗しました.");
                    setIsAuthLoading(false);
                }
            };

            const logout = async () => {
                if (!firebase) return;
                const { signOut, signInAnonymously } = window.FirebaseSDK;
                try {
                    setIsLogoutModalOpen(false);
                    await signOut(firebase.auth);
                    await signInAnonymously(firebase.auth);
                    setShowOnlyFavorites(false);
                    setShowOnlyMirrors(false);
                    setCurrentPage("main");
                } catch (error) {
                    console.error("Logout Error:", error);
                }
            };

            const updateFirestoreProfile = async (newFavs, newMemos, newMirrors) => {
                if (!user || !firebase) return;
                const { doc, setDoc } = window.FirebaseSDK;
                try {
                    await setDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'data'), {
                        favorites: newFavs,
                        memos: newMemos,
                        mirrors: newMirrors
                    }, { merge: true });
                } catch (err) {
                    console.error("Firestore Profile Write Error:", err);
                    setSaveError(t(lang,"auth_save_error"));
                }
            };

            const toggleFavorite = async (songId) => {
                const newFavs = favorites.includes(songId) 
                    ? favorites.filter(id => id !== songId) 
                    : [...favorites, songId];
                setFavorites(newFavs);
                await updateFirestoreProfile(newFavs, personalMemos, mirrors);
            };

            const toggleMirror = async (songId, section) => {
                const current = mirrors[songId] || { first: false, second: false };
                const updated = { ...current, [section]: !current[section] };
                // 両方falseなら削除
                const newMirrors = (!updated.first && !updated.second)
                    ? Object.fromEntries(Object.entries(mirrors).filter(([k]) => k !== songId))
                    : { ...mirrors, [songId]: updated };
                setMirrors(newMirrors);
                await updateFirestoreProfile(favorites, personalMemos, newMirrors);
            };

            const savePersonalMemo = async (songId, memo) => {
                const newMemos = { ...personalMemos, [songId]: memo };
                setPersonalMemos(newMemos);
                await updateFirestoreProfile(favorites, newMemos, mirrors);
            };

            const saveSetlist = async (newSetlist) => {
                if (!user || !firebase) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const newItems = setlists.find(s => s.id === newSetlist.id)
                    ? setlists.map(s => s.id === newSetlist.id ? newSetlist : s)
                    : [...setlists, newSetlist];
                setSetlists(newItems);
                try {
                    await setDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'setlists', 'data'), {
                        items: newItems
                    });
                } catch (err) {
                    console.error("Firestore Setlist Write Error:", err);
                    setSaveError("保存に失敗しました。時間をおいて再度お試しください。");
                }
            };

            const deleteSetlist = async (id) => {
                if (!user || !firebase) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const newItems = setlists.filter(s => s.id !== id);
                setSetlists(newItems);
                try {
                    await setDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'setlists', 'data'), {
                        items: newItems
                    });
                } catch (err) {
                    console.error("Firestore Setlist Delete Error:", err);
                    setSaveError("保存に失敗しました。時間をおいて再度お試しください。");
                }
            };

            const toggleLevel = (lv) => {
                setSelectedLevels(prev => 
                    prev.includes(lv) ? prev.filter(l => l !== lv) : [...prev, lv]
                );
            };

            const toggleLevelRange = (range) => {
                const allSelected = range.every(lv => selectedLevels.includes(lv));
                if (allSelected) {
                    setSelectedLevels(prev => prev.filter(lv => !range.includes(lv)));
                } else {
                    setSelectedLevels(prev => [...new Set([...prev, ...range])]);
                }
            };

            const toggleDifficulty = (diff) => {
                setSelectedDifficulties(prev =>
                    prev.includes(diff) ? prev.filter(d => d !== diff) : [...prev, diff]
                );
            };

            const toggleVersion = (ver) => {
                setSelectedVersions(prev =>
                    prev.includes(ver) ? prev.filter(v => v !== ver) : [...prev, ver]
                );
            };

            const toggleBplSection = (n) => {
                setSelectedBplSections(prev =>
                    prev.includes(n) ? prev.filter(v => v !== n) : [...prev, n]
                );
            };

            const isLevelFilterActive = useMemo(() => {
                return selectedLevels.length > 0;
            }, [selectedLevels]);

            // BPM絞り込みヘルパー：範囲表記（"120-180"）も考慮して一部でも重なればtrue
            const matchesBpmFilter = (song) => {
                const minInput = bpmMin === "" ? null : parseInt(bpmMin, 10);
                const maxInput = bpmMax === "" ? null : parseInt(bpmMax, 10);
                if (minInput === null && maxInput === null) return true;
                const bpmStr = String(song.bpm || "");
                let songMin, songMax;
                if (bpmStr.includes("-")) {
                    const parts = bpmStr.split("-");
                    songMin = parseInt(parts[0], 10);
                    songMax = parseInt(parts[1], 10);
                } else {
                    songMin = parseInt(bpmStr, 10);
                    songMax = songMin;
                }
                if (isNaN(songMin) || isNaN(songMax)) return true;
                // 範囲が重なるかチェック：曲の範囲がフィルタ範囲と一部でもかぶればtrue
                if (maxInput !== null && songMin > maxInput) return false;
                if (minInput !== null && songMax < minInput) return false;
                return true;
            };

            const isFilterActive = useMemo(() => {
                const baseActive = selectedLevels.length > 0 || selectedDifficulties.length > 0 || selectedVersions.length > 0 || selectedBplSections.length > 0 || selectedFutabaSections.length > 0 || bpmMin !== "" || bpmMax !== "";
                if (currentPage === "main") return baseActive || showOnlyFavorites || showOnlyMirrors;
                if (currentPage === "random") return baseActive || showOnlyFavorites;
                if (currentPage === "ranking") return baseActive || showOnlyFavorites;
                return baseActive;
            }, [selectedLevels, selectedDifficulties, selectedVersions, selectedBplSections, bpmMin, bpmMax, showOnlyFavorites, showOnlyMirrors, currentPage]);

            const generateRandomSongs = () => {
                setIsGenerating(true);
                setHasGeneratedRandom(true);
                setIsFilterOpen(false);
                setRandomVisibleCount(0);
                setIsRandomComplete(false);
                const filtered = songs.filter(s => {
                    const songId = getSongId(s);
                    const matchesFav = !showOnlyFavorites || (user && !user.isAnonymous && favorites.includes(songId));
                    if (!matchesFav) return false;

                    const lvStr = String(s.level || "");
                    const matchesLv = selectedLevels.length === 0 || selectedLevels.some(targetLv => {
                        if (["17.0", "18.0", "19.0", "20.0"].includes(targetLv)) {
                            const base = targetLv.split('.')[0];
                            return lvStr === base || lvStr === targetLv;
                        }
                        return lvStr === targetLv;
                    });

                    const matchesDiff = selectedDifficulties.length === 0 || selectedDifficulties.includes(String(s.difficult || "").toUpperCase());

                    const matchesVer = selectedVersions.length === 0 || selectedVersions.includes(String(s.version || ""));

                    const matchesFutaba = selectedFutabaSections.length === 0 || selectedFutabaSections.includes(String(s.futaba || ""));

                    return matchesLv && matchesDiff && matchesVer && matchesFutaba && matchesBpmFilter(s);
                });

                if (filtered.length < SETLIST_TRACK_COUNT) {
                    setRandomSongs([]);
                    setTimeout(() => setIsGenerating(false), 300);
                } else {
                    const shuffled = [...filtered];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    const selected = shuffled.slice(0, SETLIST_TRACK_COUNT);
                    setRandomSongs(selected);
                    setIsGenerating(false);
                    // 1枚ずつ時間差で表示
                    selected.forEach((_, i) => {
                        setTimeout(() => {
                            setRandomVisibleCount(i + 1);
                            if (i === selected.length - 1) {
                                setTimeout(() => setIsRandomComplete(true), 300);
                            }
                        }, i * 300);
                    });
                }
            };

            const performImageExport = async () => {
                setIsSavingImage(true);
                
                try {
                    // 少し待機して状態の反映を確実にする
                    await new Promise(r => setTimeout(r, 100));
                    
                    const element = document.getElementById('export-container');
                    const canvas = await html2canvas(element, {
                        useCORS: true,
                        allowTaint: false,
                        scale: 2,
                        backgroundColor: "#132a13"
                    });
                    
                    canvas.toBlob((blob) => {
                        if (blob) {
                            const url = URL.createObjectURL(blob);
                            setPreviewUrl(url);
                        }
                        setIsSavingImage(false);
                    }, 'image/png');
                } catch (error) {
                    console.error("Image Export Error:", error);
                    setIsSavingImage(false);
                }
            };

            const handleSetlistExport = (sl) => {
                const slSongs = sl.songs.map(id => songMap[id]).filter(s => s);
                setExportData({
                    title: sl.name,
                    songs: slSongs,
                    bg: "https://yuuya1202.github.io/Image_Background/IMG_SetlistBackground.png"
                });
                // データセット後にエクスポートを実行
                performImageExport();
            };

            const handleClosePreview = () => {
                if (previewUrl) {
                    URL.revokeObjectURL(previewUrl);
                }
                setPreviewUrl(null);
            };

            const processedSongs = useMemo(() => {
                return songs.map(s => {
                    let displayCombo = 0;
                    if (rankSection === "section1") {
                        displayCombo = parseInt(s.combo) || 0;
                    } else if (rankSection === "section2") {
                        displayCombo = parseInt(s.combo2) || 0;
                    }
                    return { ...s, _displayCombo: displayCombo };
                });
            }, [songs, rankSection]);

            const allFilteredSongs = useMemo(() => {
                let baseList = processedSongs;

                if (currentPage === "danger") {
                    baseList = processedSongs.filter(s => {
                        const d = String(s.danger);
                        if (dangerFilter === "yosyu") return d === "1" || d === "3";
                        if (dangerFilter === "high")  return d === "2" || d === "3";
                        return ["1", "2", "3"].includes(d);
                    });
                }

                const result = baseList.filter(s => {
                    const lvStr = String(s.level || "");
                    const matchesLv = selectedLevels.length === 0 || selectedLevels.some(targetLv => {
                        if (["17.0", "18.0", "19.0", "20.0"].includes(targetLv)) {
                            const base = targetLv.split('.')[0];
                            return lvStr === base || lvStr === targetLv;
                        }
                        return lvStr === targetLv;
                    });

                    const matchesDiff = selectedDifficulties.length === 0 || selectedDifficulties.includes(String(s.difficult || "").toUpperCase());

                    const matchesVer = selectedVersions.length === 0 || selectedVersions.includes(String(s.version || ""));

                    const matchesBpl = selectedBplSections.length === 0 || selectedBplSections.some(key => {
                        const [season, sec] = key.split('-');
                        if (season === '5') return String(s.bpl5) === sec;
                        if (season === '6') return String(s.bpl6) === sec;
                        return false;
                    });
                    
                    const matchesFutaba = selectedFutabaSections.length === 0 || selectedFutabaSections.includes(String(s.futaba || ""));

                    const songId = getSongId(s);
                    const isFavFilterApplied = (currentPage === "main" || currentPage === "ranking" || currentPage === "random") && showOnlyFavorites;
                    const matchesFav = !isFavFilterApplied || favorites.includes(songId);

                    const isMirrorFilterApplied = currentPage === "main" && showOnlyMirrors;
                    const mirrorData = mirrors[songId];
                    const matchesMirror = !isMirrorFilterApplied || (mirrorData && (mirrorData.first || mirrorData.second));

                    if (currentPage === "main") {
                        const matchesSearch = 
                            String(s.title || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
                            String(s.reading || "").toLowerCase().includes(searchTerm.toLowerCase());
                        return matchesLv && matchesDiff && matchesVer && matchesBpl && matchesFutaba && matchesSearch && matchesFav && matchesMirror && matchesBpmFilter(s);
                    }
                    
                    return matchesLv && matchesDiff && matchesVer && matchesBpl && matchesFutaba && matchesFav && matchesMirror && matchesBpmFilter(s);
                });

                if (currentPage === "ranking") {
                    const listWithCombo = result.filter(s => s._displayCombo > 0);
                    return listWithCombo.sort((a, b) => {
                        const comboA = a._displayCombo;
                        const comboB = b._displayCombo;
                        return sortOrder === "desc" ? comboB - comboA : comboA - comboB;
                    });
                }

                return result;
            }, [searchTerm, selectedLevels, selectedDifficulties, selectedVersions, selectedBplSections, selectedFutabaSections, bpmMin, bpmMax, processedSongs, currentPage, sortOrder, rankSection, showOnlyFavorites, showOnlyMirrors, favorites, mirrors, dangerFilter]);

            const paginatedSongs = useMemo(() => {
                const start = (pageIndex - 1) * itemsPerPage;
                return allFilteredSongs.slice(start, start + itemsPerPage);
            }, [allFilteredSongs, pageIndex, itemsPerPage]);

            const totalPages = Math.ceil(allFilteredSongs.length / itemsPerPage);

            const handlePageChange = (newIndex) => {
                if (newIndex >= 1 && newIndex <= totalPages) {
                    setPageIndex(newIndex);
                }
            };

            const FilterButton = ({ lv, label }) => (
                <button onClick={() => toggleLevel(lv)} className={`filter-btn px-1 py-1.5 rounded-lg text-[10px] font-black uppercase w-full ${selectedLevels.includes(lv) ? 'active' : ''}`}>{label || lv}</button>
            );

            const LevelSectionHeader = ({ title, list }) => (
                <div className="flex items-center justify-between border-b-2 border-gray-100 pb-1 mb-2">
                    <div className="text-[10px] font-black text-black uppercase leading-none">Level {title}</div>
                    <button onClick={() => toggleLevelRange(list)} className="batch-btn">{t(lang,'common_select_all')}</button>
                </div>

                                                {/* 区分プルダウン（左） */}

                                                    <button
                                                        onClick={() => { setFutabaSecOpen(o => !o); setFutabaLvOpen(false); }}

                                                    >

                                                                <button key={sec} onClick={() => { setFutabaSection(sec); setFutabaSecOpen(false); }}
                                                                    className={`w-full text-left px-4 py-2 text-xs font-black flex items-center gap-2 transition-colors ${futabaSection === sec ? 'bg-[#d8f3dc] text-[#1b4332]' : 'hover:bg-gray-50'}`}>

                                                {/* レベルプルダウン（右） */}
                                                <div className="relative flex-1">
                                                    <button
                                                        onClick={() => { setFutabaLvOpen(o => !o); setFutabaSecOpen(false); }}
                                                        className="w-full flex items-center justify-between gap-1.5 px-3 py-2.5 bg-white border-2 border-black rounded-xl font-black text-xs shadow-[2px_2px_0px_#000] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all"
                                                    >
                                                        <span className="truncate">{futabaLevelFilter === "all" ? t(lang,'common_all') : `Lv ${futabaLevelFilter}`}</span>
                                                        <i className={`ph-bold ph-caret-${futabaLvOpen ? 'up' : 'down'} text-xs flex-shrink-0`}></i>
                                                    </button>
                                                    {futabaLvOpen && (
                                                        <div className="absolute right-0 mt-1 bg-white border-2 border-black rounded-xl shadow-[3px_3px_0px_#000] overflow-hidden z-20 w-full">
                                                            {[["all", t(lang,'common_all')], ["17","Lv 17"], ["18","Lv 18"]].map(([val, label]) => (
                                                                <button key={val} onClick={() => { setFutabaLevelFilter(val); setFutabaLvOpen(false); }}
                                                                    className={`w-full text-left px-4 py-2 text-xs font-black flex items-center gap-2 transition-colors ${futabaLevelFilter === val ? 'bg-[#d8f3dc] text-[#1b4332]' : 'hover:bg-gray-50'}`}>
                                                                    {futabaLevelFilter === val && <i className="ph-bold ph-check text-xs"></i>}
                                                                    {label}
                                                                </button>

                                                </div>
                                            </div>
                                            {futabaFiltered.length === 0 ? (
                                                <div className="text-center py-20 bg-white border-4 border-black border-dashed rounded-3xl">
                                                    <i className="ph-bold ph-ghost text-4xl text-gray-300 mb-4 block"></i>
                                                    <p className="font-black text-gray-400 text-sm">{t(lang,'common_not_found')}</p>
                                                </div>
                                            ) : (
                                                <div className={futabaViewMode === 'grid' ? 'grid grid-cols-4 gap-2 animate-in fade-in duration-300' : 'animate-in fade-in duration-300'}>
                                                    {futabaFiltered.map(song => {
                                                        const songId = getSongId(song);
                                                        return (
                                                            <SongCard
                                                                key={songId}
                                                                lang={lang}
                                                                song={song}
                                                                viewMode={futabaViewMode}
                                                                showDangerBadge={false}
                                                                showTips={true}
                                                                showMemo={false}
                                                                isLoggedIn={user && !user.isAnonymous}
                                                                isFavorite={favorites.includes(songId)}
                                                                onToggleFavorite={() => toggleFavorite(songId)}
                                                                mirrorData={mirrors[songId]}
                                                                onToggleMirror={(section) => toggleMirror(songId, section)}
                                                                personalMemo={personalMemos[songId]}
                                                                onSavePersonalMemo={(memo) => savePersonalMemo(songId, memo)}
