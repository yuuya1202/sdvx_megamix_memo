        const LV17_LIST = ["17.0", "17.5"];
        const LV18_LIST = Array.from({length: 10}, (_, i) => `18.${i}`);
        const LV19_LIST = Array.from({length: 10}, (_, i) => `19.${i}`);
        const LV20_LIST = Array.from({length: 10}, (_, i) => `20.${i}`);

        const formatLevel = (lv) => {
            const lvStr = String(lv || "");
            if (["17", "18", "19", "20"].includes(lvStr)) return lvStr + ".0";
            return lvStr;
        };

        const getBorderColor = (difficult) => {
            const diff = String(difficult || "").toUpperCase();
            switch(diff) {
                case "MXM": return "#000000";
                case "EXH": return "#ef4444";
                case "GRV": return "#d97706";
                case "HVN": return "#0891b2";

            const systemPrompt = `
                You are an expert SOUND VOLTEX MEGAMIX BATTLE analyst. 
                Extract the following information from the MEGAMIX BATTLE result screen image in JSON format:
                - result: "WIN", "LOSE", or "DRAW"
                - myScore: integer (EX SCORE or Points)
                - opponentScore: integer
                - opponentName: string (if visible)
                - mySetlistName: string (if visible)
                - tracks: array of 5 track objects { title, result: "WIN"|"LOSE"|"DRAW", score }
                If information is not clear, leave as null. Respond ONLY with the JSON.
            `;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Analyze this SDVX MEGAMIX BATTLE result screen." },
                                { inlineData: { mimeType: "image/png", data: base64Image } }
                            ]
                        }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;

                                ) : (
                                    <>
                                        <i className="ph-bold ph-camera text-2xl text-gray-400"></i>
                                        <span className="text-sm font-black text-gray-400">画像を選択</span>
                                    </>
                                )}
                                <input type="file" accept="image/*" className="hidden" onChange={handleFileChange} disabled={isScanning} />
                            </label>
                        </div>

                        <div className="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <label className="block text-[10px] font-black text-gray-500 mb-1">日付</label>
                                <input type="date" value={entry.date} onChange={e => setEntry({...entry, date: e.target.value})} className="w-full bg-gray-50 border-2 border-black rounded-lg p-2 font-bold text-sm" />
                            </div>
                            <div>
                                <label className="block text-[10px] font-black text-gray-500 mb-1">勝敗</label>
                                <select value={entry.result} onChange={e => setEntry({...entry, result: e.target.value})} className="w-full bg-gray-50 border-2 border-black rounded-lg p-2 font-black text-sm">
                                    <option value="WIN">WIN</option>
                                    <option value="LOSE">LOSE</option>
                                    <option value="DRAW">DRAW</option>
                                </select>
                            </div>
                        </div>

                        <div className="mb-4">
                            <label className="block text-[10px] font-black text-gray-500 mb-1">対戦相手</label>
                            <input type="text" value={entry.opponentName} onChange={e => setEntry({...entry, opponentName: e.target.value})} placeholder="名前 (任意)" className="w-full bg-gray-50 border-2 border-black rounded-lg p-2 font-bold text-sm" />
                        </div>

                        <div className="mb-4">
                            <label className="block text-[10px] font-black text-gray-500 mb-1">使用セトリ</label>
                            <select value={entry.mySetlistId} onChange={e => setEntry({...entry, mySetlistId: e.target.value})} className="w-full bg-gray-50 border-2 border-black rounded-lg p-2 font-black text-sm">
                                <option value="">選択しない</option>
                                {setlists.map(sl => <option key={sl.id} value={sl.id}>{sl.name}</option>)}
                            </select>
                        </div>

                        <div className="grid grid-cols-2 gap-4 mb-4">
                            <div>
                                <label className="block text-[10px] font-black text-gray-500 mb-1">自分スコア</label>
                                <input type="number" value={entry.myScore} onChange={e => setEntry({...entry, myScore: e.target.value})} className="w-full bg-gray-50 border-2 border-black rounded-lg p-2 font-bold text-sm" />
                            </div>
                            <div>
                                <label className="block text-[10px] font-black text-gray-500 mb-1">相手スコア</label>
                                <input type="number" value={entry.opponentScore} onChange={e => setEntry({...entry, opponentScore: e.target.value})} className="w-full bg-gray-50 border-2 border-black rounded-lg p-2 font-bold text-sm" />
                            </div>
                        </div>

                        <div className="mb-6">
                            <label className="block text-[10px] font-black text-gray-500 mb-1">メモ (ギア使用箇所など)</label>
                            <textarea value={entry.memo} onChange={e => setEntry({...entry, memo: e.target.value})} className="memo-textarea" placeholder="例: 3曲目ギア、相手は1曲目など" />
                        </div>

                        <div className="flex gap-4 justify-center">
                            <button onClick={handleSave} className="w-32 bg-[#52b788] text-white font-black py-2 rounded-xl border-4 border-black shadow-[4px_4px_0px_#000] active:translate-y-0.5">保存</button>
                            <button onClick={() => setView("list")} className="w-32 bg-gray-200 text-black font-black py-2 rounded-xl border-4 border-black shadow-[4px_4px_0px_#000] active:translate-y-0.5">戻る</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col gap-4">
                    <div className="flex items-center justify-between mt-2">
                        <div className="flex items-center gap-2">
                            <i className="ph-fill ph-sword text-3xl text-orange-400"></i>
                            <h2 className="text-2xl font-black italic text-white uppercase tracking-tighter">戦績ログ</h2>
                        </div>
                        <button onClick={() => setView("edit")} className="bg-white text-black font-black py-1.5 px-3 rounded-lg border-4 border-black shadow-[3px_3px_0px_#000] active:translate-y-0.5 text-xs">
                            <i className="ph-bold ph-plus"></i> 新規記録
                        </button>
                    </div>

                    {logs.length === 0 ? (
                        <div className="bg-white/10 p-10 rounded-3xl border-2 border-white/10 text-center text-white/50">
                            <i className="ph-bold ph-scroll text-4xl mb-2"></i>
                            <p className="text-sm font-black">対戦記録がありません</p>
                        </div>
                    ) : (
                        logs.sort((a,b) => new Date(b.date) - new Date(a.date)).map(log => (
                            <div key={log.id} className="battle-log-card animate-in slide-in-from-left-4 duration-300">
                                <div className="flex items-center justify-between mb-3">
                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] font-black text-gray-400">{log.date}</span>
                                        <div className={`battle-result-tag ${log.result === 'WIN' ? 'result-win' : (log.result === 'LOSE' ? 'result-lose' : 'result-draw')}`}>
                                            {log.result}
                                        </div>
                                    </div>
                                    <button onClick={() => requestDelete(log.id)} className="text-red-400 hover:text-red-600 transition-colors">
                                        <i className="ph-bold ph-trash-simple text-lg"></i>
                                    </button>
                                </div>

                                <div className="mb-3">
                                    <p className="text-xs font-black text-gray-500 uppercase tracking-widest mb-1">Opponent</p>
                                    <p className="text-sm font-black text-black">{log.opponentName || "(名前なし)"}</p>
                                </div>

                                <div className="battle-score-display mb-3">
                                    <div className="text-center flex-1">
                                        <p className="text-[8px] font-black text-gray-400 uppercase">You</p>
                                        <p className="text-lg font-black text-black">{log.myScore || "-"}</p>
                                    </div>
                                    <div className="text-gray-300 font-black">VS</div>
                                    <div className="text-center flex-1">
                                        <p className="text-[8px] font-black text-gray-400 uppercase">OPP</p>
                                        <p className="text-lg font-black text-black">{log.opponentScore || "-"}</p>
                                    </div>
                                </div>

                                {log.memo && (
                                    <div className="bg-gray-50 p-2 rounded-lg border border-black/5">
                                        <p className="text-[10px] font-black text-gray-400 uppercase mb-1">Notes</p>
                                        <p className="text-xs font-bold text-black whitespace-pre-wrap">{log.memo}</p>
                                    </div>
                                )}
                            </div>
                        ))
                    )}

                    <DeleteConfirmModal 
                        isOpen={isDeleteModalOpen}
                        onConfirm={confirmDelete}
                        onCancel={() => setIsDeleteModalOpen(false)}
                        title="戦績の削除"
                        message="この戦績データを削除しますか？"
                    />
                </div>
            );
        };

        const SetlistManager = ({ songs, songMap, setlists, mirrors, onSave, onDelete, onExport, getSongId, formatLevel, getBorderColor }) => {
            const [view, setView] = useState("list");
            const [editingSetlist, setEditingSetlist] = useState(null);
            const [selectingSlot, setSelectingSlot] = useState(null);
            
            const [isSongModalOpen, setIsSongModalOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [openSetlists, setOpenSetlists] = useState({});
            
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [deletingId, setDeletingId] = useState(null);
            const [isLimitModalOpen, setIsLimitModalOpen] = useState(false);
            const [isSelectExportOpen, setIsSelectExportOpen] = useState(false);

            const handleCreate = () => {
                if (setlists.length >= 10) {
                    setIsLimitModalOpen(true);
                    return;
                }
                setEditingSetlist({ id: Date.now().toString(), name: "", songs: [null, null, null, null, null], memo: "" });
                setView("edit");
            };

            const handleEdit = (sl) => {
                setEditingSetlist({ ...sl, songs: [...sl.songs], memo: sl.memo || "" });
                setView("edit");
            };

            const openSongModal = (slotIndex) => {
                setSelectingSlot(slotIndex);
                setSearchTerm("");
                setIsSongModalOpen(true);
            };

            const isTitleAlreadySelected = (songIdToCheck) => {
                if (!editingSetlist) return false;
                const songToCheck = songMap[songIdToCheck];
                if (!songToCheck) return false;
                
                return editingSetlist.songs.some((selectedId, index) => {
                    if (index === selectingSlot) return false;
                    if (!selectedId) return false;
                    const selectedSong = songMap[selectedId];
                    return selectedSong && selectedSong.title === songToCheck.title;
                });
            };

            const selectSong = (songId) => {
                if (isTitleAlreadySelected(songId)) return;
                const newSongs = [...editingSetlist.songs];
                newSongs[selectingSlot] = songId;
                setEditingSetlist({ ...editingSetlist, songs: newSongs });
                setIsSongModalOpen(false);
            };

            const handleSave = () => {
                onSave(editingSetlist);
                if (editingSetlist && editingSetlist.id) {
                    setOpenSetlists(prev => ({ ...prev, [editingSetlist.id]: false }));
                }
                setView("list");
            };

            const requestDelete = (id) => {
                setDeletingId(id);
                setIsDeleteModalOpen(true);
            };

            const confirmDelete = () => {
                if (deletingId) {
                    onDelete(deletingId);
                    setDeletingId(null);
                    setIsDeleteModalOpen(false);
                }
            };

            const canSave = editingSetlist && editingSetlist.name.trim() !== "" && editingSetlist.songs.every(id => id !== null);

            const getButtonClass = (bgColor, textColor = "text-black") => `
                font-black py-2 rounded-xl border-4 border-black 
                shadow-[4px_4px_0px_#000] active:translate-x-0.5 active:translate-y-0.5 
                active:shadow-none transition-all flex justify-center items-center gap-1
                w-32 ${bgColor} ${textColor}
            `;

            if (view === "list") {
                return (
                    <div className="flex flex-col gap-4">
                        <div className="flex items-center justify-between mb-2 mt-2">
                            <div className="flex items-center gap-2">
                                <i className="ph-fill ph-list-numbers text-3xl text-[#52b788]"></i>
                                <h2 className="text-2xl font-black italic text-white uppercase tracking-tighter">セトリ管理</h2>
                            </div>
                            <div className="flex gap-2">
                                {setlists.length > 0 && (
                                    <button 
                                        onClick={() => setIsSelectExportOpen(true)} 
                                        className="bg-[#d8f3dc] text-black font-black py-1.5 px-3 rounded-lg border-4 border-black shadow-[3px_3px_0px_#000] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all text-xs flex items-center gap-1"
                                    >
                                        <i className="ph-bold ph-image"></i> 画像出力
                                    </button>
                                )}
                                <button onClick={handleCreate} className="bg-white text-black font-black py-1.5 px-3 rounded-lg border-4 border-black shadow-[3px_3px_0px_#000] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all text-xs flex items-center gap-1">
                                    <i className="ph-bold ph-plus"></i> 新規
                                </button>
                            </div>
                        </div>
                        
                        {setlists.length === 0 ? (
                            <div className="bg-white/10 p-5 rounded-2xl border border-white/10 backdrop-blur-md text-white text-center mt-2">
                                <i className="ph-bold ph-music-notes text-4xl text-white/50 mb-2 block"></i>
                                <p className="text-sm font-bold">作成されたセトリがありません</p>
                            </div>
                        ) : (
                            <div className="flex flex-col gap-4 mt-2">
                                {setlists.map((sl, idx) => (
                                    <div key={sl.id} className="bg-white border-4 border-black rounded-2xl p-4 shadow-[6px_6px_0px_#000] transition-all">
                                        <div 
                                            className="flex items-center justify-between cursor-pointer" 
                                            onClick={() => setOpenSetlists(prev => ({ ...prev, [sl.id]: !prev[sl.id] }))}
                                        >
                                            <h3 className="text-base font-black text-black">#{idx + 1}　{sl.name}</h3>
                                            <div className={`transition-transform duration-300 ${openSetlists[sl.id] ? 'rotate-180' : ''}`}>
                                                <i className="ph-bold ph-caret-circle-down text-2xl text-black"></i>
                                            </div>
                                        </div>
                                        
                                        <div className={`overflow-hidden transition-all duration-300 ${openSetlists[sl.id] ? 'max-h-[2000px] mt-4 opacity-100 pb-2' : 'max-h-0 opacity-0'}`}>
                                            <div className="flex flex-col gap-3 mb-4 px-2 pt-2">
                                                {sl.songs.map((songId, sIdx) => {
                                                    const song = songMap[songId];
                                                    if (!song) return null;
                                                    const isMirrorActive = mirrors.includes(songId);
                                                    return (
                                                        <div key={sIdx} className="relative">
                                                            <div className="absolute -left-2 -top-2 w-6 h-6 bg-black text-white rounded-full flex items-center justify-center font-black text-xs z-10 border-2 border-white shadow-sm">
                                                                {sIdx + 1}
                                                            </div>
                                                            <div className="flex items-center gap-3 bg-gray-50 border-2 border-black rounded-xl p-2">
                                                                <img 
                                                                    src={song.jacket} 
                                                                    className="w-12 h-12 border-2 rounded object-cover" 
                                                                    style={{ borderColor: getBorderColor(song.difficult) }}
                                                                    crossOrigin="anonymous"
                                                                    onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.jp/24/cccccc/ffffff/150x150.png?text=NO+JACKET'; }} 
                                                                />
                                                                <div className="flex-grow min-w-0">
                                                                    <div className="text-sm font-black text-black break-words leading-tight">{song.title}</div>
                                                                    <div className="text-[10px] font-black uppercase flex items-center gap-2">
                                                                        <span className="text-black">Lv {formatLevel(song.level)}</span>
                                                                        <span className="text-black">{song.combo}CHAIN</span>
                                                                    </div>
                                                                </div>
                                                                {isMirrorActive && (
                                                                    <div className="mirror-icon-badge flex-shrink-0">
                                                                        <i className="ph-bold ph-arrows-left-right text-[10px]"></i>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>

                                            {sl.memo && (
                                                <div className="mt-4 pt-4 border-t-2 border-gray-100">
                                                    <div className="flex items-center gap-1.5 mb-2 font-black text-[10px] uppercase tracking-wider text-black">
                                                        <i className="ph-bold ph-pencil-simple text-blue-500 text-lg"></i>
                                                        <span>自分用メモ</span>
                                                    </div>
                                                    <div className="bg-gray-50 border-2 border-black p-3 rounded-xl min-h-[40px]">
                                                        <p className="text-sm font-bold text-black whitespace-pre-wrap leading-relaxed">
                                                            {sl.memo}
                                                        </p>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="flex gap-4 mt-6 justify-center">
                                                <button onClick={(e) => { e.stopPropagation(); handleEdit(sl); }} className={getButtonClass("bg-yellow-400")}>
                                                    <i className="ph-bold ph-pencil-simple"></i> 編集する
                                                </button>
                                                <button onClick={(e) => { e.stopPropagation(); requestDelete(sl.id); }} className={getButtonClass("bg-red-500", "text-white")}>
                                                    <i className="ph-bold ph-trash"></i> 削除する
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        <DeleteConfirmModal 
                            isOpen={isDeleteModalOpen}
                            onConfirm={confirmDelete}
                            onCancel={() => { setIsDeleteModalOpen(false); setDeletingId(null); }}
                            title="セトリの削除"
                            message="このセトリを削除してもよろしいですか？"
                        />

                        <SetlistLimitModal 
                            isOpen={isLimitModalOpen}
                            onClose={() => setIsLimitModalOpen(false)}
                        />

                        <SetlistSelectExportModal 
                            isOpen={isSelectExportOpen}
                            onClose={() => setIsSelectExportOpen(false)}
                            setlists={setlists}
                            onSelect={(sl) => {
                                setIsSelectExportOpen(false);
                                onExport(sl);
                            }}
                        />
                    </div>
                );
            }

            return (
                <div className="bg-white border-4 border-black rounded-3xl p-5 shadow-[8_8px_0px_#000]">
                    <h3 className="text-xl font-black mb-4 text-black border-b-4 border-[#52b788] pb-2 inline-block">セトリ作成</h3>
                    
                    <div className="mb-6">
                        <label className="block text-xs font-black uppercase text-gray-500 mb-1">セトリ名</label>
                        <input 
                            type="text" 
                            value={editingSetlist.name} 
                            onChange={e => setEditingSetlist({...editingSetlist, name: e.target.value})}
                            className="w-full bg-gray-50 border-4 border-black rounded-xl py-3 px-4 text-sm font-bold focus:outline-none focus:border-[#52b788] focus:bg-white transition-all text-black"
                        />
                    </div>

                    <div className="flex flex-col gap-3 mb-6 px-1 pt-1">
                        <label className="block text-xs font-black uppercase text-gray-500 mb-[-4px]">TRACKS</label>
                        {editingSetlist.songs.map((songId, idx) => {
                            const song = songId ? songMap[songId] : null;
                            return (
                                <div key={idx} className="relative">
                                    <div className="absolute -left-2 -top-2 w-6 h-6 bg-black text-white rounded-full flex items-center justify-center font-black text-xs z-10 border-2 border-white shadow-sm">
                                        {idx + 1}
                                    </div>
                                    {song ? (
                                        <div onClick={() => openSongModal(idx)} className="border-2 border-black rounded-xl p-2 flex items-center bg-white cursor-pointer hover:bg-gray-50 active:translate-y-0.5 transition-transform gap-3">
                                            <img 
                                                src={song.jacket} 
                                                className="w-12 h-12 border-2 rounded object-cover" 
                                                style={{ borderColor: getBorderColor(song.difficult) }}
                                                crossOrigin="anonymous"
                                                onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.jp/24/cccccc/ffffff/150x150.png?text=NO+JACKET'; }} 
                                            />
                                            <div className="flex-grow min-w-0">
                                                <div className="text-sm font-black text-black break-words leading-tight">{song.title}</div>
                                                <div className="text-[10px] font-black uppercase flex items-center gap-2 mt-1">
                                                    <span className="text-black">Lv {formatLevel(song.level)}</span>
                                                    <span className="text-black">{song.combo}CHAIN</span>
                                                </div>
                                            </div>
                                            <i className="ph-bold ph-arrows-left-right text-gray-400 text-xl mr-2"></i>
                                        </div>
                                    ) : (
                                        <div onClick={() => openSongModal(idx)} className="border-2 border-dashed border-gray-300 rounded-xl p-4 flex items-center justify-center cursor-pointer bg-gray-50 hover:bg-gray-100 hover:border-gray-400 active:translate-y-0.5 transition-all">
                                            <i className="ph-bold ph-plus-circle text-2xl text-gray-400 mr-2"></i>
                                            <span className="text-gray-500 font-bold text-sm">曲を選択する</span>
                                        </div>
                                    )}
                                </div>
                            )
                        })}
                    </div>

                    <div className="mb-6">
                        <label className="block text-xs font-black uppercase text-gray-500 mb-1">自分用メモ</label>
                        <textarea 
                            value={editingSetlist.memo || ""} 
                            onChange={e => setEditingSetlist({...editingSetlist, memo: e.target.value})}
                            className="memo-textarea"
                        />
                    </div>

                    <div className="flex gap-4 justify-center mt-2">
                        <button 
                            onClick={handleSave} 
                            disabled={!canSave}
                            className={`w-32 font-black py-2 rounded-xl border-4 border-black shadow-[4px_4px_0px_#000] transition-all ${canSave ? 'bg-[#52b788] text-white active:translate-x-0.5 active:translate-y-0.5 active:shadow-none' : 'bg-gray-100 text-gray-400 cursor-not-allowed border-gray-300'}`}
                        >
                            保存する
                        </button>
                        <button onClick={() => setView("list")} className="w-32 bg-gray-200 text-black font-black py-2 rounded-xl border-4 border-black shadow-[4px_4px_0px_#000] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all">
                            キャンセル
                        </button>
                    </div>

                    {isSongModalOpen && (
                        <div className="modal-overlay" onClick={() => setIsSongModalOpen(false)}>
                            <div className="modal-content" style={{ padding: '16px', maxWidth: '380px', width: '100%', height: '80vh', display: 'flex', flexDirection: 'column' }} onClick={e => e.stopPropagation()}>
                                <h2 className="text-lg font-black mb-3 text-black">曲を選択</h2>
                                <div className="relative mb-3 flex-shrink-0">
                                    <input 
                                        type="text" 
                                        placeholder="曲名・読みで検索..."
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)}
                                        className="w-full bg-gray-50 border-2 border-black rounded-lg py-2 px-3 pl-8 text-sm font-bold focus:outline-none focus:border-[#52b788] text-black"
                                    />
                                    <i className="ph-bold ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                </div>
                                
                                <div className="flex-grow overflow-y-auto flex flex-col gap-2 pr-1 pb-4">
                                    {searchTerm.trim() === "" ? (
                                        <div className="flex flex-col items-center justify-center py-12 opacity-40">
                                            <i className="ph-bold ph-magnifying-glass text-5xl mb-3 text-black"></i>
                                            <p className="text-sm font-black text-black">曲名を入力して検索してください</p>
                                        </div>
                                    ) : (
                                        songs.filter(s => 
                                            String(s.title || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
                                            String(s.reading || "").toLowerCase().includes(searchTerm.toLowerCase())
                                        ).slice(0, 100).map((s, i) => {
                                            const id = getSongId(s);
                                            const isSelected = isTitleAlreadySelected(id);
                                            return (
                                                <div key={i} onClick={() => !isSelected && selectSong(id)} className={`flex items-center gap-3 border-2 rounded-xl p-2 transition-all ${isSelected ? 'border-gray-200 bg-gray-50 opacity-50 cursor-not-allowed' : 'border-black bg-white cursor-pointer active:translate-y-0.5'}`}>
                                                    <div className="flex-shrink-0 w-12 h-12 relative overflow-hidden rounded-md">
                                                        <img 
                                                            src={s.jacket} 
                                                            alt="jacket" 
                                                            className="border-2 w-full h-full object-cover rounded-md" 
                                                            style={{ borderColor: getBorderColor(s.difficult) }}
                                                            crossOrigin="anonymous"
                                                            onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.jp/24/cccccc/ffffff/150x150.png?text=NO+JACKET'; }} 
                                                        />
                                                    </div>
                                                    <div className="flex-grow min-w-0 text-left">
                                                        <div className="text-sm font-black text-black break-words leading-tight">{s.title}</div>
                                                        <div className="text-[10px] font-black uppercase flex items-center gap-2 mt-1">
                                                            <span className="text-black">Lv {formatLevel(s.level)}</span>
                                                            <span className="text-black">{s.combo}CHAIN</span>
                                                        </div>
                                                    </div>
                                                    {isSelected && <span className="text-[10px] font-black text-red-500 bg-red-100 px-2 py-1 rounded whitespace-nowrap">選択済</span>}
                                                </div>
                                            )
                                        })
                                    )}
                                </div>
                                
                                <div className="flex justify-center flex-shrink-0 mt-3">
                                    <button onClick={() => setIsSongModalOpen(false)} className="w-40 bg-gray-200 text-black font-black py-3 rounded-xl border-4 border-black active:translate-y-0.5 shadow-[3px_3px_0px_#000] active:shadow-none">
                                        閉じる
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        const App = () => {
            const [songs, setSongs] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedLevels, setSelectedLevels] = useState([]); 
            const [sortOrder, setSortOrder] = useState("desc");
            const [rankSection, setRankSection] = useState("section1"); 
            const [isFilterOpen, setIsFilterOpen] = useState(false);
            const [currentPage, setCurrentPage] = useState("main"); 
            const [termsTab, setTermsTab] = useState("terms"); 
            const [isNavOpen, setIsNavOpen] = useState(false);
            const [pageIndex, setPageIndex] = useState(1);
            const [isLogoutModalOpen, setIsLogoutModalOpen] = useState(false);
            
            // 出力用データ管理
            const [exportData, setExportData] = useState({ 
                title: "ランダム選曲 結果", 
                songs: [], 
                bg: "https://raw.githubusercontent.com/yuuya1202/image_Setlist_Background/main/image_Setlist_Background.png" 
            });
            const [previewUrl, setPreviewUrl] = useState(null);
            
            const [contactLinkModal, setContactLinkModal] = useState({ isOpen: false, url: '', type: '' });

            const [randomSongs, setRandomSongs] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [hasGeneratedRandom, setHasGeneratedRandom] = useState(false);
            const [randomPoolFilter, setRandomPoolFilter] = useState("all");
            const [isSavingImage, setIsSavingImage] = useState(false);

            const [user, setUser] = useState(null);
            const [isAuthLoading, setIsAuthLoading] = useState(true);
            const [authError, setAuthError] = useState(null);
            const [favorites, setFavorites] = useState([]); 
            const [mirrors, setMirrors] = useState([]); 
            const [personalMemos, setPersonalMemos] = useState({});
            const [setlists, setSetlists] = useState([]);
            const [battleLogs, setBattleLogs] = useState([]);
            const [showOnlyFavorites, setShowOnlyFavorites] = useState(false);
            const [showOnlyMirrors, setShowOnlyMirrors] = useState(false);
            
            const [firebase, setFirebase] = useState(null);

            const exportRef = useRef(null);

            const getSongId = (song) => `${song.title}_${song.difficult}`;

            const songMap = useMemo(() => {
                const map = {};
                songs.forEach(s => {
                    map[getSongId(s)] = s;
                });
                return map;
            }, [songs]);

            const viewToken = useMemo(() => {
                return [currentPage, pageIndex, searchTerm, selectedLevels.join(','), showOnlyFavorites, showOnlyMirrors].join('|');
            }, [currentPage, pageIndex, searchTerm, selectedLevels, showOnlyFavorites, showOnlyMirrors]);

            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'auto' });
            }, [currentPage, pageIndex]);

            // --- Firebase Initialization & Auth ---
            useEffect(() => {
                const initFirebase = async () => {
                    const { initializeApp, getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously, getFirestore } = window.FirebaseSDK;
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);
                    
                    setFirebase({ auth, db });

                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    };
                    initAuth();

                    onAuthStateChanged(auth, (currentUser) => {
                        setUser(currentUser);
                        setIsAuthLoading(false);
                        if (!currentUser) {
                            setFavorites([]);
                            setMirrors([]);
                            setPersonalMemos({});
                            setSetlists([]);
                            setBattleLogs([]);
                            setShowOnlyFavorites(false);
                            setShowOnlyMirrors(false);
                            setRandomPoolFilter("all");
                        }
                    });
                };

                const interval = setInterval(() => {
                    if (window.FirebaseSDK) {
                        initFirebase();
                        clearInterval(interval);
                    }
                }, 100);
            }, []);

            // --- Master Data Fetch ---
            useEffect(() => {
                if (!firebase || !user) return;

                const fetchMasterData = async () => {
                    const { doc, getDoc } = window.FirebaseSDK;
                    try {
                        const docRef = doc(firebase.db, 'artifacts', APP_ID, 'public', 'data', MASTER_COLLECTION, MASTER_DOCUMENT);
                        const docSnap = await getDoc(docRef);
                        
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            if (data.songs) {
                                const parsedSongs = JSON.parse(data.songs);
                                setSongs(parsedSongs);
                            }
                        }
                    } catch (err) {
                        console.error("Master Data Fetch Error:", err);
                    } finally {
                        setIsLoading(false);
                    }
                };

                fetchMasterData();
            }, [firebase, user]);

            // --- User Data Sync (Profile, Setlists, BattleLogs) ---
            useEffect(() => {
                if (!user || !firebase || user.isAnonymous) return;
                const { doc, onSnapshot } = window.FirebaseSDK;

                const unsubProfile = onSnapshot(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'data'), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setFavorites(data.favorites || []);
                        setMirrors(data.mirrors || []);
                        setPersonalMemos(data.memos || {});
                    }
                }, (err) => console.error("Firestore Profile Sync Error:", err));

                const unsubSetlists = onSnapshot(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'setlists', 'data'), (docSnap) => {
                    if (docSnap.exists()) {
                        setSetlists(docSnap.data().items || []);
                    }
                }, (err) => console.error("Firestore Setlist Sync Error:", err));

                const unsubBattleLogs = onSnapshot(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'battle_logs', 'data'), (docSnap) => {
                    if (docSnap.exists()) {
                        setBattleLogs(docSnap.data().items || []);
                    }
                }, (err) => console.error("Firestore BattleLogs Sync Error:", err));

                return () => {
                    unsubProfile();
                    unsubSetlists();
                    unsubBattleLogs();
                };
            }, [user, firebase]);

            useEffect(() => {
                setSelectedLevels([]);
                setIsFilterOpen(false);
                setPageIndex(1);
                setShowOnlyFavorites(false);
                setShowOnlyMirrors(false);
                if (currentPage !== "terms") setTermsTab("terms");
            }, [currentPage]);

            useEffect(() => {
                setPageIndex(1);
            }, [rankSection, searchTerm, selectedLevels, sortOrder, showOnlyFavorites, showOnlyMirrors]);

            const login = async () => {
                if (!firebase || isAuthLoading) return;
                setIsAuthLoading(true);
                setAuthError(null);
                const { GoogleAuthProvider, signInWithPopup } = window.FirebaseSDK;
                const provider = new GoogleAuthProvider();
                
                provider.setCustomParameters({
                    prompt: 'select_account'
                });

                try {
                    await signInWithPopup(firebase.auth, provider);
                } catch (error) {
                    console.error("Google Login Error:", error);
                    setAuthError("ログインに失敗しました.");
                    setIsAuthLoading(false);
                }
            };

            const logout = async () => {
                if (!firebase) return;
                const { signOut, signInAnonymously } = window.FirebaseSDK;
                try {
                    await signOut(firebase.auth);
                    await signInAnonymously(firebase.auth);
                    setShowOnlyFavorites(false);
                    setShowOnlyMirrors(false);
                    setCurrentPage("main");
                    setIsLogoutModalOpen(false);
                } catch (error) {
                    console.error("Logout Error:", error);
                }
            };

            const updateFirestoreProfile = async (newFavs, newMemos, newMirrors) => {
                if (!user || !firebase || user.isAnonymous) return;
                const { doc, setDoc } = window.FirebaseSDK;
                await setDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'profile', 'data'), {
                    favorites: newFavs,
                    memos: newMemos,
                    mirrors: newMirrors
                }, { merge: true });
            };

            const toggleFavorite = async (songId) => {
                const newFavs = favorites.includes(songId) 
                    ? favorites.filter(id => id !== songId) 
                    : [...favorites, songId];
                setFavorites(newFavs);
                await updateFirestoreProfile(newFavs, personalMemos, mirrors);
            };

            const toggleMirror = async (songId) => {
                const newMirrors = mirrors.includes(songId) 
                    ? mirrors.filter(id => id !== songId) 
                    : [...mirrors, songId];
                setMirrors(newMirrors);
                await updateFirestoreProfile(favorites, personalMemos, newMirrors);
            };

            const savePersonalMemo = async (songId, memo) => {
                const newMemos = { ...personalMemos, [songId]: memo };
                setPersonalMemos(newMemos);
                await updateFirestoreProfile(favorites, newMemos, mirrors);
            };

            const saveSetlist = async (newSetlist) => {
                if (!user || !firebase || user.isAnonymous) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const newItems = setlists.find(s => s.id === newSetlist.id)
                    ? setlists.map(s => s.id === newSetlist.id ? newSetlist : s)
                    : [...setlists, newSetlist];
                
                setSetlists(newItems);
                await setDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'setlists', 'data'), {
                    items: newItems
                });
            };

            const deleteSetlist = async (id) => {
                if (!user || !firebase || user.isAnonymous) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const newItems = setlists.filter(s => s.id !== id);
                setSetlists(newItems);
                await setDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'setlists', 'data'), {
                    items: newItems
                });
            };

            const saveBattleLog = async (newLog) => {
                if (!user || !firebase || user.isAnonymous) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const newItems = battleLogs.find(l => l.id === newLog.id)
                    ? battleLogs.map(l => l.id === newLog.id ? newLog : l)
                    : [...battleLogs, newLog];
                
                setBattleLogs(newItems);
                await setDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'battle_logs', 'data'), {
                    items: newItems
                });
            };

            const deleteBattleLog = async (id) => {
                if (!user || !firebase || user.isAnonymous) return;
                const { doc, setDoc } = window.FirebaseSDK;
                const newItems = battleLogs.filter(l => l.id !== id);
                setBattleLogs(newItems);
                await setDoc(doc(firebase.db, 'artifacts', APP_ID, 'users', user.uid, 'battle_logs', 'data'), {
                    items: newItems
                });
            };

            const toggleLevel = (lv) => {
                setSelectedLevels(prev => 
                    prev.includes(lv) ? prev.filter(l => l !== lv) : [...prev, lv]
                );
            };

            const toggleLevelRange = (range) => {
                const allSelected = range.every(lv => selectedLevels.includes(lv));
                if (allSelected) {
                    setSelectedLevels(prev => prev.filter(lv => !range.includes(lv)));
                } else {
                    setSelectedLevels(prev => [...new Set([...prev, ...range])]);
                }
            };

            const isLevelFilterActive = useMemo(() => {
                return selectedLevels.length > 0;
            }, [selectedLevels]);

            const generateRandomSongs = () => {
                setIsGenerating(true);
                setHasGeneratedRandom(true);
                const filtered = songs.filter(s => {
                    const songId = getSongId(s);
                    const matchesFav = randomPoolFilter === "all" || (user && favorites.includes(songId));
                    if (!matchesFav) return false;

                    const lvStr = String(s.level || "");
                    const matchesLv = selectedLevels.length === 0 || selectedLevels.some(targetLv => {
                        if (["17.0", "18.0", "19.0", "20.0"].includes(targetLv)) {
                            const base = targetLv.split('.')[0];
                            return lvStr === base || lvStr === targetLv;
                        }
                        return lvStr === targetLv;
                    });
                    
                    return matchesLv;
                });

                if (filtered.length < 5) {
                    setRandomSongs([]);
                } else {
                    const shuffled = [...filtered].sort(() => 0.5 - Math.random());
                    const selected = shuffled.slice(0, 5);
                    setRandomSongs(selected);
                    // ランダム用のデータ設定
                    setExportData({
                        title: "ランダム選曲 結果",
                        songs: selected,
                        bg: "https://raw.githubusercontent.com/yuuya1202/image_Setlist_Background/main/image_Setlist_Background.png"
                    });
                }
                
                setTimeout(() => setIsGenerating(false), 500);
            };

            const performImageExport = async () => {
                setIsSavingImage(true);
                
                try {
                    // 少し待機して状態の反映を確実にする
                    await new Promise(r => setTimeout(r, 100));
                    
                    const element = document.getElementById('export-container');
                    const canvas = await html2canvas(element, {
                        useCORS: true,
                        allowTaint: false,
                        scale: 2,
                        backgroundColor: "#132a13"
                    });
                    
                    canvas.toBlob((blob) => {
                        if (blob) {
                            const url = URL.createObjectURL(blob);
                            setPreviewUrl(url);
                        }
                        setIsSavingImage(false);
                    }, 'image/png');
                } catch (error) {
                    console.error("Image Export Error:", error);
                    setIsSavingImage(false);
                }
            };

            const handleSetlistExport = (sl) => {
                const slSongs = sl.songs.map(id => songMap[id]).filter(s => s);
                setExportData({
                    title: sl.name,
                    songs: slSongs,
                    bg: "https://raw.githubusercontent.com/yuuya1202/image_Setlist_Background/main/okumono_sf13.png"
                });
                // データセット後にエクスポートを実行
                performImageExport();
            };

            const handleClosePreview = () => {
                if (previewUrl) {
                    URL.revokeObjectURL(previewUrl);
                }
                setPreviewUrl(null);
            };

            const processedSongs = useMemo(() => {
                return songs.map(s => {
                    let displayCombo = 0;
                    if (rankSection === "section1") {
                        displayCombo = parseInt(s.combo) || 0;
                    } else if (rankSection === "section2") {
                        displayCombo = parseInt(s.combo2) || 0;
                    }
                    return { ...s, _displayCombo: displayCombo };
                });
            }, [songs, rankSection]);

            const allFilteredSongs = useMemo(() => {
                let baseList = processedSongs;

                if (currentPage === "danger") {
                    baseList = processedSongs.filter(s => String(s.danger1) === "1" || String(s.danger2) === "1");
                }

                const result = baseList.filter(s => {
                    const lvStr = String(s.level || "");
                    const matchesLv = selectedLevels.length === 0 || selectedLevels.some(targetLv => {
                        if (["17.0", "18.0", "19.0", "20.0"].includes(targetLv)) {
                            const base = targetLv.split('.')[0];
                            return lvStr === base || lvStr === targetLv;
                        }
                        return lvStr === targetLv;
                    });
                    
                    const songId = getSongId(s);
                    const isFavFilterApplied = currentPage === "main" && showOnlyFavorites;
                    const matchesFav = !isFavFilterApplied || favorites.includes(songId);

                    const isMirrorFilterApplied = currentPage === "main" && showOnlyMirrors;
                    const matchesMirror = !isMirrorFilterApplied || mirrors.includes(songId);

                    if (currentPage === "main") {
                        const matchesSearch = 
                            String(s.title || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
                            String(s.reading || "").toLowerCase().includes(searchTerm.toLowerCase());
                        return matchesLv && matchesSearch && matchesFav && matchesMirror;
                    }
                    
                    return matchesLv && matchesFav;
                });

                if (currentPage === "ranking") {
                    const listWithCombo = result.filter(s => s._displayCombo > 0);
                    return listWithCombo.sort((a, b) => {
                        const comboA = a._displayCombo;
                        const comboB = b._displayCombo;
                        return sortOrder === "desc" ? comboB - comboA : comboA - comboB;
                    });
                }

                return result;
            }, [searchTerm, selectedLevels, processedSongs, currentPage, sortOrder, rankSection, showOnlyFavorites, showOnlyMirrors, favorites, mirrors]);

            const paginatedSongs = useMemo(() => {
                const start = (pageIndex - 1) * ITEMS_PER_PAGE;
                return allFilteredSongs.slice(start, start + ITEMS_PER_PAGE);
            }, [allFilteredSongs, pageIndex]);

            const totalPages = Math.ceil(allFilteredSongs.length / ITEMS_PER_PAGE);

            const handlePageChange = (newIndex) => {
                if (newIndex >= 1 && newIndex <= totalPages) {
                    setPageIndex(newIndex);
                }
            };

            const FilterButton = ({ lv, label }) => (
                <button onClick={() => toggleLevel(lv)} className={`filter-btn px-1 py-1.5 rounded-lg text-[10px] font-black uppercase w-full ${selectedLevels.includes(lv) ? 'active' : ''}`}>{label || lv}</button>
            );

            const LevelSectionHeader = ({ title, list }) => (
                <div className="flex items-center justify-between border-b-2 border-gray-100 pb-1 mb-2">
                    <div className="text-[10px] font-black text-black uppercase leading-none">Level {title}</div>
                    <button onClick={() => toggleLevelRange(list)} className="batch-btn">全選択/解除</button>
                </div>
            );

            return (
                <div className="min-h-screen px-4 py-8 max-w-md mx-auto">
                    {/* Invisible Container for Image Export (16:9) */}
                    <div id="export-container" ref={exportRef}>
                        <img 
                            className="export-bg" 
                            src={exportData.bg} 
                            crossOrigin="anonymous"
                            alt="background"
                        />
                        <div className="export-content-wrapper">
                            <div className="export-header">{exportData.title}</div>
                            
                            <div className="export-jackets-row">
                                {exportData.songs.map((song, i) => (
                                    <div key={`exp-jack-${i}`} className="export-jacket-box" style={{ borderColor: getBorderColor(song.difficult) }}>
                                        <img 
                                            className="export-jacket-img" 
                                            src={song.jacket} 
                                            crossOrigin="anonymous"
                                            onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.jp/24/cccccc/ffffff/150x150.png?text=NO+JACKET'; }}
                                        />
                                    </div>
                                ))}
                                {/* 空スロットの穴埋め */}
                                {[...Array(Math.max(0, 5 - exportData.songs.length))].map((_, i) => (
                                    <div key={`exp-jack-empty-${i}`} className="export-jacket-box opacity-20 border-dashed border-white"></div>
                                ))}
                            </div>

                            <div className="export-info-list">
                                {exportData.songs.map((song, i) => (
                                    <div key={`exp-info-${i}`} className="export-info-row" style={{ borderLeft: `14px solid #000` }}>
                                        <div className="export-info-main">
                                            <div className="export-info-num">#{i + 1}</div>
                                            <div className="export-info-title">{song.title}</div>
                                        </div>
                                        <div className="export-info-meta">
                                            <span style={{ color: '#000' }}>Lv {formatLevel(song.level)}</span>
                                            <span style={{ color: getBorderColor(song.difficult) }}>{song.difficult}</span>
                                            <span style={{ color: '#000' }}>BPM {song.bpm}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {authError && (
                        <div className="error-toast" onClick={() => setAuthError(null)}>
                            <div className="flex flex-col items-center gap-2">
                                <i className="ph-bold ph-warning-circle text-2xl"></i>
                                <p>{authError}</p>
                                <span className="text-[10px] opacity-70 mt-1">[タップで閉じる]</span>
                            </div>
                        </div>
                    )}

                    <div className="fixed top-4 left-4 z-50">
                        <div className="nav-dropdown">
                            <button onClick={() => setIsNavOpen(!isNavOpen)} className="nav-btn">
                                <i className="ph-bold ph-list text-xl"></i>
                                <i className={`ph-bold ph-caret-down text-[10px] transition-transform duration-200 ${isNavOpen ? 'rotate-180' : ''}`}></i>
                            </button>
                            {isNavOpen && (
                                <div className="dropdown-panel" onClick={() => setIsNavOpen(false)}>
                                    <button onClick={() => setCurrentPage("main")} className={`dropdown-item hover:bg-gray-50 ${currentPage === "main" ? 'active' : ''}`}>
                                        <i className="ph-bold ph-music-notes text-base"></i> メインページ
                                    </button>
                                    {user && !user.isAnonymous && (
                                        <>
                                            <button onClick={() => setCurrentPage("setlist")} className={`dropdown-item hover:bg-gray-50 ${currentPage === "setlist" ? 'active' : ''}`}>
                                                <i className="ph-bold ph-list-numbers text-base"></i> セトリ管理
                                            </button>
                                            <button onClick={() => setCurrentPage("battle_log")} className={`dropdown-item hover:bg-gray-50 ${currentPage === "battle_log" ? 'active' : ''}`}>
                                                <i className="ph-bold ph-sword text-base"></i> 戦績ログ
                                            </button>
                                        </>
                                    )}
                                    <button onClick={() => setCurrentPage("random")} className={`dropdown-item hover:bg-gray-50 ${currentPage === "random" ? 'active' : ''}`}>
                                        <i className="ph-bold ph-shuffle text-base"></i> ランダム選曲
                                    </button>
                                    <button onClick={() => setCurrentPage("ranking")} className={`dropdown-item hover:bg-gray-50 ${currentPage === "ranking" ? 'active' : ''}`}>
                                        <i className="ph-bold ph-trophy text-base"></i> チェイン数ランキング
                                    </button>
                                    <button onClick={() => setCurrentPage("danger")} className={`dropdown-item hover:bg-gray-50 ${currentPage === "danger" ? 'active' : ''}`}>
                                        <i className="ph-bold ph-warning-octagon text-base"></i> 要注意曲リスト
                                    </button>
                                    <div className="border-t-2 border-gray-100 my-1"></div>
                                    <button onClick={() => setCurrentPage("terms")} className={`dropdown-item hover:bg-gray-50 ${currentPage === "terms" ? 'active' : ''}`}>
                                        <i className="ph-bold ph-file-text text-base"></i> ガイドライン
                                    </button>
                                    <button onClick={() => setCurrentPage("contact")} className={`dropdown-item hover:bg-gray-50 ${currentPage === "contact" ? 'active' : ''}`}>
                                        <i className="ph-bold ph-chat-centered-text text-base"></i> お問い合わせ
                                    </button>
                                    {user && !user.isAnonymous && (
                                        <button onClick={() => setIsLogoutModalOpen(true)} className="dropdown-item hover:bg-red-50 text-red-600">
                                            <i className="ph-bold ph-sign-out text-base"></i> ログアウト
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="fixed top-4 right-4 z-50">
                        {user && !user.isAnonymous ? (
                            <div className="bg-white border-2 border-black px-3 py-2 rounded-xl shadow-[3px_3px_0px_#000] flex items-center gap-2">
                                {user.photoURL ? (
                                    <img src={user.photoURL} className="w-5 h-5 rounded-full border border-black" alt="avatar" />
                                ) : (
                                    <div className="w-2 h-2 bg-green-500 rounded-full"></div>
                                )}
                                <div className="flex flex-col items-start leading-none">
                                    <span className="text-[9px] font-black text-black truncate max-w-[80px] mb-0.5">{user.displayName || "USER"}</span>
                                    <span className="text-[8px] font-bold text-gray-400 uppercase tracking-tighter">ログイン中</span>
                                </div>
                            </div>
                        ) : (
                            <button onClick={login} disabled={isAuthLoading} className="auth-btn">
                                {isAuthLoading ? (
                                    <div className="w-4 h-4 border-2 border-gray-400 border-t-black rounded-full animate-spin"></div>
                                ) : (
                                    <>
                                        <i className="ph-bold ph-user-circle text-lg text-[#52b788]"></i>
                                        ログイン
                                    </>
                                )}
                            </button>
                        )}

                                                <p className="mt-8 text-[10px] text-gray-400 text-center italic">※記載内容は予告なく更新される場合があります。</p>
                                            </div>
                                        </div>
                                        <div className="mt-8 flex justify-center">
                                            <button onClick={() => setCurrentPage("main")} className="page-btn">
                                                メインページに戻る
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {currentPage === "ranking" && (
                                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                        {paginatedSongs.map((song, idx) => {
                                            const globalIdx = (pageIndex - 1) * ITEMS_PER_PAGE + idx;
                                            let currentRank = globalIdx + 1;
                                            if (globalIdx > 0) {
                                                let backtrackIdx = globalIdx;
                                                while (backtrackIdx > 0 && allFilteredSongs[backtrackIdx]._displayCombo === allFilteredSongs[backtrackIdx - 1]._displayCombo) backtrackIdx--;
                                                currentRank = backtrackIdx + 1;
                                            }
                                            const isTopThree = currentRank <= 3;
                                            return (
                                                <div key={idx} className="ranking-row">
                                                    <div className={`rank-number ${isTopThree ? `rank-${currentRank}` : ''}`}>#{currentRank}</div>
                                                    <div className="flex-grow min-w-0 px-2">
                                                        <p className="text-sm font-black leading-tight break-words">{song.title}</p>
                                                        <p className="text-[10px] font-bold text-black uppercase tracking-tighter mt-0.5">
                                                            Lv {formatLevel(song.level)} <span style={{ color: getBorderColor(song.difficult) }}>{song.difficult}</span>
                                                        </p>
                                                    </div>
                                                    <div className="text-right flex-shrink-0">
                                                        <span className="text-xl font-black text-black">{song._displayCombo}</span>
                                                        <span className="text-[10px] font-black ml-1 uppercase text-[#132a13]">CHAIN</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}

                                {currentPage === "random" && (
                                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 mt-1">
                                        {randomSongs.length > 0 ? (
                                            randomSongs.map((song, idx) => (
                                                <div key={`random-group-${idx}`} className="mb-1">
                                                    <div className="flex items-center gap-2 mb-0.5 ml-1">
                                                        <div className="bg-black text-white text-[8px] font-black px-1.5 py-0.5 rounded transform -rotate-1">
                                                            TRACK {idx + 1}
                                                        </div>
                                                    </div>
                                                    <SongCard 
                                                        key={`random-${getSongId(song)}-${idx}`} 
                                                        song={song} 
                                                        isLoggedIn={false}
                                                        isFavorite={false}
                                                        onToggleFavorite={() => {}}
                                                        isMirror={false}
                                                        onToggleMirror={() => {}}
                                                        personalMemo={null}
                                                        onSavePersonalMemo={() => {}}
                                                        tightMode={true}
                                                        minimalMode={true}
                                                    />
                                                </div>
                                            ))
                                        ) : (
                                            hasGeneratedRandom && !isGenerating && (
                                                <div className="text-center py-20 bg-white/10 border-4 border-white/20 border-dashed rounded-3xl">
                                                    <i className="ph-bold ph-dice-five text-4xl text-white/30 mb-4 block"></i>
                                                    <p className="font-black text-white/50 text-sm">条件に合う曲が不足しています</p>
                                                </div>
                                            )
                                        )}
                                    </div>
                                )}
                                
                                {currentPage !== "ranking" && currentPage !== "setlist" && currentPage !== "random" && currentPage !== "terms" && currentPage !== "contact" && currentPage !== "battle_log" && (
                                    paginatedSongs.map((song, idx) => {
                                        const songId = getSongId(song);
                                        return (
                                            <SongCard 
                                                key={`${viewToken}-${songId}`} 
                                                song={song} 
                                                showDangerBadge={currentPage === "danger"} 
                                                showTips={currentPage === "danger"} 
                                                isLoggedIn={currentPage === "danger" ? false : (user && !user.isAnonymous)}
                                                isFavorite={favorites.includes(songId)}
                                                onToggleFavorite={() => toggleFavorite(songId)}
                                                isMirror={mirrors.includes(songId)}
                                                onToggleMirror={() => toggleMirror(songId)}
                                                personalMemo={personalMemos[songId]}
                                                onSavePersonalMemo={(memo) => savePersonalMemo(songId, memo)}
                                            />
                                        );
                                    })
                                )}

                                {currentPage !== "setlist" && currentPage !== "random" && currentPage !== "terms" && currentPage !== "contact" && currentPage !== "battle_log" && paginatedSongs.length === 0 && (
                                    <div className="text-center py-20 bg-white border-4 border-black border-dashed rounded-3xl">
                                        <i className="ph-bold ph-ghost text-4xl text-gray-300 mb-4 block"></i>
                                        <p className="font-black text-gray-400 text-sm">楽曲が見つかりません</p>
                                    </div>
                                )}

                                {currentPage !== "setlist" && currentPage !== "random" && currentPage !== "terms" && currentPage !== "contact" && currentPage !== "battle_log" && totalPages > 1 && (
                                    <div className="pagination-container">
                                        <button onClick={() => handlePageChange(pageIndex - 1)} disabled={pageIndex <= 1} className="page-btn">
                                            <i className="ph-bold ph-caret-left"></i> 前へ
                                        </button>
                                        <div className="page-info">{pageIndex} / {totalPages}</div>
                                        <button onClick={() => handlePageChange(pageIndex + 1)} disabled={pageIndex >= totalPages} className="page-btn">
                                            次へ <i className="ph-bold ph-caret-right"></i>
                                        </button>
                                    </div>
                                )}
                            </>
                        )}
                    </main>

                    <LogoutConfirmModal 
                        isOpen={isLogoutModalOpen}
                        onConfirm={logout}
                        onCancel={() => setIsLogoutModalOpen(false)}
                    />

                    <ImagePreviewModal 
                        isOpen={!!previewUrl}
                        imageUrl={previewUrl}
                        onCancel={handleClosePreview}
                    />

                    <LinkConfirmModal 
                        isOpen={contactLinkModal.isOpen}
                        onConfirm={() => { window.open(contactLinkModal.url, '_blank', 'noopener,noreferrer'); setContactLinkModal({ ...contactLinkModal, isOpen: false }); }}
                        onCancel={() => setContactLinkModal({ ...contactLinkModal, isOpen: false })}
                        type={contactLinkModal.type}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
