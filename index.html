<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDVX MEGAMIX_Memo</title>
    
    <!-- 背景画像のプリロード -->
    <link rel="preload" href="https://yuuya1202.github.io/Image_Background/IMG_Background.jpg" as="image">
    <link rel="preload" href="https://yuuya1202.github.io/Image_Background/IMG_SetlistBackground.png" as="image">
    <link rel="preload" href="https://yuuya1202.github.io/Image_Background/IMG_Random_Background.png" as="image">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- html2canvas (Element to Image) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = { initializeApp, getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInAnonymously, getFirestore, doc, setDoc, getDoc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

        body {
            background-color: #132a13;
            color: #222;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            min-height: 100vh;
            margin: 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(19, 42, 19, 0.75), rgba(19, 42, 19, 0.75)),
                url('https://yuuya1202.github.io/Image_Background/IMG_Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }
        
        .pop-card {
            background: white;
            border: 3px solid #000;
            box-shadow: 6px 6px 0px #000;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .pop-card:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px #000;
        }
        .pop-card.active {
            border-color: #52b788;
            box-shadow: 6px 6px 0px #52b788;
        }

        /* --- グリッドアイテム用スタイル --- */
        .grid-item {
            background: white;
            border: 2px solid #000;
            aspect-ratio: 1/1;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: 3px 3px 0px #000;
            transition: all 0.1s;
        }
        .grid-item:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000;
        }
        .grid-title-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 7px;
            font-weight: 700;
            padding: 2px 4px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }

        /* Static card for random selection */
        .static-card {
            background: white;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            position: relative;
        }

        .danger-badge-container {
            position: absolute;
            top: -12px;
            left: 10px;
            display: flex;
            gap: 4px;
            z-index: 10;
        }
        .danger-badge {
            padding: 2px 10px;
            border: 2px solid #000;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 2px 2px 0px #000;
        }
        .danger-badge-1 { background: #ffb703; color: #000; }
        .danger-badge-2 { background: #e63946; color: #fff; }

        .memo-area {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.3s ease-out;
            background: #fdfdfd;
            border-radius: 12px;
            position: relative;
        }
        .memo-area.open {
            max-height: 2000px; 
            opacity: 1;
            margin-top: 12px;
            padding: 12px 12px 10px 12px;
            border: 2px solid #000;
        }

        .filter-area {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .filter-area.show {
            max-height: 1500px;
            opacity: 1;
            margin-top: 1rem;
            padding: 1rem;
            border: 3px solid #000;
            border-radius: 1rem;
            background-color: #ffffff;
        }

        .filter-trigger {
            border: 3px solid #000;
            background: white;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s;
        }
        .filter-trigger.is-active {
            background: #40916c;
            color: white;
        }
        .filter-trigger.open {
            background: #40916c;
            color: white;
        }

        .filter-btn {
            border: 2px solid #000;
            box-shadow: 2px 2px 0px #000;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 38px;
            background: white;
        }
        .filter-btn.active {
            background: #52b788;
            color: white;
        }

        .toggle-btn-group {
            display: flex;
            background: #2d6a4f;
            padding: 4px;
            border-radius: 14px;
            border: 2px solid #000;
            gap: 4px;
        }
        .toggle-btn-small {
            flex: 1;
            padding: 8px 4px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 900;
            color: white;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .toggle-btn-small.active {
            background: white;
            color: #1b4332;
            box-shadow: 2px 2px 0px #000;
        }

        .batch-btn {
            border: 1px solid #000;
            padding: 1px 8px;
            border-radius: 6px;
            font-size: 9px;
            background: #f8f8f8;
            transition: all 0.1s;
            font-weight: 900;
            text-transform: uppercase;
        }

        .section-label {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #1b4332;
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-decoration-color: #52b788;
            text-underline-offset: 4px;
        }

        .stat-box {
            background: white;
            border: 2px solid #000;
            padding: 6px 2px;
            border-radius: 8px;
            text-align: center;
            color: #000;
        }
        .stat-label {
            font-size: 10px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 3px;
            color: #000;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 900;
            line-height: 1.1;
            color: #000;
        }

        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 12px 6px;
            background: white;
            border: 2px solid #000;
            border-radius: 10px;
            font-weight: 900;
            font-size: 13.5px;
            color: #000;
            transition: all 0.1s;
            box-shadow: 3px 3px 0px #000;
            line-height: 1;
        }
        .link-button:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }
        .link-button.chart { background: #e9edc9; }
        .link-button.video { background: #fec5bb; }

        .ranking-row {
            background: white;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px #000;
            display: flex;
            align-items: flex-start;
            padding: 10px 12px;
            border-radius: 16px;
            margin-bottom: 10px;
        }
        .rank-number {
            width: 64px; 
            font-size: 20px;
            font-weight: 900;
            font-style: italic;
            color: #132a13;
            flex-shrink: 0;
            padding-top: 2px;
        }
        .rank-1 { color: #ffd700; text-shadow: 2px 2px 0px #000; }
        .rank-2 { color: #c0c0c0; text-shadow: 2px 2px 0px #000; }
        .rank-3 { color: #cd7f32; text-shadow: 2px 2px 0px #000; }

        .nav-dropdown {
            position: relative;
            display: inline-block;
        }
        
        .nav-btn {
            background: white;
            border: 2px solid #000;
            padding: 8px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 3px 3px 0px #000;
            transition: all 0.2s;
            height: 42px;
            min-width: 60px;
        }
        .nav-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }

        .dropdown-panel {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            min-width: 220px;
            width: max-content;
            background: white;
            border: 2px solid #000;
            border-radius: 12px;
            box-shadow: 4px 4px 0px #000;
            overflow: hidden;
            z-index: 60;
            animation: dropdownFade 0.2s ease-out;
        }
        @keyframes dropdownFade {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dropdown-item {
            width: 100%;
            text-align: left;
            padding: 14px 20px;
            font-size: 13px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.1s;
            white-space: nowrap;
        }
        .dropdown-item.active {
            background: #d8f3dc;
            color: #1b4332;
        }

        .pagination-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            padding-bottom: 40px;
        }
        .page-btn {
            background: white;
            border: 2px solid #000;
            box-shadow: 3px 3px 0px #000;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.1s;
        }
        .page-btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .page-info {
            background: #2d6a4f;
            color: white;
            padding: 6px 14px;
            border-radius: 10px;
            border: 2px solid #000;
            font-weight: 900;
            font-size: 12px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white;
            border: 4px solid #000;
            box-shadow: 8px 8px 0px #000;
            border-radius: 24px;
            width: 100%;
            max-width: 320px;
            padding: 24px;
            text-align: center;
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* --- 新設：譜面プレビュー用モーダル --- */
        .preview-modal-content {
            background: white;
            border: 4px solid #000;
            box-shadow: 8px 8px 0px #000;
            border-radius: 20px;
            width: 100%;
            height: 90vh;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .preview-header {
            padding: 12px 16px;
            border-bottom: 3px solid #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
        }
        .preview-iframe-container {
            flex-grow: 1;
            position: relative;
            background: #eee;
        }
        .preview-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .hit-counter {
            background: #6b7280; 
            color: white;
            font-size: 11px;
            font-weight: 900;
            padding: 3px 12px;
            border-radius: 99px;
            display: inline-flex;
            align-items: center;
            border: 2px solid #000;
            box-shadow: 2px 2px 0px #000;
        }

        .auth-btn {
            background: white;
            border: 2px solid #000;
            padding: 8px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 3px 3px 0px #000;
            transition: all 0.2s;
            height: 42px;
            font-weight: 900;
            font-size: 13px;
        }
        .auth-btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }
        .auth-btn.logged-in {
            background: #fdfdfd;
            border-color: #666;
            color: #666;
            box-shadow: 3px 3px 0px #666;
        }
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .fav-btn {
            background: white;
            border: 2px solid #e5e7eb;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #d1d5db;
        }
        .fav-btn.active {
            border-color: #fbbf24;
            background: #fffbeb;
            color: #fbbf24;
            box-shadow: 2px 2px 0px #fbbf24;
        }

        .mirror-btn {
            background: white;
            border: 2px solid #e5e7eb;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #d1d5db;
        }
        .mirror-btn.active {
            border-color: #6366f1;
            background: #eef2ff;
            color: #6366f1;
            box-shadow: 2px 2px 0px #6366f1;
        }
        
        .memo-textarea {
            width: 100%;
            border: 2px solid #000;
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
            font-weight: bold;
            resize: vertical;
            min-height: 60px;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.05);
            background: #f9fafb;
        }
        .memo-textarea:focus {
            outline: none;
            border-color: #52b788;
            background: #fff;
        }
        .memo-textarea:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
            border-color: #9ca3af;
        }

        .fav-filter-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 3px solid #000;
            background: white;
            font-weight: 900;
            font-size: 14px;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .fav-filter-toggle.active {
            background: #fffbeb;
            border-color: #fbbf24;
            color: #b45309;
            box-shadow: 4px 4px 0px #fbbf24;
        }

        .error-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e63946;
            color: white;
            padding: 14px 24px;
            border: 3px solid black;
            border-radius: 16px;
            box-shadow: 6px 6px 0px black;
            z-index: 1000;
            font-weight: 900;
            font-size: 13px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: toastPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes toastPop {
            from { transform: translate(-50%, 20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .mirror-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #eef2ff;
            color: #4f46e5;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.025em;
            line-height: 1;
            white-space: nowrap;
        }

        .mirror-icon-badge {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #eef2ff;
            border: 1px solid #6366f1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6366f1;
            flex-shrink: 0;
        }

        .contact-method-card {
            background: #f8fafc;
            border: 2px solid #000;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.2s;
        }
        .contact-method-card:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 4px 4px 0px #000;
        }

        /* 改修：干渉を防ぐため絶対配置を廃止し、独立したボタンスタイルへ */
        .view-mode-badge {
            background: white;
            color: black;
            border: 2px solid #000;
            border-radius: 10px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 900;
            box-shadow: 3px 3px 0px #000;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            cursor: pointer;
            width: fit-content;
        }
        .view-mode-badge:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }

        /* --- Image Export Layout Styles --- */
        #export-container {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 1280px;
            height: 720px;
            background-color: #132a13;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 40px 30px 40px; 
            z-index: -100;
        }
        .export-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .export-content-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .export-header {
            width: 100%;
            text-align: right;
            font-size: 38px;
            font-weight: 900;
            color: #000;
            margin-bottom: 35px; 
            text-shadow: 2px 2px 0px #fff;
            line-height: 1;
        }
        .export-jackets-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 25px;
            width: 100%;
            padding: 0 60px; 
        }
        .export-jacket-box {
            flex: 1;
            aspect-ratio: 1/1;
            background: white;
            border: 5px solid #000;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
        }
        .export-jacket-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .export-info-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            flex-grow: 1;
            padding: 0 20px; 
        }
        .export-info-row {
            background: rgba(255, 255, 255, 0.94);
            border: 4px solid #000;
            border-left-width: 14px; 
            border-radius: 12px;
            padding: 0px 24px 4px 18px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            min-height: 68px;
            position: relative;
            overflow: hidden;
        }
        .export-info-main {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            min-width: 0;
            height: 100%;
        }
        .export-info-num {
            font-size: 22px;
            font-weight: 900;
            color: #000;
            font-style: italic;
            width: 40px;
        }
        .export-info-title {
            font-size: 26px;
            font-weight: 900;
            color: #000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
            display: flex;
            align-items: center;
            height: 100%;
        }
        .export-info-meta {
            display: flex;
            gap: 24px;
            font-size: 18px;
            font-weight: 900;
            color: #000;
            flex-shrink: 0;
            align-items: center;
        }
        
        /* カスタムスクロールバー（PC用） */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const firebaseConfig = {

            const handleVideoClick = (e, url) => {

                setConfirmModal({ isOpen: true, url, type: 'video' });

            const confirmVideoNavigation = () => {

                if (d === "2" || d === "3") {

                if (badges.length === 0) return null;
                return <div className="danger-badge-container">{badges}</div>;
            };

            const handleFavoriteClick = (e) => {
                e.stopPropagation();
                if (!isLoggedIn) return;

            };

                e.stopPropagation();
                if (!isLoggedIn) return;
                onToggleMirror();
            };

                if (!isLoggedIn) return;
                if (!localMemo.trim()) return;

                            src={song.jacket} 
                            alt="jacket" 
                            className="w-full h-full object-cover" 
                            crossOrigin="anonymous"
